<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#666"/></marker>
    <style>
      .panel{fill:#fff;stroke:#d4dae6;stroke-width:1.5;rx:8}
      .bar{fill:#eef2f9;stroke:#cdd6e8;stroke-width:1}
      .h{fill:#2a5db0;font-weight:bold;font-size:13px}
      .t{fill:#333;font-size:10.5px}
      .m{fill:#888;font-size:9.5px}
      .chip{fill:#2a5db0;font-size:9px}
      .ok{fill:#3a9d6f}.bad{fill:#e07b39}
    </style>
  </defs>
  <rect x="0" y="0" width="900" height="460" fill="#f6f8fc"/>

  <!-- PANEL 1: FRAMING -->
  <rect x="20" y="40" width="270" height="380" rx="8" class="panel"/>
  <rect x="20" y="40" width="270" height="34" rx="8" fill="#2a5db0"/>
  <text x="34" y="62" fill="#fff" font-weight="bold" font-size="13">Phase 1 — Framing</text>
  <text x="34" y="96" class="m">ILL-DEFINED PROBLEM</text>
  <rect x="34" y="104" width="242" height="60" rx="4" class="bar"/>
  <text x="44" y="122" class="t">"Design a sorting + hash-search</text>
  <text x="44" y="137" class="t">pipeline for our product data..."</text>
  <text x="44" y="152" class="m">(sizes, edge cases unspecified)</text>
  <text x="34" y="190" class="m">YOUR REFINEMENTS</text>
  <rect x="34" y="198" width="242" height="30" rx="4" class="bar"/>
  <text x="44" y="217" class="t">+ Assumptions: dataset 10^6 rows…</text>
  <rect x="34" y="234" width="242" height="30" rx="4" class="bar"/>
  <text x="44" y="253" class="t">+ Constraints: O(n log n), in-memory</text>
  <rect x="34" y="270" width="242" height="30" rx="4" class="bar"/>
  <text x="44" y="289" class="t">+ Success metric: p99 latency …</text>
  <rect x="190" y="320" width="86" height="28" rx="5" fill="#2a5db0"/>
  <text x="233" y="338" fill="#fff" font-size="11" text-anchor="middle">Submit</text>
  <rect x="34" y="364" width="242" height="44" rx="4" fill="#eef7f0" stroke="#bfe0cb"/>
  <text x="44" y="382" class="m">FRAMING FEEDBACK</text>
  <text x="44" y="398" class="t">Good constraints; specify tie-breaking. <tspan class="h">Grade: B</tspan></text>

  <!-- arrow -->
  <path d="M292,230 L312,230" stroke="#666" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- PANEL 2: JUDGE + STEER -->
  <rect x="315" y="40" width="270" height="380" rx="8" class="panel"/>
  <rect x="315" y="40" width="270" height="34" rx="8" fill="#2a5db0"/>
  <text x="329" y="62" fill="#fff" font-weight="bold" font-size="13">Phase 2 — Judge + Steer</text>
  <text x="329" y="92" class="chip">Cycle 1 of 3</text>
  <text x="329" y="110" class="m">AI OUTPUT (review critically)</text>
  <rect x="329" y="118" width="242" height="46" rx="4" class="bar"/>
  <text x="339" y="136" class="t">Uses Timsort + open-addressing</text>
  <text x="339" y="151" class="t">hash; assumes uniform keys…</text>
  <text x="329" y="190" class="m">JUDGING — flag issues</text>
  <text x="339" y="210" class="t"><tspan class="bad">&#10007;</tspan> ignores hash-collision clustering</text>
  <text x="339" y="228" class="t"><tspan class="bad">&#10007;</tspan> no tie-break = unstable order</text>
  <text x="339" y="246" class="t"><tspan class="m">&#9744; (distractor: "wrong language")</tspan></text>
  <text x="329" y="276" class="m">STEERING — correction command</text>
  <rect x="329" y="284" width="242" height="40" rx="4" class="bar"/>
  <text x="339" y="302" class="t">"Handle collision clustering with</text>
  <text x="339" y="316" class="t">chaining; make the sort stable."</text>
  <rect x="450" y="334" width="121" height="26" rx="5" fill="#2a5db0"/>
  <text x="510" y="351" fill="#fff" font-size="10.5" text-anchor="middle">Send &#8594; AI updates</text>
  <rect x="329" y="372" width="242" height="36" rx="4" fill="#eef7f0" stroke="#bfe0cb"/>
  <text x="339" y="389" class="m">Convergence: 4 issues &#8594; 1 remaining</text>
  <text x="339" y="403" class="t">Targeted, well-prioritized. <tspan class="h">J: A  S: B</tspan></text>

  <!-- arrow -->
  <path d="M587,230 L607,230" stroke="#666" stroke-width="1.6" marker-end="url(#a)"/>

  <!-- PANEL 3: REPORT -->
  <rect x="610" y="40" width="270" height="380" rx="8" class="panel"/>
  <rect x="610" y="40" width="270" height="34" rx="8" fill="#1e4a94"/>
  <text x="624" y="62" fill="#fff" font-weight="bold" font-size="13">Per-skill Report</text>
  <text x="624" y="100" class="m">INDEPENDENT GRADES</text>
  <!-- Framing bar -->
  <text x="624" y="128" class="t">Framing</text>
  <rect x="624" y="134" width="232" height="18" rx="3" class="bar"/>
  <rect x="624" y="134" width="155" height="18" rx="3" fill="#2a5db0"/>
  <text x="846" y="148" class="h" text-anchor="end">B</text>
  <!-- Judging bar -->
  <text x="624" y="172" class="t">Judging</text>
  <rect x="624" y="178" width="232" height="18" rx="3" class="bar"/>
  <rect x="624" y="178" width="232" height="18" rx="3" fill="#3a9d6f"/>
  <text x="846" y="192" fill="#3a9d6f" font-weight="bold" font-size="13" text-anchor="end">A</text>
  <!-- Steering bar -->
  <text x="624" y="216" class="t">Steering</text>
  <rect x="624" y="222" width="232" height="18" rx="3" class="bar"/>
  <rect x="624" y="222" width="155" height="18" rx="3" fill="#2a5db0"/>
  <text x="846" y="236" class="h" text-anchor="end">B</text>
  <rect x="624" y="262" width="232" height="120" rx="4" fill="#f7f9fc" stroke="#e2e2e2"/>
  <text x="634" y="282" class="m">DIAGNOSTIC FEEDBACK</text>
  <text x="634" y="302" class="t">Framing: add tie-break rule.</text>
  <text x="634" y="322" class="t">Judging: caught all real issues,</text>
  <text x="634" y="336" class="t">no false alarms.</text>
  <text x="634" y="356" class="t">Steering: prioritized well; one</text>
  <text x="634" y="370" class="t">issue left for cycle 2.</text>

  <text x="450" y="32" text-anchor="middle" font-size="13" fill="#444" font-weight="bold">CoReasoning Lab: a challenge run scores Framing, Judging, and Steering independently</text>
</svg>
