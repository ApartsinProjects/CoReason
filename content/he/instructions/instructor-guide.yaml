id: instructor-guide
title: "מדריך למרצה"
sections:
  - title: "סקירה כללית"
    content: "מעבדת CoReasoning מאפשרת לסטודנטים לתרגל הערכה ביקורתית של פלטי AI. כמרצה, תוכלו ליצור אתגרים, לעקוב אחר התקדמות סטודנטים ולנתח ביצועים."
  - title: "יצירת אתגרים"
    content: "כל אתגר מבוסס על בעיה גולמית מעורפלת בכוונה. הגדירו את נושא הקורס, בחרו רמת קושי וספקו את בעיית המקור. המערכת תייצר פתרון AI ואפשרויות שיפוט."
  - title: "מעקב אחר סטודנטים"
    content: "השתמשו בלוח האנליטיקות כדי לעקוב אחר ביצועי סטודנטים בשלושת הממדים: מסגור, שיפוט והכוונה. זהו דפוסים נפוצים וספקו משוב ממוקד."
  - title: "מצבי עבודה"
    content: "מצב תרגול מאפשר לסטודנטים ללמוד מטעויות עם משוב מיידי. מצב הערכה מדמה מצב מבחן ומציג משוב רק בסיום."
