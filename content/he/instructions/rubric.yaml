id: rubric
title: "מחוון הערכה"
sections:
  - title: "מסגור"
    grades:
      A: "זיהוי כל ההנחות, האילוצים והחידודים הנדרשים. הגדרת משימה מדויקת ומלאה."
      B: "זיהוי רוב ההבהרות הנדרשות עם פער קטן אחד או שניים."
      C: "זיהוי חלק מההבהרות אך פוספסו מרכיבים קריטיים."
      D: "הגדרת משימה חלקית מאוד או שגויה."
  - title: "שיפוט"
    grades:
      A: "זיהוי כל הבעיות המהותיות בפתרון ה-AI עם נימוק מדויק."
      B: "זיהוי רוב הבעיות העיקריות אך פוספסו בעיות משניות."
      C: "זיהוי חלק מהבעיות בלבד, או סיום מוקדם מדי."
      D: "פיספוס בעיות קריטיות או זיהוי בעיות שגויות."
  - title: "הכוונה"
    grades:
      A: "הנחיות ספציפיות, ממוקדות וניתנות לביצוע שמתייחסות ישירות לבעיות שזוהו."
      B: "הנחיות טובות ברובן אך חלקן חסרות ספציפיות."
      C: "הנחיות מעורפלות או לא ממוקדות שלא מכוונות לגורם השורש."
      D: "הנחיות שגויות או לא רלוונטיות."
