id: framing-hint-mc
type: multiple-choice
template: |
  Das Rohproblem ist absichtlich unvollständig. Wählen Sie ALLE Verfeinerungen
  (Annahmen, Einschränkungen, Klarstellungen) aus, die angewendet werden sollten,
  bevor die KI eine Lösung generiert. Einige Verfeinerungen sind notwendig;
  andere sind unnötig oder falsch.
