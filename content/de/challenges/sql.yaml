id: sql
title: "Anfrageoptimierung für E-Commerce-Analytik"
course: "Datenbanksysteme"
subject: "Anfrageverarbeitung &rsaquo; Anfrageoptimierung"
maxCycles: 4
rawProblem: "Schreiben Sie eine SQL-Abfrage, die einen monatlichen Verkaufsleistungsbericht für eine E-Commerce-Plattform erstellt. Der Bericht soll die meistverkauften Produkte nach Kategorie gruppiert anzeigen, einschließlich Gesamtumsatz, verkaufter Einheiten und durchschnittlicher Kundenbewertung. Die Datenbank enthält &ldquo;Millionen&rdquo; von Transaktionsdatensätzen. Die Abfrage muss &ldquo;schnell genug&rdquo; für ein Führungskräfte-Dashboard laufen, das sich automatisch aktualisiert. Sie soll den &ldquo;Feiertagsansturm&rdquo; bewältigen, wenn das Bestellvolumen seinen Höhepunkt erreicht."
rawProblemShort: "SQL-Abfrage für monatlichen Verkaufsbericht &hellip; Top-Produkte nach Kategorie, Umsatz, Bewertungen. Millionen von Datensätzen, Dashboard-Leistung."

mc:
  aiSolution:
    html: |
      <div class="code-block">SELECT
          c.category_name,
          p.product_name,
          SUM(oi.quantity) AS units_sold,
          SUM(oi.quantity * oi.unit_price) AS total_revenue,
          AVG(r.rating) AS avg_rating
      FROM order_items oi
      JOIN orders o ON oi.order_id = o.order_id
      JOIN products p ON oi.product_id = p.product_id
      JOIN categories c ON p.category_id = c.category_id
      LEFT JOIN reviews r ON p.product_id = r.product_id
      WHERE o.order_date &gt;= DATE_TRUNC('month', CURRENT_DATE)
      GROUP BY c.category_name, p.product_name
      ORDER BY c.category_name, total_revenue DESC;</div>
    summary: "Einfaches SELECT mit JOINs, GROUP BY, ORDER BY. Kein Top-N-Filter, keine Indexanalyse, Bewertungs-JOIN ungefiltert."

  framing:
    hint: "Das Problem hat vage Anforderungen. Wählen Sie ALLE Verfeinerungen aus, die nötig sind, um die Aufgabe präzise zu definieren, bevor die KI die Abfrage schreibt."
    options:
      - letter: "A"
        text: "&ldquo;Millionen&rdquo; als ~8M Bestellungen, ~200K Produkte, ~40 Kategorien quantifizieren"
        correct: true
      - letter: "B"
        text: "&ldquo;Schnell genug&rdquo; als Abfrageantwort unter 3 Sekunden definieren"
        correct: true
      - letter: "C"
        text: "&ldquo;Meistverkauft&rdquo; bedeutet Top 10 pro Kategorie nach Umsatz geordnet"
        correct: true
      - letter: "D"
        text: "Annehmen, dass alle Abfragen gegen eine vorgefertigte materialisierte Sicht laufen"
        correct: false
      - letter: "E"
        text: "Monatlich = Kalendermonat; Monatsvergleich einschließen"
        correct: true
      - letter: "F"
        text: "Bewertungen sind für jedes Produkt garantiert vorhanden (keine NULLs)"
        correct: false
    studentSelections: [0, 2, 4]
    feedback:
      grade: "B"
      html: |
        <div class="criticism"><strong>Korrekt ausgewählt:</strong> (A) Quantifizierung des Datenvolumens, (C) Top-10 pro Kategorie, (E) Kalendermonat mit Vergleich.</div>
        <div class="criticism" style="margin-top:6px"><strong>Übersehen:</strong> (B) Definition von &ldquo;schnell genug&rdquo; &mdash; ohne ein konkretes SLA gibt es keine Möglichkeit, die Abfrageleistung zu bewerten.</div>
        <div class="criticism" style="margin-top:6px"><strong>Korrekt vermieden:</strong> (D) vorgefertigte materialisierte Sicht überspezifiziert die Architektur; (F) Bewertungen sind NICHT für alle Produkte garantiert.</div>
        <div class="better-alt" style="margin-top:6px"><strong>Ideal:</strong> (A), (B), (C), (E).</div>

  cycles:
    - # Zyklus 1
      judging:
        options:
          - letter: "A"
            text: "Fehlender Top-N-Filter &mdash; gibt ALLE Produkte pro Kategorie zurück, nicht die Top 10"
            correct: true
          - letter: "B"
            text: "Bewertungs-JOIN vervielfacht die Zeilenanzahl &mdash; AVG(rating) wird über duplizierte Zeilen berechnet"
            correct: true
          - letter: "C"
            text: "GROUP BY sollte product_id für Korrektheit enthalten"
            correct: false
          - letter: "D"
            text: "Keine Indexstrategie oder Ausführungsplananalyse"
            correct: true
          - letter: "E"
            text: "Man sollte NoSQL für diese Art von analytischer Abfrage verwenden"
            correct: false
        studentSelections: [0, 3]
        doneSelected: false
        feedback:
          grade: "B"
          html: |
            <div class="criticism"><strong>Korrekt identifiziert:</strong> (A) fehlender Top-N-Filter, (D) keine Indexstrategie.</div>
            <div class="criticism" style="margin-top:6px"><strong>Übersehen:</strong> (B) Bewertungs-JOIN erzeugt duplizierte Zeilen, die AVG(rating) verfälschen. Dies ist ein subtiles, aber kritisches Korrektheitsproblem.</div>
            <div class="criticism" style="margin-top:6px"><strong>Korrekt vermieden:</strong> (C) GROUP BY ist korrekt mit product_name, wenn eindeutig; (E) SQL ist hier angemessen.</div>
            <div class="better-alt" style="margin-top:6px"><strong>Ideal:</strong> (A), (B), (D).</div>
      steering:
        options:
          - letter: "A"
            text: "&ldquo;Fügen Sie ROW_NUMBER() OVER (PARTITION BY Kategorie ORDER BY Umsatz DESC) hinzu, um auf Top 10 pro Kategorie zu beschränken.&rdquo;"
            correct: true
          - letter: "B"
            text: "&ldquo;Fügen Sie Indexempfehlungen und eine erwartete Ausführungsplananalyse hinzu.&rdquo;"
            correct: true
          - letter: "C"
            text: "&ldquo;Fügen Sie weitere JOINs hinzu, um Lieferanten- und Lagerinformationen einzubeziehen.&rdquo;"
            correct: false
          - letter: "D"
            text: "&ldquo;Schreiben Sie es als gespeicherte Prozedur für bessere Leistung um.&rdquo;"
            correct: false
        studentSelections: [0, 1]
        feedback:
          grade: "A"
          html: |
            <div class="criticism"><strong>Korrekt ausgewählt:</strong> (A) Fensterfunktion für Top-N, (B) Index/Ausführungsplan. Beide zielgerichtet und spezifisch.</div>
            <div class="criticism" style="margin-top:6px"><strong>Korrekt vermieden:</strong> (C) irrelevante Erweiterung des Umfangs, (D) vorzeitige Optimierung.</div>
            <div class="better-alt" style="margin-top:6px"><strong>Ideal:</strong> (A), (B) &mdash; optimale Auswahl.</div>
      summaryJudging: "Fehlender Top-N-Filter, kein Index/Ausführungsplan"
      summarySteering: "ROW_NUMBER für Top-10 hinzufügen; Indexanalyse einbeziehen"

    - # Zyklus 2 — Studierender markiert zu früh als abgeschlossen
      aiUpdate:
        html: |
          <div class="code-block">WITH ranked_products AS (
              SELECT
                  c.category_name,
                  p.product_name,
                  SUM(oi.quantity) AS units_sold,
                  SUM(oi.quantity * oi.unit_price) AS total_revenue,
                  AVG(r.rating) AS avg_rating,
                  ROW_NUMBER() OVER (
                      PARTITION BY c.category_id
                      ORDER BY SUM(oi.quantity * oi.unit_price) DESC
                  ) AS rk
              FROM order_items oi
              JOIN orders o ON oi.order_id = o.order_id
              JOIN products p ON oi.product_id = p.product_id
              JOIN categories c ON p.category_id = c.category_id
              LEFT JOIN reviews r ON p.product_id = r.product_id
              WHERE o.order_date &gt;= DATE_TRUNC('month', CURRENT_DATE)
              GROUP BY c.category_id, c.category_name,
                       p.product_id, p.product_name
          )
          SELECT * FROM ranked_products
          WHERE rk &lt;= 10
          ORDER BY category_name, rk;

          -- Empfohlene Indizes:
          -- CREATE INDEX idx_orders_date ON orders(order_date);
          -- CREATE INDEX idx_oi_order ON order_items(order_id, product_id);</div>
        summary: "CTE mit ROW_NUMBER für Top-10 pro Kategorie. Indexempfehlungen hinzugefügt. Bewertungs-JOIN immer noch ungefiltert."
      judging:
        options:
          - letter: "A"
            text: "Bewertungs-JOIN erzeugt immer noch duplizierte Zeilen &mdash; AVG(rating) wird durch das Bestellvolumen verfälscht"
            correct: true
          - letter: "B"
            text: "Monatsvergleich fehlt immer noch in den Anforderungen"
            correct: true
          - letter: "C"
            text: "CTE macht die Abfrage langsamer als die ursprüngliche"
            correct: false
        studentSelections: []
        doneSelected: true
        feedback:
          grade: "C"
          html: |
            <div class="criticism"><strong>Vorzeitiger Abschluss.</strong> Zwei echte Probleme bestehen weiter: (A) Bewertungs-JOIN verfälscht die Bewertungen &mdash; eine Zeile für ein Produkt mit 100 Bestellungen erhält 100-faches Gewicht in AVG; (B) Monatsvergleich war eine genannte Anforderung.</div>
            <div class="better-alt" style="margin-top:6px"><strong>Besser:</strong> Sowohl (A) als auch (B) auswählen und die KI anleiten, sie zu korrigieren, bevor als abgeschlossen markiert wird.</div>
      steering: null
      summaryJudging: "Studierender hat die Lösung als abgeschlossen markiert (verfrüht)"
      summarySteering: null

  completion:
    grades:
      framing: "B"
      judging: "C"
      steering: "A"
    summary: "Die Steuerung war ausgezeichnet &mdash; Korrekturen waren spezifisch und gut gewählt. Bei der Rahmung fehlte die Definition des Leistungs-SLA. Beurteilung war der schwächste Bereich: hat das Kardinalitätsproblem der Bewertungen in Zyklus 1 übersehen und in Zyklus 2 mit zwei verbleibenden echten Problemen verfrüht abgeschlossen. Üben Sie, alle Probleme zu identifizieren, bevor Sie eine Lösung als abgeschlossen markieren."

oe:
  aiSolution:
    html: |
      <div class="code-block">WITH monthly_sales AS (
          SELECT
              c.category_name,
              p.product_id,
              p.product_name,
              SUM(oi.quantity) AS units_sold,
              SUM(oi.quantity * oi.unit_price) AS total_revenue,
              ROW_NUMBER() OVER (
                  PARTITION BY c.category_id
                  ORDER BY SUM(oi.quantity * oi.unit_price) DESC
              ) AS rk
          FROM order_items oi
          JOIN orders o ON oi.order_id = o.order_id
          JOIN products p ON oi.product_id = p.product_id
          JOIN categories c ON p.category_id = c.category_id
          WHERE o.order_date &gt;= DATE_TRUNC('month', CURRENT_DATE)
          GROUP BY c.category_id, c.category_name,
                   p.product_id, p.product_name
      )
      SELECT ms.*,
          (SELECT AVG(r.rating) FROM reviews r
           WHERE r.product_id = ms.product_id) AS avg_rating
      FROM monthly_sales ms
      WHERE rk &lt;= 10
      ORDER BY category_name, rk;</div>
    summary: "CTE mit ROW_NUMBER für Top-10. Korrelierte Unterabfrage für Bewertungen. Keine Indexanalyse, kein Monatsvergleich."

  framing:
    hint: "Fügen Sie Verfeinerungsabschnitte hinzu, um die vagen Anforderungen zu klären. Jeder Abschnitt sollte eine Mehrdeutigkeit im Rohproblem adressieren."
    sections:
      - name: "Annahmen: Datenvolumen und Struktur"
        text: "Schätzung ~8M Bestellungen, ~200K Produkte, ~40 Kategorien in einem normalisierten relationalen Schema. Produkte haben höchstens eine Kategoriezuordnung."
      - name: "Einschränkungen: Leistungs-SLA"
        text: "Dashboard aktualisiert sich automatisch alle 5 Minuten. Abfrage muss in unter 3 Sekunden zurückkehren. Indexierungsstrategie für die WHERE-Klausel auf order_date berücksichtigen."
      - name: "Klarstellung: Berichtsumfang"
        text: "&ldquo;Meistverkauft&rdquo; = Top 10 pro Kategorie nach Gesamtumsatz. Monatlich = Kalendermonat. Vergleich mit dem Vormonat für Trendanalyse einschließen."
    feedback:
      grade: "A"
      html: |
        <div class="criticism"><strong>Gründliche Rahmung.</strong> Datenvolumen quantifiziert, Leistungs-SLA definiert, Top-N-Semantik geklärt und Monatsvergleich spezifiziert.</div>
        <div class="criticism" style="margin-top:6px"><strong>Geringfügige Lücke:</strong> Könnte adressieren, wie mit Produkten ohne Bewertungen (NULL-Bewertungen) umgegangen wird.</div>

  cycles:
    - # Zyklus 1
      judging:
        sections:
          - name: "Problem: Korrelierte Unterabfrage für Bewertungen"
            text: "Die Unterabfrage für avg_rating wird einmal pro Ergebniszeile ausgeführt. Bei 400 Zeilen (10 pro Kategorie × 40 Kategorien) bedeutet das 400 separate Abfragen. Sollte ein voraggregierter JOIN oder CTE sein."
          - name: "Problem: Monatsvergleich fehlt"
            text: "Die Anforderungen spezifizieren einen Monatsvergleich, aber die Abfrage zeigt nur Daten des aktuellen Monats. Vormonat muss im selben Ergebnissatz enthalten sein."
        doneSelected: false
        feedback:
          grade: "A"
          html: |
            <div class="criticism"><strong>Ausgezeichnete Analyse.</strong> Beide Probleme sind korrekt identifiziert mit spezifischem, quantifiziertem Reasoning. Das Anliegen bezüglich der korrelierten Unterabfrage ist mit Zeilenanzahlschätzungen gut erklärt.</div>
      steering:
        sections:
          - name: "Anweisung: Korrelierte Unterabfrage ersetzen"
            text: "Erstellen Sie einen Bewertungs-CTE, der AVG(rating) pro product_id einmal berechnet, dann LEFT JOIN mit der Hauptabfrage. Dies eliminiert die Unterabfrage pro Zeile."
          - name: "Anweisung: Vormonatsvergleich hinzufügen"
            text: "Fügen Sie einen zweiten CTE für Vormonatsdaten hinzu. Das finale SELECT sollte sowohl aktuellen als auch Vormonatsumsatz mit einer Prozentänderungsspalte enthalten."
        feedback:
          grade: "A"
          html: |
            <div class="criticism"><strong>Zielgerichtet.</strong> Beide Anweisungen sind spezifisch, bieten klare Implementierungshinweise und adressieren direkt die identifizierten Probleme.</div>
      summaryJudging: "Leistungsproblem der korrelierten Unterabfrage, fehlender Monatsvergleich"
      summarySteering: "Korrelierte Unterabfrage durch CTE ersetzen; Vormonatsvergleich hinzufügen"

    - # Zyklus 2 — Studierender markiert als abgeschlossen
      aiUpdate:
        html: |
          <div class="code-block">WITH product_ratings AS (
              SELECT product_id, AVG(rating) AS avg_rating,
                     COUNT(*) AS review_count
              FROM reviews GROUP BY product_id
          ),
          current_month AS (
              SELECT c.category_name, p.product_id, p.product_name,
                     SUM(oi.quantity) AS units_sold,
                     SUM(oi.quantity * oi.unit_price) AS revenue,
                     ROW_NUMBER() OVER (PARTITION BY c.category_id
                         ORDER BY SUM(oi.quantity*oi.unit_price) DESC) AS rk
              FROM order_items oi
              JOIN orders o ON oi.order_id = o.order_id
              JOIN products p ON oi.product_id = p.product_id
              JOIN categories c ON p.category_id = c.category_id
              WHERE o.order_date &gt;= DATE_TRUNC('month', CURRENT_DATE)
              GROUP BY c.category_id, c.category_name, p.product_id, p.product_name
          ),
          prev_month AS (
              SELECT p.product_id,
                     SUM(oi.quantity * oi.unit_price) AS prev_revenue
              FROM order_items oi
              JOIN orders o ON oi.order_id = o.order_id
              JOIN products p ON oi.product_id = p.product_id
              WHERE o.order_date &gt;= DATE_TRUNC('month', CURRENT_DATE) - INTERVAL '1 month'
                AND o.order_date &lt; DATE_TRUNC('month', CURRENT_DATE)
              GROUP BY p.product_id
          )
          SELECT cm.category_name, cm.product_name, cm.units_sold,
                 cm.revenue, pr.avg_rating, pr.review_count,
                 pm.prev_revenue,
                 ROUND((cm.revenue - pm.prev_revenue) / pm.prev_revenue * 100, 1) AS pct_change
          FROM current_month cm
          LEFT JOIN product_ratings pr ON cm.product_id = pr.product_id
          LEFT JOIN prev_month pm ON cm.product_id = pm.product_id
          WHERE cm.rk &lt;= 10
          ORDER BY cm.category_name, cm.rk;

          -- Indizes: idx_orders_date, idx_oi_order_product</div>
        summary: "Drei CTEs: Bewertungen (voraggregiert), aktueller Monat, Vormonat. Prozentänderungsspalte. Indexhinweise."
      judging:
        sections: []
        doneSelected: true
        feedback:
          grade: "B"
          html: |
            <div class="criticism"><strong>Vertretbarer Abschluss.</strong> Hauptprobleme sind gelöst. Verbleibendes geringfügiges Anliegen: pct_change wird bei Division durch Null einen Fehler verursachen, wenn prev_revenue NULL oder 0 ist. Ein NULLIF- oder COALESCE-Schutz wäre ratsam.</div>
      steering: null
      summaryJudging: "Studierender hat die Lösung als abgeschlossen markiert"
      summarySteering: null

  completion:
    grades:
      framing: "A"
      judging: "B"
      steering: "A"
    summary: "Starke Gesamtleistung. Die Rahmung war gründlich mit klarer SLA-Definition. Die Beurteilung hat die beiden Hauptprobleme in Zyklus 1 korrekt identifiziert. Die Steuerung lieferte spezifische, implementierbare Anweisungen. Geringfügiger Abzug bei der Beurteilung: hätte den Division-durch-Null-Grenzfall in der finalen Ausgabe erkennen können, bevor als abgeschlossen markiert wurde."
