            <div class="criticism"><strong>Bewertung:</strong> Als abgeschlossen zu markieren war vertretbar, hat aber (A) übersehen: evict_old durchsucht immer noch den gesamten Puffer, obwohl nur Entfernung am Anfang nötig ist.</div>
            <div class="better-alt" style="margin-top:6px"><strong>Besser:</strong> (A) auswählen und eine letzte Korrektur senden, bevor als abgeschlossen markiert wird.</div>
      steering: null
      summaryJudging: "Studierender hat die Lösung als abgeschlossen markiert"
      summarySteering: null

  completion:
    grades:
      framing: "B"
      judging: "B"
      steering: "A"
    summary: "Starke Steuerung &mdash; Korrekturen waren spezifisch und zielgerichtet. Bei der Rahmung fehlte der Stabilitäts-Tiebreaker (sensor_id). Beurteilung: hat durchgehend die Hauptprobleme erkannt, aber sekundäre Bedenken übersehen (Kopierkosten von poll(), Eviktionsoptimierung). Versuchen Sie &ldquo;was könnte sonst noch falsch sein?&rdquo; nachdem Sie das erste Problem gefunden haben."

oe:
  aiSolution:
    html: |
      <div class="code-block">MODULE SortedSensorBuffer:
          buffer = []
          batch_queue = []
          BATCH_THRESHOLD = 500

          FUNCTION ingest(reading):
              batch_queue.append(reading)
              if len(batch_queue) &gt;= BATCH_THRESHOLD or time_since_last_flush &gt; 50ms:
                  flush()

          FUNCTION flush():
              sort(batch_queue, key=timestamp)
              buffer = merge(buffer, batch_queue)
              batch_queue = []
              evict_old(buffer)

          FUNCTION poll():
              if batch_queue: flush()
              return copy(buffer)  // immutable snapshot</div>
    summary: "Batch-Merge mit Warteschlange. BATCH_THRESHOLD=500. Unveränderlicher Snapshot bei poll()."

  framing:
    hint: "Das Rohproblem ist absichtlich unvollständig. Fügen Sie unten Verfeinerungsabschnitte hinzu &mdash; Annahmen, Einschränkungen, Klarstellungen &mdash; um es in eine klar definierte Aufgabe zu verwandeln."
    sections:
      - name: "Annahmen: Sortierschlüssel und Reihenfolge"
        text: "Primärer Sortierschlüssel ist der Zeitstempel (chronologische Reihenfolge für das Dashboard). sensor_id als sekundärer Schlüssel für Stabilität bei Zeitstempelkollisionen verwenden. Messwerte können aufgrund von Netzwerk-Jitter leicht außer der Reihe eintreffen."
      - name: "Einschränkungen: Skalierung und Leistung"
        text: "Schätzung 200-500 Sensoren, die 200-500 Tupel/Sek. normal erzeugen. &ldquo;Spitzen&rdquo; = 3-5-fache der normalen Rate (1.000-2.500 Tupel/Sek.). Puffer deckt 60-Sekunden-Gleitfenster ab (~30.000 Einträge bei Spitzenlast). Abfragelatenz muss unter 50 ms bleiben."
      - name: "Klarstellung: Ausgabeformat"
        text: "Das Dashboard benötigt den vollständigen sortierten Puffer (nicht top-k). Die Ausgabe sollte ein unveränderlicher Snapshot sein &mdash; keine gleichzeitige Änderung während der Poll-Lesevorgänge."
    feedback:
      grade: "A"
      html: |
        <div class="criticism"><strong>Stärken:</strong> Ausgezeichnete Rahmung. Hat den Sortierschlüssel mit Stabilitäts-Tiebreaker identifiziert, Skalierung und Stoßrate quantifiziert, Pufferfenster spezifiziert, Anforderungen an die Abfragelatenz definiert und Snapshot-Semantik adressiert.</div>
        <div class="criticism" style="margin-top:6px"><strong>Geringfügige Lücke:</strong> Könnte angeben, wie weit Messwerte außer der Reihe eintreffen können (z. B. maximaler Jitter von 5 Sekunden).</div>
        <div class="better-alt" style="margin-top:6px"><strong>Verbesserung:</strong> Einen Abschnitt &ldquo;Erfolgskriterien&rdquo; mit konkreten Leistungszielen hinzufügen (z. B. 99. Perzentil Aufnahmelatenz &lt; 2 ms bei Stoß).</div>

  cycles:
    - # Zyklus 1
      judging:
        sections:
          - name: "Problem: Stoßleistung nicht analysiert"
            text: "Die KI hat Batch-Merge gewählt, aber nie die Worst-Case-Kosten während eines Stoßes analysiert. Mit b=2.500 und n=25.000 werden keine tatsächlichen Zahlen angegeben. Der Vergleichstabelle fehlt ebenfalls eine Stoßszenario-Analyse."
          - name: "Problem: BATCH_THRESHOLD-Begründung fehlt"
            text: "BATCH_THRESHOLD = 500 wird angegeben, aber nie begründet. Warum 500? Wie hängt es mit dem 200-ms-Abfrageintervall des Dashboards zusammen?"
          - name: "Problem: Overhead durch vollständige poll()-Kopie"
            text: "poll() gibt copy(buffer) zurück &mdash; Kopieren von ~30.000 Einträgen alle 200 ms. Bei 5 Abfragen/Sek. sind das 150.000 Eintragskopien/Sek. Copy-on-Write-Semantik in Betracht ziehen."
        doneSelected: false
        feedback:
          grade: "A"
          html: |
            <div class="criticism"><strong>Ausgezeichnete Analyse.</strong> Drei echte Probleme identifiziert: fehlende Stoßanalyse (kritisch), unbegründeter Schwellenwert (mittel) und poll()-Kopie-Overhead (berechtigt).</div>
            <div class="criticism" style="margin-top:6px"><strong>Geringfügiges Versäumnis:</strong> evict_old() durchsucht den gesamten Puffer, muss aber nur am Anfang entfernen &mdash; O(n) vs. O(k) Optimierung.</div>
      steering:
        sections:
          - name: "Anweisung: Stoßleistungsanalyse hinzufügen"
            text: "Berechnen Sie die genaue Operationsanzahl für einen Stoß von b=2.500 in einen Puffer von n=25.000. Vergleichen Sie den alten Ansatz (Einfügung pro Element) mit Batch-Merge. Zeigen Sie den Beschleunigungsfaktor."
          - name: "Anweisung: BATCH_THRESHOLD begründen"
            text: "Begründen Sie BATCH_THRESHOLD = 500. Setzen Sie es in Beziehung zur normalen Verkehrsrate, zur Dashboard-Abfragefrequenz (200 ms) und zum Kompromiss zwischen Latenz und Merge-Effizienz."
        feedback:
          grade: "A"
          html: |
            <div class="criticism"><strong>Zielgerichtete Steuerung.</strong> Beide Anweisungen adressieren direkt die beiden kritischsten Probleme mit spezifischem Kontext.</div>
            <div class="better-alt" style="margin-top:6px"><strong>Verbesserung:</strong> Könnte auch das poll()-Kopie-Problem in diesem Zyklus adressieren.</div>
      summaryJudging: "Fehlende Stoßanalyse, unbegründeter Schwellenwert, poll()-Kopie-Overhead"
      summarySteering: "Stoßleistungsanalyse hinzufügen; BATCH_THRESHOLD begründen"

    - # Zyklus 2 — Studierender markiert als abgeschlossen
      aiUpdate:
        html: |
          <div class="code-block">MODULE SortedSensorBuffer:
              BATCH_THRESHOLD = 500  // ~1s normal traffic; flush before 200ms poll
              FLUSH_INTERVAL = 150ms // ensures fresh data for 200ms poll cycle

              buffer = deque()       // front-eviction in O(k)
              batch_queue = []
              snapshot = None        // cached immutable copy

              FUNCTION ingest(reading):
                  batch_queue.append(reading)
                  snapshot = None    // invalidate cache
                  if len(batch_queue) &gt;= BATCH_THRESHOLD or elapsed &gt; FLUSH_INTERVAL:
                      flush()

              FUNCTION flush():
                  merge_sort(batch_queue)              // O(b log b)
                  buffer = merge(buffer, batch_queue)  // O(n + b)
                  batch_queue = []
                  evict_expired(buffer)                // O(k) front removal
                  snapshot = None

              FUNCTION poll():
                  if batch_queue: flush()
                  if snapshot is None:
                      snapshot = freeze(buffer)        // O(n) but cached
                  return snapshot</div>
          <p class="text-sm" style="margin-top:8px"><strong>Stoßanalyse (b=2.500, n=25.000):</strong></p>
          <ul class="text-sm" style="padding-left:20px;margin-top:4px">
          <li>merge_sort(batch): 2.500 &times; 11,3 = ~28.200 Vergleiche</li>
          <li>merge: 25.000 + 2.500 = 27.500 Operationen</li>
          <li>Gesamt: ~55.700 Ops vs. alter Ansatz: 62.500.000</li>
          <li><strong>Beschleunigung: ~1.122&times;</strong></li>
          </ul>
        summary: "Batch-Merge mit Deque-Puffer, zwischengespeicherte Snapshots. BATCH_THRESHOLD=500, FLUSH_INTERVAL=150ms. Stoß: ~55.700 Ops (1.122× Beschleunigung)."
      judging:
        sections: []
        doneSelected: true
        feedback:
          grade: "A"
          html: |
            <div class="criticism"><strong>Angemessene Entscheidung.</strong> Die Lösung adressiert alle aufgeworfenen kritischen Probleme. Das verbleibende Eviktionsdetail wurde bereits korrigiert. Als abgeschlossen zu markieren war gerechtfertigt.</div>
      steering: null
      summaryJudging: "Studierender hat die Lösung als abgeschlossen markiert"
      summarySteering: null

  completion:
    grades:
      framing: "A"
      judging: "A"
      steering: "A"
    summary: "Herausragende Leistung in allen drei Dimensionen. Die Rahmung war gründlich mit gut begründeten Annahmen. Die Beurteilung identifizierte kritische Probleme mit quantifizierter Analyse. Die Steuerung war präzise und führte zu bedeutsamen Verbesserungen. Die Entscheidung, in Zyklus 2 als abgeschlossen zu markieren, war angemessen."
