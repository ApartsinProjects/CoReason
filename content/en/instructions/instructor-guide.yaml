id: instructor-guide
title: "Instructor Guide"
sections:
  - title: "Creating Challenges"
    content: "Use the Create Challenge form to define new challenges. Provide a raw problem that is intentionally vague — students must refine it."
  - title: "Preview Mode"
    content: "Use Preview to run through a challenge as a student would see it, with rubric overlay showing expected answers."
  - title: "Analytics"
    content: "The Analytics dashboard shows aggregate performance across all students and challenges in your courses."
