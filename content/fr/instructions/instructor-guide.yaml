id: instructor-guide
title: "Guide de l'enseignant"
sections:
  - title: "Vue d'ensemble"
    content: |
      Le CoReasoning Lab est un outil pédagogique conçu pour développer les compétences
      de raisonnement critique des étudiants dans le contexte de la collaboration avec l'IA.
      En tant qu'enseignant, vous pouvez créer des défis, suivre les progrès des étudiants
      et analyser les performances de la classe.

  - title: "Création de défis"
    content: |
      Chaque défi se compose de :
      - Un problème brut avec des ambiguïtés intentionnelles
      - Des options/sections de cadrage (CM ou RO)
      - Une solution IA initiale avec des défauts délibérés
      - Plusieurs cycles de jugement et d'orientation avec des retours
      - Des critères d'achèvement et une note finale

  - title: "Analytique"
    content: |
      Le tableau de bord analytique affiche :
      - La distribution des notes par compétence (cadrage, jugement, orientation)
      - Les erreurs fréquentes et les schémas de compréhension erronée
      - La progression au fil du temps
      - Les comparaisons entre cohortes

  - title: "Bonnes pratiques"
    content: |
      - Commencez par le mode entraînement pour que les étudiants se familiarisent
        avec le processus.
      - Utilisez le mode évaluation pour les évaluations notées.
      - Examinez les résultats analytiques pour identifier les lacunes d'apprentissage
        communes à la classe.
      - Encouragez les étudiants à justifier leurs sélections de cadrage.
