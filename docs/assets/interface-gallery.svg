<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 660" font-family="Arial, Helvetica, sans-serif">
  <defs><style>
    .card{fill:#fff;stroke:#d4dae6;stroke-width:1.4}
    .hd{fill:#2a5db0}.hd2{fill:#1e4a94}
    .ht{fill:#fff;font-weight:bold;font-size:12px}
    .lbl{fill:#888;font-size:9px}
    .tx{fill:#333;font-size:9.5px}
    .row{fill:#f4f7fc}.rowb{fill:#fff}
    .gA{fill:#3a9d6f}.gB{fill:#2a5db0}.gC{fill:#e07b39}
    .cap{fill:#444;font-size:11px;font-weight:bold}
  </style></defs>
  <rect width="940" height="660" fill="#f6f8fc"/>

  <!-- ===== TL: STUDENT DASHBOARD ===== -->
  <g transform="translate(20,20)">
    <rect class="card" width="440" height="280" rx="8"/>
    <rect class="hd" width="440" height="30" rx="8"/>
    <text x="14" y="20" class="ht">Student Dashboard</text>
    <text x="360" y="20" class="lbl" fill="#cfe0ff">student view</text>
    <text x="14" y="52" class="lbl">PENDING CHALLENGES</text>
    <g transform="translate(14,60)">
      <rect class="row" width="412" height="20"/><rect class="rowb" y="20" width="412" height="20"/><rect class="row" y="40" width="412" height="20"/>
      <text x="6" y="14" class="tx">Sorting Pipeline for Sensor Data</text><text x="250" y="14" class="lbl">Algorithms</text><text x="360" y="14" class="gB" font-size="9.5" font-weight="bold">Practice</text>
      <text x="6" y="34" class="tx">Supply &amp; Demand Shock</text><text x="250" y="34" class="lbl">Microecon.</text><text x="360" y="34" class="gC" font-size="9.5" font-weight="bold">Assess</text>
      <text x="6" y="54" class="tx">Overfitting Diagnosis</text><text x="250" y="54" class="lbl">ML</text><text x="360" y="54" class="gB" font-size="9.5" font-weight="bold">Practice</text>
    </g>
    <text x="14" y="148" class="lbl">MY COURSES</text>
    <g transform="translate(14,156)">
      <rect class="card" width="128" height="44" rx="5"/><text x="10" y="20" class="tx">Deep Learning 101</text><text x="10" y="35" class="lbl">4 challenges</text>
      <rect class="card" x="140" width="128" height="44" rx="5"/><text x="150" y="20" class="tx">Database Systems</text><text x="150" y="35" class="lbl">3 challenges</text>
      <rect class="card" x="280" width="128" height="44" rx="5"/><text x="290" y="20" class="tx">Software Eng.</text><text x="290" y="35" class="lbl">5 challenges</text>
    </g>
    <text x="14" y="232" class="lbl">RECENT GRADES (Framing / Judging / Steering)</text>
    <g transform="translate(14,240)" font-size="11" font-weight="bold">
      <rect class="gB" width="22" height="18" rx="3"/><text x="8" y="13" fill="#fff">B</text>
      <rect class="gA" x="26" width="22" height="18" rx="3"/><text x="34" y="13" fill="#fff">A</text>
      <rect class="gB" x="52" width="22" height="18" rx="3"/><text x="60" y="13" fill="#fff">B</text>
      <text x="84" y="13" class="lbl">Sorting Pipeline run #3</text>
    </g>
  </g>

  <!-- ===== TR: INSTRUCTOR CREATE CHALLENGE ===== -->
  <g transform="translate(480,20)">
    <rect class="card" width="440" height="280" rx="8"/>
    <rect class="hd2" width="440" height="30" rx="8"/>
    <text x="14" y="20" class="ht">Create Challenge</text>
    <text x="350" y="20" class="lbl" fill="#cfe0ff">instructor view</text>
    <text x="14" y="52" class="lbl">CHALLENGE DETAILS</text>
    <g transform="translate(14,58)">
      <text x="0" y="10" class="lbl">Title</text><rect class="card" y="14" width="412" height="18" rx="3"/><text x="6" y="27" class="tx">Sorting Pipeline for Sensor Data</text>
      <text x="0" y="48" class="lbl">Course &amp; Subject</text><rect class="card" y="52" width="200" height="18" rx="3"/><text x="6" y="65" class="tx">Algorithms &#8250; Sorting</text>
      <rect class="card" x="212" y="52" width="200" height="18" rx="3"/><text x="218" y="65" class="tx">Visibility: Public</text>
      <text x="0" y="86" class="lbl">Challenge Type</text>
      <rect class="gB" y="90" width="70" height="18" rx="9"/><text x="10" y="103" fill="#fff" font-size="9.5">Practice</text>
      <rect class="card" x="76" y="90" width="70" height="18" rx="9"/><text x="86" y="103" class="tx" font-size="9.5">Assessment</text>
    </g>
    <text x="14" y="190" class="lbl">EVALUATION RUBRICS (auto-generated)</text>
    <g transform="translate(14,198)">
      <rect class="card" width="412" height="66" rx="5" fill="#f7f9fc"/>
      <text x="8" y="16" class="tx" font-weight="bold" fill="#2a5db0">Framing</text><text x="70" y="16" class="lbl">scope, constraints, success metric (3 criteria)</text>
      <text x="8" y="34" class="tx" font-weight="bold" fill="#2a5db0">Judging</text><text x="70" y="34" class="lbl">recall of seeded flaws, precision (4 criteria)</text>
      <text x="8" y="52" class="tx" font-weight="bold" fill="#2a5db0">Steering</text><text x="70" y="52" class="lbl">specificity, prioritization, convergence (3)</text>
    </g>
  </g>

  <!-- ===== BL: STUDENT ANALYTICS ===== -->
  <g transform="translate(20,320)">
    <rect class="card" width="440" height="300" rx="8"/>
    <rect class="hd" width="440" height="30" rx="8"/>
    <text x="14" y="20" class="ht">My Results &#8212; Trend Over Time</text>
    <text x="350" y="20" class="lbl" fill="#cfe0ff">student report</text>
    <!-- mini line chart of 3 skills -->
    <g transform="translate(30,50)">
      <line x1="0" y1="0" x2="0" y2="120" stroke="#ccc"/><line x1="0" y1="120" x2="380" y2="120" stroke="#ccc"/>
      <text x="-18" y="6" class="lbl">A</text><text x="-18" y="64" class="lbl">B</text><text x="-18" y="118" class="lbl">C</text>
      <polyline fill="none" stroke="#2a5db0" stroke-width="2" points="10,90 100,70 190,60 280,55 360,40"/>
      <polyline fill="none" stroke="#3a9d6f" stroke-width="2" points="10,80 100,50 190,40 280,20 360,10"/>
      <polyline fill="none" stroke="#e07b39" stroke-width="2" points="10,100 100,95 190,80 280,75 360,60"/>
      <text x="368" y="44" class="tx" fill="#2a5db0" font-size="9">Framing</text>
      <text x="368" y="14" class="tx" fill="#3a9d6f" font-size="9">Judging</text>
      <text x="368" y="64" class="tx" fill="#e07b39" font-size="9">Steering</text>
    </g>
    <text x="14" y="206" class="lbl">COMPLETED CHALLENGE RUNS</text>
    <g transform="translate(14,214)">
      <rect class="row" width="412" height="20"/><rect class="rowb" y="20" width="412" height="20"/><rect class="row" y="40" width="412" height="20"/>
      <text x="6" y="14" class="tx">Sorting Pipeline</text><text x="180" y="14" class="lbl">2026-03-16</text><text x="300" y="14" font-size="9.5" font-weight="bold"><tspan class="gB">B</tspan> <tspan class="gA">A</tspan> <tspan class="gB">B</tspan></text>
      <text x="6" y="34" class="tx">Supply &amp; Demand</text><text x="180" y="34" class="lbl">2026-03-15</text><text x="300" y="34" font-size="9.5" font-weight="bold"><tspan class="gC">C</tspan> <tspan class="gB">B</tspan> <tspan class="gC">C</tspan></text>
      <text x="6" y="54" class="tx">Overfitting Dx</text><text x="180" y="54" class="lbl">2026-03-14</text><text x="300" y="54" font-size="9.5" font-weight="bold"><tspan class="gA">A</tspan> <tspan class="gA">A</tspan> <tspan class="gB">B</tspan></text>
    </g>
  </g>

  <!-- ===== BR: INSTRUCTOR ANALYTICS ===== -->
  <g transform="translate(480,320)">
    <rect class="card" width="440" height="300" rx="8"/>
    <rect class="hd2" width="440" height="30" rx="8"/>
    <text x="14" y="20" class="ht">Course Analytics</text>
    <text x="320" y="20" class="lbl" fill="#cfe0ff">instructor report</text>
    <rect x="350" y="6" width="78" height="18" rx="4" fill="#ffffff" opacity="0.2"/><text x="358" y="19" class="ht" font-size="9">Export PDF</text>
    <text x="14" y="52" class="lbl">GRADE DISTRIBUTION BY RUBRIC</text>
    <g transform="translate(24,60)">
      <!-- three skill groups, stacked A/B/C -->
      <g><text x="20" y="92" class="lbl">Framing</text>
        <rect class="gA" x="10" y="20" width="24" height="20"/><rect class="gB" x="10" y="40" width="24" height="28"/><rect class="gC" x="10" y="68" width="24" height="14"/></g>
      <g transform="translate(120,0)"><text x="14" y="92" class="lbl">Judging</text>
        <rect class="gA" x="10" y="10" width="24" height="34"/><rect class="gB" x="10" y="44" width="24" height="22"/><rect class="gC" x="10" y="66" width="24" height="16"/></g>
      <g transform="translate(240,0)"><text x="12" y="92" class="lbl">Steering</text>
        <rect class="gA" x="10" y="28" width="24" height="14"/><rect class="gB" x="10" y="42" width="24" height="30"/><rect class="gC" x="10" y="72" width="24" height="10"/></g>
      <g transform="translate(330,8)" font-size="9"><rect class="gA" width="10" height="10"/><text x="14" y="9" class="lbl">A</text>
        <rect class="gB" y="16" width="10" height="10"/><text x="14" y="25" class="lbl">B</text>
        <rect class="gC" y="32" width="10" height="10"/><text x="14" y="41" class="lbl">C</text></g>
    </g>
    <text x="14" y="196" class="lbl">PER-STUDENT RESULTS</text>
    <g transform="translate(14,204)">
      <rect class="row" width="412" height="20"/><text x="6" y="14" class="lbl">Student</text><text x="200" y="14" class="lbl">Completed</text><text x="300" y="14" class="lbl">Overall (F/J/S)</text>
      <rect class="rowb" y="20" width="412" height="20"/><text x="6" y="34" class="tx">A. Cohen</text><text x="210" y="34" class="tx">4/4</text><text x="300" y="34" font-size="9.5" font-weight="bold"><tspan class="gA">A</tspan> <tspan class="gA">A</tspan> <tspan class="gB">B</tspan></text>
      <rect class="row" y="40" width="412" height="20"/><text x="6" y="54" class="tx">B. Levi</text><text x="210" y="54" class="tx">3/4</text><text x="300" y="54" font-size="9.5" font-weight="bold"><tspan class="gB">B</tspan> <tspan class="gC">C</tspan> <tspan class="gB">B</tspan></text>
      <rect class="rowb" y="60" width="412" height="20"/><text x="6" y="74" class="tx">C. Mizrahi</text><text x="210" y="74" class="tx">4/4</text><text x="300" y="74" font-size="9.5" font-weight="bold"><tspan class="gB">B</tspan> <tspan class="gA">A</tspan> <tspan class="gA">A</tspan></text>
    </g>
  </g>

  <text x="470" y="650" text-anchor="middle" class="cap">CoReasoning Lab interfaces: student dashboard, instructor challenge authoring, student trend report, and instructor per-rubric analytics.</text>
</svg>
