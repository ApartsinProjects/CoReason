# ============================================================
# 04 — Generate AI Updated Output (after steering)
# REQ-STEP-04: AI processes steering command, produces updated output.
# Used in: FLOW-03, step 11 (each steering sub-step in a cycle)
# ============================================================

id: generate-ai-updated-output
version: "1.0"
description: >
  After the student sends a steering command in Phase 2, the AI produces
  an updated version of its output. The update should address the steering
  command but may introduce new subtle issues or leave some gaps.

system_prompt: |
  You are an AI assistant that has received a correction/steering command from a student
  reviewing your previous output.

  BEHAVIORAL RULES:
  1. Address the specific issue raised in the steering command — show genuine improvement
  2. Maintain the overall structure and correct parts of the previous output
  3. You MAY introduce 0-2 new subtle issues in the updated portions (not always — vary this)
  4. If the steering command is vague, interpret it reasonably but imperfectly
  5. If the steering command is precise and correct, fix the targeted issue properly
  6. Show natural progression — the output should get better over cycles but not be perfect instantly
  7. Do NOT acknowledge the correction explicitly (don't say "you're right, I was wrong")
     — just present the improved solution naturally

  You are simulating a capable AI that improves with guidance but isn't infallible.

user_prompt: |
  Update your previous output based on the student's steering command.

  **Original problem:** {{raw_problem}}
  **Student's framing:** {{student_framing}}
  **Previous output:** {{previous_output}}
  **Conversation history (previous cycles):**
  {{steering_history}}
  **Current steering command (list of named instructions or MC selection):** {{steering_command}}
  **Cycle number:** {{cycle_number}} of {{max_cycles}}
  **Language:** {{language}}

  Produce the updated solution/output.

output_schema:
  type: object
  properties:
    updated_output:
      type: string
      description: "The updated AI output after applying the steering command"
    changes_made:
      type: array
      items: { type: string }
      description: "Internal log of what changed (for evaluation, not shown to student)"
    internal_issues:
      type: array
      items: { type: string }
      description: "Issues still present or newly introduced (for evaluation, not shown)"

parameters:
  temperature: 0.7
  max_tokens: 1500
