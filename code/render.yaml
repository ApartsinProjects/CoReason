# Render Blueprint - CoReason Staging
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: coreason-staging
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build && npm run db:setup
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: staging
      - key: PORT
        value: 3000
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: coreason-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false

databases:
  - name: coreason-db
    plan: free
    region: oregon
