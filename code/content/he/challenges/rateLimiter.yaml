id: rateLimiter
title: "מגביל קצב API לאפליקציית בנקאות"
course: "הנדסת תוכנה"
subject: "עיצוב מערכות &rsaquo; הגבלת קצב"
maxCycles: 4
rawProblem: "תכננו תווכה (middleware) להגבלת קצב עבור REST API שמשרת אפליקציית בנקאות סלולרית. המגביל צריך למנוע שימוש לרעה תוך מתן אפשרות למשתמשים לגיטימיים לבצע פעולות רגילות כמו בדיקת יתרה מספר פעמים. המערכת מטפלת ב&ldquo;תנועה כבדה&rdquo; וחייבת להיות &ldquo;זמינה ברמה גבוהה.&rdquo; ספקו פסאודו-קוד לתווכה, השוו לפחות שני אלגוריתמים להגבלת קצב, והסבירו את בחירת האחסון."
rawProblemShort: "תווכת הגבלת קצב ל-API בנקאי &hellip; מניעת שימוש לרעה, מתן גישה לגיטימית. תנועה כבדה, זמינות גבוהה."

mc:
  aiSolution:
    html: |
      <div class="code-block">MIDDLEWARE RateLimiter:
          limits = {
              "/auth":     {max: 5,  window: 60},
              "/balance":  {max: 60, window: 60},
              "/transfer": {max: 10, window: 60},
              "default":   {max: 30, window: 60}
          }
          store = {}  // in-memory dictionary

          FUNCTION handle(request):
              key = request.user_id + ":" + request.endpoint
              limit = limits[request.endpoint] OR limits["default"]

              current = store.get(key, {count: 0, start: now()})
              if now() - current.start &gt; limit.window:
                  current = {count: 0, start: now()}

              current.count += 1
              store[key] = current

              if current.count &gt; limit.max:
                  return Response(429, {"Retry-After": ...})

              return next(request)</div>
      <p class="text-sm" style="margin-top:8px"><strong>השוואת אלגוריתמים:</strong></p>
      <table class="comparison-table"><thead><tr><th>קריטריון</th><th>חלון קבוע (נבחר)</th><th>דלי אסימונים</th></tr></thead>
      <tbody>
      <tr><td>דיוק</td><td>מאפשר פי 2 בגבולות חלון</td><td>חלק, ללא בעיית גבולות</td></tr>
      <tr><td>זיכרון</td><td>O(1) למפתח</td><td>O(1) למפתח</td></tr>
      <tr><td>מורכבות</td><td>פשוט</td><td>בינוני</td></tr>
      </tbody></table>
    summary: "מונה חלון קבוע, אחסון בזיכרון. מגבלות לפי נקודת קצה. השוואה עם דלי אסימונים."
  framing:
    hint: "הבעיה מכילה מספר עמימויות. סמנו את כל ההבהרות הנדרשות כדי להגדיר כראוי את תכנון מגביל הקצב."
    options:
      - letter: A
        text: "כימות &ldquo;תנועה כבדה&rdquo; כ-~10,000 בקשות/שנייה גלובלית, ~100 בקשות/דקה למשתמש"
        correct: true
      - letter: B
        text: "מגבלות קצב שונות לפי סוג נקודת קצה (אימות: מחמיר, יתרה: מקל, העברה: בינוני)"
        correct: true
      - letter: C
        text: "&ldquo;זמינות גבוהה&rdquo; = כשל המגביל צריך לפתוח (fail-open) ולהעביר תנועה במקום לחסום"
        correct: true
      - letter: D
        text: "לכל נקודות הקצה מגבלות קצב זהות לפשטות"
        correct: false
      - letter: E
        text: "החזרת HTTP 429 עם כותרת Retry-After כשנחסם"
        correct: true
      - letter: F
        text: "אחסון מצב הגבלת קצב בזיכרון האפליקציה בלבד (ללא אחסון משותף)"
        correct: false
    studentSelections: [0, 1, 4]
    feedback:
      grade: B
      html: |
        <div class="criticism"><strong>נבחרו נכון:</strong> (A) כימות תנועה, (B) מגבלות לפי נקודת קצה, (E) HTTP 429 + Retry-After.</div>
        <div class="criticism" style="margin-top:6px"><strong>לא נבחר:</strong> (C) התנהגות fail-open &mdash; קריטי לאפליקציית בנקאות שבה חסימת כל התנועה חמורה יותר מהעברת קצת שימוש לרעה.</div>
        <div class="criticism" style="margin-top:6px"><strong>נמנע נכון:</strong> (D) מגבלות זהות מתעלמות מרגישות נקודות קצה; (F) זיכרון מקומי בלבד לא יעבוד עם מספר שרתי API.</div>
        <div class="better-alt" style="margin-top:6px"><strong>אידיאלי:</strong> (A), (B), (C), (E).</div>
  cycles:
    - # Cycle 1
      judging:
        options:
          - letter: A
            text: "מונה חלון קבוע מאפשר פרץ כפול בגבולות חלון (מתקפת גבול)"
            correct: true
          - letter: B
            text: "אחסון בזיכרון לא יעבוד עם מספר שרתי API &mdash; נדרש אחסון משותף"
            correct: true
          - letter: C
            text: "אין ניקוי כניסות שפג תוקפן &mdash; הזיכרון יגדל ללא גבול"
            correct: true
          - letter: D
            text: "מגבלות קצב לפי נקודת קצה מוסיפות מורכבות מיותרת"
            correct: false
          - letter: E
            text: "צריך להשתמש באסימוני JWT במקום הגבלת קצב"
            correct: false
        studentSelections: [0, 1]
        doneSelected: false
        feedback:
          grade: B
          html: |
            <div class="criticism"><strong>זוהו נכון:</strong> (A) פגיעות מתקפת גבול, (B) נדרש אחסון משותף.</div>
            <div class="criticism" style="margin-top:6px"><strong>לא זוהה:</strong> (C) אין פקיעה/ניקוי &mdash; גורם לדליפת זיכרון. חשוב לשירותים שרצים לאורך זמן.</div>
            <div class="criticism" style="margin-top:6px"><strong>נמנע נכון:</strong> (D) מגבלות לפי נקודת קצה הן דרישה; (E) JWT והגבלת קצב משרתים מטרות שונות.</div>
            <div class="better-alt" style="margin-top:6px"><strong>אידיאלי:</strong> (A), (B), (C).</div>
      steering:
        options:
          - letter: A
            text: "&ldquo;החליפו חלון קבוע בחלון הזזה או דלי אסימונים למניעת מתקפות גבול.&rdquo;"
            correct: true
          - letter: B
            text: "&ldquo;השתמשו ב-Redis כאחסון משותף עם TTL לפקיעה וניקוי אוטומטי.&rdquo;"
            correct: true
          - letter: C
            text: "&ldquo;פשוט הגדילו את מגבלות הקצב כדי שמשתמשים לא ייחסמו.&rdquo;"
            correct: false
          - letter: D
            text: "&ldquo;הוסיפו חסימה מבוססת IP במקום הגבלה מבוססת משתמש.&rdquo;"
            correct: false
        studentSelections: [0, 1]
        feedback:
          grade: A
          html: |
            <div class="criticism"><strong>נבחרו נכון:</strong> (A) אלגוריתם משופר, (B) Redis עם TTL. שניהם מטפלים בגורמי השורש.</div>
            <div class="criticism" style="margin-top:6px"><strong>נמנע נכון:</strong> (C) לא פותר את הבעיה; (D) עניין שונה לגמרי.</div>
            <div class="better-alt" style="margin-top:6px"><strong>אידיאלי:</strong> (A), (B) &mdash; אופטימלי.</div>
      summaryJudging: "פגיעות מתקפת גבול, נדרש אחסון משותף"
      summarySteering: "שימוש בחלון הזזה/דלי אסימונים; הוספת Redis עם TTL"

    - # Cycle 2 — student marks done
      aiUpdate:
        html: |
          <div class="code-block">MIDDLEWARE RateLimiter:
              redis = RedisClient(cluster_mode=true)
              limits = { ... per-endpoint as before ... }

              FUNCTION handle(request):
                  key = request.user_id + ":" + classify(request.endpoint)
                  limit = get_limit(request.endpoint)

                  // Sliding window log
                  now_ms = current_timestamp_ms()
                  window_start = now_ms - (limit.window * 1000)

                  PIPELINE:
                      redis.ZREMRANGEBYSCORE(key, 0, window_start)
                      redis.ZADD(key, now_ms, unique_id())
                      count = redis.ZCARD(key)
                      redis.EXPIRE(key, limit.window)

                  if count &gt; limit.max:
                      retry_after = compute_retry_after(key, limit)
                      return Response(429, {"Retry-After": retry_after})

                  return next(request)</div>
          <p class="text-sm" style="margin-top:8px"><strong>השוואה מעודכנת:</strong></p>
          <table class="comparison-table"><thead><tr><th>קריטריון</th><th>יומן חלון הזזה (נבחר)</th><th>דלי אסימונים</th><th>חלון קבוע</th></tr></thead>
          <tbody>
          <tr><td>דיוק</td><td>מדויק &mdash; ללא בעיית גבולות</td><td>חלק, מקורב</td><td>פרץ כפול בקצוות</td></tr>
          <tr><td>זיכרון</td><td>O(n) למשתמש לחלון</td><td>O(1) למשתמש</td><td>O(1) למשתמש</td></tr>
          <tr><td>מורכבות</td><td>בינונית (קבוצות ממוינות)</td><td>בינונית</td><td>פשוט</td></tr>
          <tr><td>מבוזר</td><td>Redis sorted sets</td><td>Redis + Lua</td><td>Redis counter</td></tr>
          </tbody></table>
        summary: "יומן חלון הזזה עם Redis sorted sets. Pipeline לאטומיות. TTL לניקוי אוטומטי. טבלת השוואה מעודכנת."
      judging:
        options:
          - letter: A
            text: "אין התנהגות fail-open &mdash; תקלת Redis תקריס את התווכה או תחסום את כל התנועה"
            correct: true
          - letter: B
            text: "יומן חלון הזזה צורך O(n) זיכרון למשתמש &mdash; משתמשים פעילים צורכים זיכרון Redis משמעותי"
            correct: true
          - letter: C
            text: "Redis איטי מדי להגבלת קצב בקנה מידה גדול"
            correct: false
        studentSelections: []
        doneSelected: true
        feedback:
          grade: C
          html: |
            <div class="criticism"><strong>סיום מוקדם.</strong> נותרו שתי בעיות: (A) אין fail-open &mdash; קריטי לאפליקציית בנקאות; אם Redis קורס, כל הבקשות נחסמות. (B) זיכרון O(n) למשתמש יכול להיות יקר בקנה מידה &mdash; דלי אסימונים היה O(1).</div>
            <div class="better-alt" style="margin-top:6px"><strong>עדיף:</strong> לבחור לפחות (A) ולהכוון את ה-AI להוסיף try/catch עם התנהגות fail-open.</div>
      steering: null
      summaryJudging: "הסטודנט סימן את הפתרון כהושלם (מוקדם מדי)"
      summarySteering: null

  completion:
    grades:
      framing: B
      judging: C
      steering: A
    summary: "ההכוונה הייתה חזקה — תיקונים ממוקדים שהניעו שיפורים אמיתיים. בעיצוב המשימה פוספסה דרישת ה-fail-open. בשיפוט: נתפסו בעיות ליבה במחזור 1 אך הסתיים מוקדם מדי במחזור 2, כשפוספסו התנהגות ה-fail-open הקריטית ובעיית עלות הזיכרון. במערכות ייצור, תמיד בדקו מצבי כשל לפני סימון כהושלם."

oe:
  aiSolution:
    html: |
      <div class="code-block">MIDDLEWARE RateLimiter:
          redis = RedisClient(cluster_mode=true)
          limits = {
              "auth":     {max: 5,  window: 60, refill_rate: 1},
              "balance":  {max: 60, window: 60, refill_rate: 10},
              "transfer": {max: 10, window: 60, refill_rate: 2},
              "default":  {max: 30, window: 60, refill_rate: 5}
          }

          FUNCTION handle(request):
              key = user_id + ":" + classify(endpoint)
              limit = get_limit(endpoint)

              // Token bucket via Redis
              bucket = redis.HGETALL(key)
              if bucket is empty:
                  bucket = {tokens: limit.max, last_refill: now()}

              elapsed = now() - bucket.last_refill
              refill = floor(elapsed / (limit.window / limit.max))
              bucket.tokens = min(limit.max, bucket.tokens + refill)
              bucket.last_refill = now()

              if bucket.tokens &lt;= 0:
                  return Response(429, {"Retry-After": ...})

              bucket.tokens -= 1
              redis.HMSET(key, bucket)
              redis.EXPIRE(key, limit.window * 2)
              return next(request)</div>
    summary: "דלי אסימונים עם Redis HASH. מגבלות לפי נקודת קצה עם קצבי מילוי. קריאה-שינוי-כתיבה לא אטומית."
  framing:
    hint: "הוסיפו סעיפים שמבהירים את העמימויות בבעיה. כל סעיף צריך לחדד היבט מעורפל אחד."
    sections:
      - name: "אילוצים: הערכות תנועה"
        text: "תפוקה גלובלית ~10,000 בקשות/שנייה. מגבלות רכות למשתמש לפי נקודת קצה: אימות 5/דקה, יתרה 60/דקה, העברות 10/דקה. משתמשים רגילים מגיעים ל-~20% מהמגבלות."
      - name: "הנחות: שכבות נקודות קצה"
        text: "נקודות הקצה מסווגות לשכבות: קריטיות (העברות, תשלומים), רגילות (יתרה, היסטוריה), ואימות (כניסה, OTP). לכל שכבה פרמטרים נפרדים להגבלת קצב."
      - name: "הבהרה: התנהגות בכשל"
        text: "&ldquo;זמינות גבוהה&rdquo; משמעה שמגביל הקצב צריך לפתוח בכשל (fail-open): אם שכבת האחסון לא זמינה, להעביר בקשות ולרשום אזהרה במקום לחסום משתמשים לגיטימיים."
    feedback:
      grade: A
      html: |
        <div class="criticism"><strong>עיצוב משימה מצוין.</strong> כומתה התנועה, הוגדרו שכבות נקודות קצה, ו&mdash; באופן קריטי &mdash; צוינה התנהגות fail-open. הבהרת התנהגות הכשל מעידה על חשיבה מערכתית חזקה.</div>
        <div class="criticism" style="margin-top:6px"><strong>פער קטן:</strong> ניתן לציין סובלנות פרצים לפי שכבה (למשל, מתן פי 2 מהמגבלה ל-5 שניות בבדיקות יתרה).</div>
  cycles:
    - # Cycle 1
      judging:
        sections:
          - name: "בעיה: תנאי מרוץ בדלי האסימונים"
            text: "קריאה-שינוי-כתיבה על ה-Redis HASH אינה אטומית. שתי בקשות במקביל יכולות לקרוא tokens=1, שתיהן להקטין, ושתיהן לעבור — ומאפשרות פי 2 מהמגבלה. נדרש Redis MULTI/EXEC או סקריפט Lua."
          - name: "בעיה: אין התנהגות fail-open"
            text: "אם Redis לא זמין, התווכה תזרוק חריגה או תיתקע. צריך לעטוף קריאות Redis ב-try/catch ולפתוח בכשל, כפי שצוין בעיצוב המשימה שלנו."
          - name: "בעיה: חסרה השוואת אלגוריתמים"
            text: "הדרישות מבקשות השוואה של לפחות שני אלגוריתמים. רק דלי אסימונים מומש; לא סופקה טבלת השוואה."
        doneSelected: false
        feedback:
          grade: A
          html: |
            <div class="criticism"><strong>ניתוח יסודי.</strong> כל שלוש הבעיות אמיתיות ומתוארות היטב. הסבר תנאי המרוץ עם דוגמה קונקרטית (tokens=1, שתי בקשות במקביל) חזק במיוחד.</div>
      steering:
        sections:
          - name: "הנחיה: תיקון אטומיות עם סקריפט Lua"
            text: "עטפו את הקריאה-שינוי-כתיבה בסקריפט Lua של Redis (EVAL) כך שכל בדיקת-והקטנת הדלי תהיה אטומית. זה מונע את תנאי המרוץ."
          - name: "הנחיה: הוספת fail-open עם try/catch"
            text: "עטפו את כל פעולות Redis ב-try/catch. בכל שגיאת Redis, רשמו אזהרה עם user_id ונקודת הקצה, ואז העבירו את הבקשה (fail-open)."
          - name: "הנחיה: הוספת טבלת השוואה"
            text: "כללו טבלת השוואה: דלי אסימונים מול יומן חלון הזזה מול חלון קבוע. השוו דיוק, זיכרון, מורכבות, והתאמה למערכת מבוזרת."
        feedback:
          grade: A
          html: |
            <div class="criticism"><strong>מדויק ומקיף.</strong> כל שלוש ההנחיות מתייחסות ישירות לבעיות שזוהו עם הנחיית מימוש ספציפית. ההצעה לסקריפט Lua היא הגישה הנכונה לאטומיות ב-Redis.</div>
      summaryJudging: "תנאי מרוץ, אין fail-open, חסרה טבלת השוואה"
      summarySteering: "תיקון אטומיות עם Lua; הוספת fail-open; הוספת השוואת אלגוריתמים"

    - # Cycle 2 — student marks done
      aiUpdate:
        html: |
          <div class="code-block">MIDDLEWARE RateLimiter:
              redis = RedisClient(cluster_mode=true)
              limits = { ... per-endpoint tiers ... }

              LUA_SCRIPT = """
                  local key = KEYS[1]
                  local max = tonumber(ARGV[1])
                  local refill = tonumber(ARGV[2])
                  local now = tonumber(ARGV[3])
                  local window = tonumber(ARGV[4])
                  local bucket = redis.call('HGETALL', key)
                  -- ... atomic check, refill, decrement ...
                  if tokens &lt;= 0 then return 0 end
                  tokens = tokens - 1
                  redis.call('HMSET', key, 'tokens', tokens, 'last', now)
                  redis.call('EXPIRE', key, window * 2)
                  return tokens
              """

              FUNCTION handle(request):
                  key = user_id + ":" + classify(endpoint)
                  limit = get_limit(endpoint)
                  TRY:
                      remaining = redis.EVAL(LUA_SCRIPT, key, limit.max,
                                              limit.refill_rate, now(), limit.window)
                      if remaining &lt; 0:
                          return Response(429, {"Retry-After": compute_wait(limit)})
                  CATCH RedisError:
                      log.warn("Rate limiter unavailable, failing open", user_id)
                      // fail-open: allow the request
                  return next(request)</div>
          <table class="comparison-table" style="margin-top:12px"><thead><tr><th>אלגוריתם</th><th>דיוק</th><th>זיכרון</th><th>מורכבות</th><th>מבוזר</th></tr></thead>
