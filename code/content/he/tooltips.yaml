instrAnalyticsRuns:
  title: "ריצות שהושלמו"
  text: "למה: מעקב אחר ריצות שהושלמו מול סך הריצות מראה מעורבות והתקדמות הסטודנט. מה: מספר ריצות האתגר שהושלמו מתוך סך הריצות שניסה הסטודנט. איך: יחס השלמה נמוך עשוי להעיד שסטודנט מתקשה או לא מעורב."
instrAnalyticsActions:
  title: "פעולות"
  text: "פעולות זמינות עבור סטודנט זה. לחץ סקירה לצפייה בדוח מפורט של ריצת אתגר שהושלמה."
#
# ── Grade Badge Tooltips ──
gradeA:
  title: "ציון A — מצוין"
  text: "למה: ציונים עוזרים לך לעקוב אחר השליטה שלך בחשיבה משותפת. מה: ציון A מעיד שהפגנת הבנה מצוינת — זיהית את הנקודות המרכזיות, סיפקת שיפורים חזקים והראית חשיבה ביקורתית מעמיקה. איך: המשך ליישם מיומנויות אלה באופן עקבי באתגרים שונים."
gradeB:
  title: "ציון B — טוב"
  text: "למה: ציונים עוזרים לך לעקוב אחר השליטה שלך בחשיבה משותפת. מה: ציון B מעיד שהראית הבנה טובה עם מקום לשיפור — תפסת את הנקודות העיקריות אך ייתכן שפספסת ניואנסים או כללת אלמנטים מיותרים. איך: סקור את המשוב בקפידה והתמקד בפערים הספציפיים שהוזכרו."
gradeC:
  title: "ציון C — דרוש שיפור"
  text: "למה: ציונים עוזרים לך לעקוב אחר השליטה שלך בחשיבה משותפת. מה: ציון C מעיד שדרוש שיפור משמעותי — נושאים חשובים הוחמצו או שהתשובה לא התייחסה כראוי לדרישות המשימה. איך: קרא מחדש את הבעיה בעיון, למד את המשוב ונסה אתגרים דומים כדי לבנות את מיומנויותיך."
