# ── Profile Page Tooltips ──
profileRole:
  title: "התפקיד שלך"
  text: "למה: התפקיד שלך קובע אילו תכונות ועמודים זמינים לך. מה: סטודנטים משלימים אתגרים ובונים מיומנויות חשיבה משותפת. מרצים יוצרים אתגרים, מנהלים קורסים וסוקרים ביצועי סטודנטים. איך: התפקיד שלך מוקצה בעת ההרשמה ואינו ניתן לשינוי. פנה למנהל המערכת אם אתה זקוק לשינוי תפקיד."
profileStats:
  title: "הסטטיסטיקות שלך"
  text: "למה: מעקב אחר הפעילות שלך עוזר לך להבין כמה אתה מעורב בפלטפורמה. מה: אתגרים שנוצרו מראה כמה אתגרים חיברת. אתגרים שבוצעו מראה כמה ריצות אתגר השלמת. איך: כדי להגדיל את הסטטיסטיקות שלך, צור אתגרים חדשים או השלם ריצות נוספות מהקורסים שנרשמת אליהם."
profileCourses:
  title: "מנויי הקורסים"
  text: "למה: מנויי הקורסים שלך קובעים אילו אתגרים זמינים לך ואילו נתוני ניתוח נעקבים. מה: רשימת כל הקורסים שאתה מנוי אליהם כרגע. כל קורס מספק גישה לאתגרים הציבוריים שלו. איך: הירשם לקורסים חדשים מעמוד קטלוג הקורסים. תוכל לבטל הרשמה בכל עת."
profileOverview:
  title: "הפרופיל שלי"
  text: "למה: הפרופיל שלך מרכז את הזהות, התפקיד והפעילות שלך בפלטפורמה. מה: צפה בפרטי החשבון, מנויי הקורסים וסטטיסטיקות האתגרים שלך. רק שם התצוגה ניתן לעריכה. איך: לחץ על סמל העיפרון ליד שמך כדי לערוך, ואז לחץ שמור שינויים."
#
# ── טיפים לעמודות ציון בניתוח ──
analyticsFramingGrade:
  title: "ציון מסגור"
  text: "למה: מסגור הוא הבסיס לשיתוף פעולה יעיל עם AI — משימה מוגדרת היטב מובילה לפלט AI טוב יותר. מה: הציון שלך משקף עד כמה חידדת את הבעיה הגולמית על ידי הוספת אילוצים, הנחות והבהרות לפני שה-AI ניסה לייצר פתרון. איך: ציונים גבוהים יותר מגיעים מזיהוי פערים אמיתיים, הפחתת עמימות ומתן מפרטי משימה מדויקים."
analyticsJudgingGrade:
  title: "ציון שיפוט"
  text: "למה: הערכה ביקורתית של פלט AI היא חיונית — פתרונות AI מכילים לעיתים שגיאות עדינות הדורשות מומחיות תחומית לזיהוי. מה: הציון שלך משקף עד כמה זיהית בדייקנות טעויות, פערים לוגיים והנחות שגויות בפתרון שנוצר על ידי ה-AI. איך: ציונים גבוהים יותר מגיעים מאיתור בעיות ספציפיות, הבחנה בין שגיאות אמיתיות לפישוטים מקובלים ומתן תיאורים ברורים."
analyticsSteeringGrade:
  title: "ציון הכוונה"
  text: "למה: הנחיית AI לפלט טוב יותר באמצעות תיקונים מדויקים היא מיומנות הליבה של שיתוף פעולה בין אדם ל-AI. מה: הציון שלך משקף עד כמה התיקונים שלך הובילו את ה-AI לשפר את הפתרון — טיפול בבעיות אמיתיות עם הנחיות ישימות. איך: ציונים גבוהים יותר מגיעים מתיקונים מדויקים ובונים שמסבירים מה צריך להשתנות ולמה, במקום תלונות מעורפלות."
