# Hebrew tooltip help texts
#
# ── Shared Tooltips (used on both student and instructor pages) ──
challengeType:
  title: "סוג האתגר"
  text: "למה: מטרות למידה שונות דורשות גישות משוב שונות — תרגול בונה מיומנויות דרך חזרה, בעוד הערכה מודדת יכולת עצמאית. מה: מצב תרגול מציג משוב מבוסס AI לאחר כל שלב, ומאפשר ללמוד מטעויות בזמן אמת. מצב הערכה עוצר את המשוב עד להשלמה, ובוחן מיומנויות חשיבה משותפת עצמאית. איך: בחר תרגול ללמידה וחקירה. בחר הערכה למבחנים מדורגים או למדידת רמת מיומנות אמיתית."
visibility:
  title: "נראות"
  text: "למה: שליטה בנראות אתגרים מאפשרת למרצים לנהל תוכן קורס ולסטודנטים ליצור חומר תרגול אישי. מה: אתגרים ציבוריים גלויים לכל הסטודנטים הרשומים בקורס. אתגרים פרטיים גלויים רק ליוצרם. איך: אתגרים ציבוריים מופיעים ברשימת האתגרים לכל המנויים. אתגרים פרטיים מופיעים רק ברשימה האישית שלך."
maxCycles:
  title: "מחזורים מרביים"
  text: "למה: יותר מחזורים נותנים יותר הזדמנויות לתרגל תיקון איטרטיבי, אך יותר מדי עלולים להפחית מעורבות ומיקוד. מה: מספר מחזורי השיפוט+הכוונה המרבי המותר. לאחר המחזור האחרון הריצה מסתיימת וכל הציונים מחושבים. איך: 3-5 מחזורים זה טיפוסי. השתמש בפחות להערכות מהירות, ביותר לתרגול מעמיק."
subjectPath:
  title: "נתיב הנושא"
  text: "למה: מיפוי אתגרים לנושאים ספציפיים עוזר לארגן תוכן ומאפשר ניתוח ממוקד של תחומי מיומנות. מה: ההיררכיה הנושאית שאליה שייך האתגר, בתוך עץ הנושאים של הקורס. בעיות ומחוונים נוצרים על סמך תחומי הנושא. איך: בחר צמתים ספציפיים לאתגרים ממוקדים, או צמתי אב רחבים יותר לבעיות מגוונות."
responseType:
  title: "סוג תשובה"
  text: "למה: פורמט התשובה מעצב את חוויית הלמידה — רב-ברירה מנחה קבלת החלטות בעוד פתוח מפתח מיומנויות חשיבה עצמאיות. מה: רב-ברירה מציג אפשרויות מוכנות לבחירה. פתוח מאפשר כתיבת נימוק חופשי ושיפורים מותאמים אישית. איך: השתמש ברב-ברירה לאתגרים מבואיים. השתמש בפתוח לאתגרים מתקדמים הדורשים חשיבה ביקורתית עצמאית."
framingPhase:
  title: "שלב המסגור"
  text: "למה: בעיות מהעולם האמיתי אינן מעוצבות מראש עבור AI. מסגור מלמד אותך להפוך דרישות מעורפלות למשימות מדויקות וישימות. מה: אתה מקבל בעיה גולמית ובלתי שלמה בכוונה ועליך לשפר אותה על ידי הוספת הנחות, אילוצים והבהרות לפני שה-AI מייצר פתרון. זהו שלב 1 בתהליך החשיבה המשותפת (ראו תרשים התהליך לזרימה המלאה). איך: קרא את הבעיה בעיון. זהה מה חסר, מעורפל או מונח. הוסף שיפורים שהופכים את המשימה למוגדרת היטב."
judgingPhase:
  title: "שלב השיפוט"
  text: "למה: פלטי AI מכילים לעתים קרובות שגיאות עדינות הדורשות מומחיות תחומית מדוקדקת לזיהוי. שיפוט בונה את מיומנויות ההערכה האנליטית שלך. מה: אתה סוקר את הפתרון שנוצר על ידי ה-AI ומזהה שגיאות, פערים או הנחות שגויות. זהו שלב 2א בתהליך החשיבה המשותפת (ראו תרשים התהליך לזרימה המלאה). השיפוט שלך נרשם לדירוג אך אינו נשלח ל-AI. איך: קרא את הפתרון בעין ביקורתית. חפש שגיאות לוגיות, רכיבים חסרים, עובדות שגויות והנחות סמויות."
steeringPhase:
  title: "שלב ההכוונה"
  text: "למה: ידיעת כיצד לתת משוב מדויק ויישומי ל-AI היא מיומנות הליבה של שיתוף פעולה אפקטיבי בין אדם ל-AI. מה: אתה כותב תיקונים או הנחיות ספציפיות לתיקון הבעיות שזיהית. זהו שלב 2ב בתהליך החשיבה המשותפת (ראו תרשים התהליך לזרימה המלאה). ה-AI מעבד את ההכוונה שלך ומייצר פתרון משופר. איך: היה ספציפי וקונקרטי. אמור ל-AI בדיוק מה לתקן. תיקונים ברורים מייצרים שיפורים טובים יותר."
coReasoningScore:
  title: "ציון חשיבה משותפת"
  text: "למה: ציון משולב עוזר לך להבין את האפקטיביות הכוללת שלך כשותף AI בכל שלוש מיומנויות החשיבה המשותפת. מה: ציון הביצועים הכולל שלך המשלב דיוק מסגור, איכות שיפוט ויעילות הכוונה. כל מיומנות מדורגת באופן עצמאי (A/B/C). איך: התמקד בשיפור תחום המיומנות החלש ביותר שלך תחילה. סקור את המשוב מכל שלב כדי להבין היכן תוכל להשתפר."
rubric:
  title: "מחוון"
  text: "למה: קריטריוני הערכה עקביים מבטיחים דירוג הוגן ואובייקטיבי לכל הסטודנטים וניסיונות האתגר. מה: קריטריוני הערכה שנוצרו על ידי AI להערכת ביצועי החשיבה המשותפת שלך בכל שלב. המחוון מותאם לתחום הנושא של האתגר. איך: המחוונים אינם גלויים במהלך האתגר. לאחר ההשלמה, הציונים שלך משקפים עד כמה עמדת בקריטריונים."
subjectTree:
  title: "עץ נושאים"
  text: "למה: ארגון נושאים בהיררכיה מאפשר תוכן קורס מובנה והערכת מיומנות ממוקדת בתחומי נושא. מה: ארגון עצי של נושאים בתוך קורס. אתגרים ממופים לצמתים ספציפיים, ובעיות נוצרות מהנושאים שנבחרו. איך: מרצים בונים את העץ דרך הגדרות הקורס. סטודנטים רואים אתגרים מאורגנים לפי תחומי הנושא שלהם."
coReasoningProcess:
  title: "תהליך החשיבה המשותפת"
  text: "למה: הבנת תהליך החשיבה המשותפת המלא עוזרת לראות כיצד כל שלב בונה על הקודם ומדוע כל מיומנות חשובה. מה: התהליך כולל שלושה שלבים: (1) מסגור — חידוד בעיה מעורפלת למשימה מוגדרת היטב, (2א) שיפוט — זיהוי בעיות בפתרון ה-AI, (2ב) הכוונה — כתיבת תיקונים לשיפור הפלט. שיפוט והכוונה חוזרים בסבבים. איך: לחצו על קישור תרשים התהליך או חפשו את סמל תרשים הזרימה כדי לראות את התרשים המלא של תהליך החשיבה המשותפת."
#
# ── Student-Facing Tooltips ──
courseSubscription:
  title: "הרשמה לקורס"
  text: "למה: הרשמה מחברת אותך לספריית האתגרים של הקורס ומאפשרת למרצה לעקוב אחר ההתקדמות שלך. מה: כשאתה נרשם, האתגרים הציבוריים של הקורס מופיעים ברשימת האתגרים שלך והתוצאות שלך נכללות בניתוח הקורס. איך: לחץ הרשמה על כרטיס קורס זמין כלשהו. תוכל לבטל הרשמה בכל עת מקטלוג הקורסים."
analyticsOverview:
  title: "הניתוח שלך"
  text: "למה: מעקב אחר הביצועים שלך לאורך זמן חושף דפוסים, חוזקות ותחומים הדורשים תשומת לב. מה: סיכום חזותי של הציונים שלך בכל ריצות האתגר שהושלמו, כולל התפלגויות לפי מיומנות ומגמות לאורך זמן. איך: השתמש במסננים להתמקד בקורסים או סוגי אתגרים ספציפיים. לחץ על כל אתגר בטבלה לצפייה בדוח המפורט."
