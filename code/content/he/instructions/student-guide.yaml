id: student-guide
title: "מדריך לסטודנט/ית"
sections:
  - title: "תחילת העבודה"
    content: "ברוכים הבאים למעבדת CoReasoning. כאן תתרגלו הערכה ביקורתית של פתרונות שנוצרו על ידי AI באמצעות אתגרים מובנים."
  - title: "מהלך האתגר"
    content: "לכל אתגר שני שלבים: שלב 1 (מסגור) שבו אתם מחדדים את הגדרת הבעיה, ושלב 2 (מחזורי שיפוט והכוונה) שבו אתם מעריכים ומשפרים את פתרון ה-AI באופן איטרטיבי."
  - title: "ציונים"
    content: "אתם מקבלים ציונים נפרדים על מסגור, שיפוט והכוונה. הציונים נעים בין A (מצוין) ל-D (דרוש שיפור)."
  - title: "תרגול מול הערכה"
    content: "מצב תרגול מספק משוב לאחר כל שלב ומאפשר ניסיונות חוזרים. מצב הערכה מציג משוב רק בסיום."
