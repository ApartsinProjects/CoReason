# ── הסברי כלים בהרצת אתגר (למה → מה → איך) ──
tooltip_rawProblem: "למה: בעיות בעולם האמיתי כמעט אף פעם לא מוצגות בצורה נקייה וניתנת לפתרון. ללמוד לזהות מה חסר או מעורפל הוא הצעד הראשון בשיתוף פעולה יעיל עם AI. מה: זוהי בעיה גולמית, שנוצרה בכוונה כלא-שלמה מחומר הקורס שלך. היא מכילה פערים, הנחות סמויות ועמימויות שעליך לטפל בהם לפני שה-AI יוכל לייצר פתרון שימושי. איך: קרא/י את הבעיה בעיון. שאל/י את עצמך: איזה מידע חסר? אילו מונחים מעורפלים? אילו הנחות נעשות? המטרה שלך היא לזהות מה צריך להבהיר או להוסיף בשלב הבא."
tooltip_refinement: "למה: הגדרות בעיה ראשוניות הן לעיתים קרובות חלקיות או מעורפלות. חידודים מפחיתים אי-ודאות, מיישרים ציפיות, ועוזרים ל-AI לייצר פלט מדויק, רלוונטי וניתן לבדיקה. מה: חידודים הם תוספות שהופכות את המשימה למדויקת יותר. הם עשויים להגדיר את הבעיה עצמה — כמו קלטים, פלטים, אילוצים, הנחות, הקשר וקריטריוני הערכה. הם גם עשויים להוסיף בקשות מפורשות ל-AI, כמו לרשום מקרי קצה חשובים, להשוות חלופות, או להסביר פשרות. איך: חפש/י מה חסר, לא ברור, או לא מוגדר מספיק. חלק מהחידודים ניתנים ידנית כמפרטי משימה, ואחרים נכתבים כהנחיות ישירות ל-AI לגבי איך לגשת למשימה או לבנות את התשובה. הוסף/י פרטים שמפחיתים עמימות, מנחים את תהליך הפתרון, או משפרים את השימושיות של הפלט."
tooltip_selectRefinements: "למה: הגדרות בעיה ראשוניות הן לעיתים חלקיות או מעורפלות. בחירת החידודים הנכונים מפחיתה אי-ודאות ועוזרת ל-AI לייצר פלט מדויק ורלוונטי. מה: כל אפשרות מייצגת חידוד בודד — היא עשויה להגדיר את הבעיה עצמה (קלטים, אילוצים, הנחות) או להוסיף בקשה מפורשת ל-AI (לרשום מקרי קצה, להשוות חלופות). בחר/י את כל החידודים שלדעתך יש להחיל. איך: הערך/י כל אפשרות: האם היא מטפלת בפער אמיתי בבעיה? האם היא מוסיפה הנחיה שימושית ל-AI? הימנע/י מבחירת חידודים שמגדירים יתר על המידה, סותרים את הבעיה, או מוסיפים אילוצים לא רלוונטיים."
tooltip_judging: "למה: פתרונות שנוצרו על ידי AI נראים לעיתים נכונים במבט ראשון, אך מכילים שגיאות עדינות, פישוטי יתר או אלמנטים חסרים. שיפוט מפתח את היכולת שלך להעריך פלט AI באופן ביקורתי — מיומנות חיונית לכל איש מקצוע שעובד עם AI. מה: שיפוט משמעו בחינת הפתרון של ה-AI כדי לזהות טעויות, פערים לוגיים, מקרי קצה חסרים או הנחות שגויות. את/ה מעריך/ה האם הפלט מתייחס באופן מלא ונכון לבעיה המחודדת, ומסמן/ת בעיות ספציפיות שדורשות תיקון. איך: השווה/י את הפתרון לדרישות הבעיה ולידע המקצועי שלך. בדוק/י שגיאות חישוב, היסק לקוי, כיסוי חלקי, או מסקנות שלא נובעות מההנחות. היה/י ספציפי/ת — תאר/י כל בעיה בבירור כדי שניתן יהיה לטפל בה בשלב הבא."
tooltip_steering: "למה: זיהוי שגיאות הוא רק חצי מהמיומנות. הכוונה מלמדת אותך להנחות AI לפלט טוב יותר על ידי מתן תיקונים מדויקים ובני-ביצוע — היכולת המרכזית בשיתוף פעולה יעיל בין אדם ל-AI. מה: הכוונה משמעה כתיבת תיקונים או הנחיות ספציפיות שמטפלים בבעיות שזיהית בשלב השיפוט. ה-AI ישתמש בהנחיות שלך כדי לייצר פתרון משופר. התיקונים שלך מגדירים מה צריך להשתנות ואיך. איך: היה/י מדויק/ת ובונה/ת. במקום לומר 'זה לא נכון', הסבר/י מה הגישה הנכונה צריכה להיות ולמה. תן/י הנחיות קונקרטיות: תקן/י נוסחה, הוסף/י אילוץ חסר, מבנה/י מחדש טיעון, או בקש/י שיטה אחרת. ככל שההנחיות ברורות יותר, כך הפלט המתוקן של ה-AI טוב יותר."

