# ── דף מהו חשיבה משותפת ──
whatIsCoReasoning: "מהי חשיבה משותפת?"
whatIsCoReasoningSubtitle: "למדו לחשוב באופן ביקורתי עם AI — לא רק להשתמש בו"
theProblem: "הבעיה"
theProblemText: "רוב האנשים משתמשים ב-AI באופן פסיבי: מדביקים שאלה, מעתיקים את התשובה. אך פלטי AI מכילים לעיתים קרובות שגיאות עדינות, הנחות חסרות ופערים לוגיים. אם אינכם מסוגלים לזהות בעיות אלו, אינכם משתמשים ב-AI — הוא משתמש בכם. חשיבה משותפת מלמדת אתכם לעבוד <em>עם</em> AI כשותף ביקורתי, לא כקביים."
theThreeSkills: "שלוש המיומנויות"
theThreeSkillsDesc: "חשיבה משותפת מפתחת שלוש מיומנויות חשיבה ביקורתית עצמאיות:"
framingSkillTitle: "מסגור"
framingSkillDesc: "הפיכת בעיות מעורפלות למשימות מוגדרות היטב. בעיות אמיתיות הן מבולגנות — עליכם לזהות מה חסר, להוסיף הנחות ולהבהיר דרישות לפני שה-AI יוכל לעזור."
judgingSkillTitle: "שיפוט"
judgingSkillDesc: "מציאת מה שגוי בתשובת ה-AI. פתרונות AI נראים טוב אך מכילים שגיאות עדינות. תפקידכם הוא לזהות הנחות שגויות, מקרי קצה חסרים ופגמים לוגיים."
steeringSkillTitle: "הכוונה"
steeringSkillDesc: "הנחיית ה-AI לתשובה טובה יותר. לאחר שמצאתם בעיות, תנו ל-AI תיקונים ספציפיים ובני-ביצוע — לא תלונות מעורפלות."
howChallengeWorks: "כיצד אתגר עובד"
howChallengeWorksDesc: "כל אתגר מוביל אתכם דרך שלוש המיומנויות ברצף:"
step1Text: "<strong>קראו</strong> ניסוח בעיה שהוא מעורפל בכוונה"
step2Text: "<strong>מסגרו</strong> אותה על ידי בחירה או כתיבת חידודים להבהרת הבעיה"
step3Text: "<strong>צפו</strong> בפתרון שנוצר על ידי AI שהוא לא מושלם בכוונה"
step4Text: "<strong>שפטו</strong> את הבעיות — זהו פגמים, הנחות שגויות ומקרים חסרים"
step5Text: "<strong>הכוונו</strong> עם תיקונים ספציפיים ובני-ביצוע לשיפור הפתרון"
step6Text: "<strong>סקרו</strong> את שלושת הציונים העצמאיים שלכם ומשוב מפורט"
graded: "מדורג (A/B/C)"
whyThreeGrades: "למה שלושה ציונים?"
whyThreeGradesDesc: "כל מיומנות מדורגת באופן עצמאי כי מדובר ביכולות שונות. ייתכן שתמסגרו בעיה בצורה מבריקה אך תפספסו פגמים ברורים בתשובת ה-AI, או שתשפטו היטב אך תיתנו משוב הכוונה מעורפל. שלושה ציונים נפרדים נותנים לכם תמונה ברורה של היכן להשתפר."
gradeExcellent: "מצוין"
gradeExcellentDesc: "יסודי, מדויק ותובנתי"
gradeGood: "טוב"
gradeGoodDesc: "הבנה מוצקה עם פערים קטנים"
gradeNeedsWork: "דורש שיפור"
gradeNeedsWorkDesc: "בעיות משמעותיות לטיפול"
practiceVsAssessment: "תרגול מול הערכה"
practiceVsAssessmentDesc: "אתגרים מגיעים בשני מצבים:"
readyToStart: "מוכנים לפתח את מיומנויות ה-AI הביקורתיות שלכם?"
startFirstChallenge: "התחילו את האתגר הראשון שלכם"

# ── דף המדריך האינטראקטיבי ──
guideStepProblem: "בעיה"
guideStepGaps: "פערים"
guideStepFrame: "מסגור"
guideStepSolution: "פתרון"
guideStepJudge: "שיפוט"
guideStepSteer: "הכוונה"
guideStepGrades: "ציונים"
guideStepGo: "!קדימה"
guideStep1Title: "הנה בעיה גולמית"
guideStep1Subtitle: "זה מה שמרצה נותן לכם. קראו בעיון — תפקידכם לחשוב עליה באופן ביקורתי לפני שה-AI מתחיל לעבוד."
guideRawProblemLabel: "ניסוח הבעיה המקורי"
guideRawProblemText: "תכננו מודול מיון בזמן אמת לרשת חיישני IoT. המערכת מקבלת קריאות מכמה מאות חיישני טמפרטורה. עליה למיין קריאות אחרונות לפי חותמת זמן, לטפל בקפיצות נתונים בשעות שיא, ולתמוך ב-API דגימה שמחזיר את חלון הנתונים הממוין האחרון. בצעו אופטימיזציה לצריכת זיכרון נמוכה."
guideStep1AnnotationLabel: "מה קורה כאן:"
guideStep1AnnotationText: "באתגר אמיתי, זה הדבר הראשון שאתם רואים. הבעיה נשמעת סבירה, אך האם היא שלמה מספיק כדי שה-AI יפתור אותה היטב? את זה תגלו בשלב הבא."
guideStep2Title: "שמתם לב מה חסר?"
guideStep2Subtitle: "בעיות בעולם האמיתי הן לעיתים קרובות מעורפלות. מיומנות חשיבה משותפת מרכזית היא זיהוי הפערים לפני שה-AI מתחיל לפתור."
guideProblemAgainLabel: "הבעיה שוב"
guideGap1: "<strong>מפתח המיון אינו ברור:</strong> \"מיון לפי חותמת זמן\" — אך מה לגבי קריאות עם חותמות זמן זהות? אין אסטרטגיית שוברת שוויון."
guideGap2: "<strong>\"כמה מאות\" הוא מעורפל:</strong> האם מדובר ב-200? 500? 900? בחירת מבנה הנתונים והאלגוריתם תלויה מאוד בקנה מידה בפועל."
guideGap3: "<strong>\"קפיצות נתונים\" אינו מוגדר:</strong> האם הכוונה לפי 2 מהקצב הרגיל? פי 100? האם המערכת צריכה לוותר על קריאות, לאגור אותן, או לטפל בכולן?"
guideGap4: "<strong>גודל החלון לא צוין:</strong> \"חלון ממוין אחרון\" — כמה גדול? 10 השניות האחרונות? 1000 הקריאות האחרונות? זה משנה את מודל הזיכרון לגמרי."
guideStep2AnnotationLabel: "זהו מסגור:"
guideStep2AnnotationText: "לפני שה-AI כותב שורת קוד אחת, אתם מחדדים את הבעיה על ידי זיהוי מה חסר, מעורפל או לא מוגדר מספיק. מסגור טוב יותר מוביל לפלט AI טוב יותר."
guideStep3Title: "מסגרו את הבעיה"
guideStep3Subtitle: "בחרו את ההיגדים שמזהים פערים בצורה נכונה או מוסיפים אילוצים שימושיים. באתגר אמיתי, אתם בוחרים מתוך אפשרויות רב-ברירתיות."
guideFrame1: "מפתח המיון צריך שוברת שוויון — כאשר חותמות הזמן זהות, יש להשתמש במזהה החיישן כמיון משני."
guideFrame1Exp: "נכון: מזהה עמימות אמיתית ומציע פתרון קונקרטי."
guideFrame2: "הגדירו \"כמה מאות\" כ-500 חיישנים בדיוק, כל אחד שולח קריאה אחת בשנייה."
guideFrame2Exp: "נכון: ממסמר כמות מעורפלת למספר ספציפי וניתן לבדיקה."
guideFrame3: "השתמשו ב-Python כי זו השפה הפופולרית ביותר ל-IoT."
guideFrame3Exp: "שגוי: זו בחירת מימוש, לא הבהרת בעיה. מסגור עוסק בבעיה, לא בפתרון."
guideFrame4: "הגדירו \"קפיצת נתונים\" ככפולה של עד 5 מהתפוקה הרגילה וציינו שאין לוותר על אף קריאה."
guideFrame4Exp: "נכון: מבהיר מונח מעורפל עם פרמטרים קונקרטיים ודרישה ברורה."
guideFrame5: "הבעיה ברורה מספיק — אין צורך באילוצים נוספים."
guideFrame5Exp: "שגוי: לבעיה יש מספר עמימויות שיובילו לפתרון חלקי."
guideStep3AnnotationLabel: "ניקוד:"
guideStep3AnnotationText: "תקבלו ציון מסגור גבוה יותר על ידי זיהוי נכון של פערים אמיתיים והימנעות מאפשרויות שקופצות ישר לפתרונות או מבטלות את הצורך בהבהרה."
guideStep4Title: "ה-AI מייצר פתרון"
guideStep4Subtitle: "על בסיס המסגור שלכם, ה-AI מייצר פתרון. אך פתרונות AI הם לעיתים קרובות סבירים למראית עין אך פגומים — תפקידכם להעריך אותו באופן ביקורתי."
guideAiSolutionLabel: "פתרון שנוצר על ידי AI"
guideApproachLabel: "גישה:"
guideApproachText: "שימוש במאגר מעגלי בגודל קבוע של 1000 רשומות, ממוין באמצעות מיון הכנסה על כל קריאה חדשה."
guideComplexityLabel: "סיבוכיות:"
guideComplexityText: "O(n) להכנסה עקב הזזת רשימה. הזיכרון מוגבל ל-O(window_size)."
guideStep4AnnotationLabel: "הסתכלו בזהירות:"
guideStep4AnnotationText: "הפתרון הזה מתקמפל ונשמע סביר, אך יש בו בעיות אמיתיות. האם אתם מסוגלים לזהות אותן? זה השלב הבא."
guideStep5Title: "שפטו את הפתרון"
guideStep5Subtitle: "זהו מה שגוי בפתרון ה-AI. בחרו את ההיגדים שמצביעים בצורה נכונה על בעיות אמיתיות."
guideJudge1: "ה-list comprehension <code>[r.timestamp for r in self.buffer]</code> בונה מחדש את רשימת המפתחות המלאה בכל הכנסה — זו תקורת O(n) על גבי ההכנסה בסיבוכיות O(n)."
guideJudge1Exp: "נכון: זהו באג ביצועים אמיתי. חילוץ המפתחות צריך להשתמש במבנה ממוין נפרד או SortedList."
guideJudge2: "הרעיון של מאגר מעגלי הוא שגוי מיסודו למקרה שימוש זה."
guideJudge2Exp: "שגוי: מאגר מוגבל הוא גישה סבירה לחלון הזזה — פרטי המימוש הם הבעיה, לא הרעיון."
guideJudge3: "אין שוברת שוויון כאשר חותמות הזמן זהות — יש להשתמש במזהה החיישן כמפתח מיון משני."
guideJudge3Exp: "נכון: זה זוהה במהלך המסגור אך ה-AI התעלם ממנו במימוש."
guideJudge4: "במהלך קפיצות נתונים (פי 5 תפוקה), ההכנסה בסיבוכיות O(n) תגרום להצטברות השהיה עם 500 חיישנים ששולחים בו-זמנית."
guideJudge4Exp: "נכון: ב-2500 קריאות/שנייה במהלך קפיצות, הכנסה בסיבוכיות O(n) ברשימה של 1000 אלמנטים יוצרת צוואר בקבוק אמיתי."
guideJudge5: "Python איטית מדי למערכות זמן אמת; יש לשכתב ב-C++."
guideJudge5Exp: "שגוי: אמנם בחירת שפה חשובה, אך שיפוט עוסק בהערכת הלוגיקה והנכונות של הפתרון, לא בקבלת החלטות מימוש."
guideStep5AnnotationLabel: "ניקוד:"
guideStep5AnnotationText: "תקבלו ציון שיפוט גבוה יותר על ידי מציאת בעיות לוגיות ונכונות אמיתיות. הימנעו מתלונות מעורפלות או דעות על בחירות טכנולוגיות."
guideStep6Title: "הכוונו את ה-AI"
guideStep6Subtitle: "כעת הנחו את ה-AI לתקן את שגיאותיו. בחרו את התיקונים שהם ספציפיים ובני-ביצוע."
guideSteer1: "החליפו את גישת הרשימה + bisect ב-SortedList מספריית sortedcontainers, שנותנת הכנסה בסיבוכיות O(log n) ומונעת בנייה מחדש של רשימת המפתחות."
guideSteer1Exp: "נכון: תיקון ספציפי, מציין את הספרייה המדויקת, ומסביר מדוע הוא פותר את בעיית הביצועים."
guideSteer2: "הפכו את המיון למהיר יותר."
guideSteer2Exp: "שגוי: מעורפל מדי — ה-AI צריך לדעת מה לשנות ואיך. \"מהיר יותר\" לא מנחה שום דבר."
guideSteer3: "שנו את מפתח המיון ל-tuple של (timestamp, sensor_id) כדי שקריאות עם חותמות זמן זהות ימוינו באופן דטרמיניסטי."
guideSteer3Exp: "נכון: הנחיה מדויקת — מפרטת את שינוי מבנה הנתונים המדויק ואת הסיבה לכך."
guideSteer4: "הוסיפו מנגנון זיהוי קפיצות: כאשר קצב הקליטה עולה על 2500/שנייה, עברו להכנסה באצוות (אספו במשך 200 מילישניות, ואז מיינו בבת אחת) לפיחות התקורה."
guideSteer4Exp: "נכון: מטפל בתרחיש הקפיצה עם סף ספציפי ואסטרטגיה קונקרטית."
guideSteer5: "בפתרון יש יותר מדי באגים, אנא התחילו מאפס."
guideSteer5Exp: "שגוי: זריקת עבודה אינה הכוונה — תיקונים טובים בונים על מה שקיים ומתקנים בעיות ספציפיות."
guideStep6AnnotationLabel: "ניקוד:"
guideStep6AnnotationText: "תקבלו ציון הכוונה גבוה יותר על ידי מתן תיקונים מדויקים ובונים. ספרו ל-AI בדיוק מה לשנות ולמה — לא רק \"תקנו את זה.\""
guideStep7Title: "צפו בציונים שלכם"
guideStep7Subtitle: "לאחר השלמת כל השלבים, תקבלו ציונים לכל מימד של חשיבה משותפת עם משוב מותאם אישית."
guideGradeFramingFeedback: "חידוד בעיה מצוין. זיהיתם את כל העמימויות המרכזיות והוספתם אילוצים מדויקים ששיפרו את מפרט המשימה של ה-AI."
guideGradeJudgingFeedback: "הערכה ביקורתית טובה. תפסתם את באג הביצועים ואת שוברת השוויון החסרה, אך יכולתם להיות מדויקים יותר לגבי ניתוח ההשפעה של הקפיצות."
guideGradeSteeringFeedback: "תיקונים חזקים עם חלופות ספציפיות. אסטרטגיית ההכנסה באצוות הייתה יצירתית. שקלו גם לטפל במקרי קצה כמו הגעה שלא לפי הסדר."
guideStep7AnnotationLabel: "כיצד ההערכה עובדת:"
guideStep7AnnotationText: "כל מימד מדורג A/B/C על בסיס איכות הבחירות שלכם. במצב תרגול אתם רואים משוב לאחר כל שלב; במצב הערכה, המשוב נדחה עד הסוף."
guideStep8Title: "מוכנים לנסות אתגר אמיתי?"
guideStep8Subtitle: "ראיתם כיצד מסגור, שיפוט והכוונה עובדים יחד. כעת יישמו מיומנויות אלו באתגר אמיתי עם ציונים חיים."
guideStartRealChallenge: "התחילו אתגר אמיתי"
guideStep8AnnotationLabel: "מה הלאה:"
guideStep8AnnotationText: "עיינו ברשימת האתגרים, בחרו אתגר מאחד הקורסים שלכם, והריצו אותו במצב תרגול לקבלת משוב מיידי על כל שלב. ככל שתשתפרו, נסו מצב הערכה לחוויה מתוזמנת וללא הנחיה."
