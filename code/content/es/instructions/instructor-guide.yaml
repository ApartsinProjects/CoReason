id: instructor-guide
title: "Guía del instructor"
sections:
  - title: "Descripción general"
    content: |
      El CoReasoning Lab es una herramienta pedagógica diseñada para desarrollar
      las habilidades de razonamiento crítico de los estudiantes en el contexto
      de la colaboración con IA. Como instructor, puede crear desafíos, hacer
      seguimiento del progreso de los estudiantes y analizar el rendimiento de la clase.

  - title: "Creación de desafíos"
    content: |
      Cada desafío consta de:
      - Un problema bruto con ambigüedades intencionales
      - Opciones/secciones de encuadre (OM o RA)
      - Una solución IA inicial con defectos deliberados
      - Múltiples ciclos de juicio y dirección con retroalimentación
      - Criterios de finalización y una calificación final

  - title: "Analítica"
    content: |
      El panel de analítica muestra:
      - La distribución de calificaciones por competencia (encuadre, juicio, dirección)
      - Errores frecuentes y patrones de comprensión errónea
      - Progreso a lo largo del tiempo
      - Comparaciones entre cohortes

  - title: "Mejores prácticas"
    content: |
      - Comience con el modo práctica para que los estudiantes se familiaricen
        con el proceso.
      - Use el modo evaluación para las evaluaciones calificadas.
      - Revise los resultados de analítica para identificar las brechas de
        aprendizaje comunes en la clase.
      - Anime a los estudiantes a justificar sus selecciones de encuadre.
