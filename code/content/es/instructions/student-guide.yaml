id: student-guide
title: "Guía del estudiante"
sections:
  - title: "Descripción general"
    content: |
      El AI CoReasoning Lab le ayuda a desarrollar habilidades de pensamiento crítico
      al colaborar con sistemas de IA. Aprenderá a encuadrar problemas, evaluar
      soluciones generadas por IA y dirigir mejoras de manera iterativa.

  - title: "Fase 1 — Encuadre"
    content: |
      Se le presenta un problema bruto intencionalmente vago. Su tarea es identificar
      las suposiciones faltantes, las restricciones y las aclaraciones necesarias
      antes de que la IA genere una solución.

      En el modo de opción múltiple (OM), seleccione todos los refinamientos que apliquen.
      En el modo de respuesta abierta (RA), redacte sus propias secciones de refinamiento.

  - title: "Fase 2 — Ciclos de Juicio y Dirección"
    content: |
      Después de que la IA genera una solución, usted alterna entre dos subpasos:

      A — Juicio: Identifique los defectos, errores y elementos faltantes
      en la solución actual de la IA.

      B — Dirección: Formule instrucciones específicas y ejecutables para guiar
      a la IA en la mejora de su solución.

      Repita los ciclos hasta que la solución sea satisfactoria y luego márquela
      como completada.

  - title: "Modos"
    content: |
      Modo práctica: Recibe retroalimentación después de cada fase. Se permiten
      reintentos para que pueda aprender de sus errores.

      Modo evaluación: La retroalimentación se revela solo al final. Esto simula
      condiciones de examen reales.

  - title: "Consejos para el éxito"
    content: |
      - Lea cuidadosamente el problema bruto antes de seleccionar los refinamientos.
      - Busque términos vagos como «algunos», «rápidamente» o «manejar».
      - Durante el juicio, pregúntese «¿qué más podría estar mal?» después de
        encontrar el primer problema.
      - Las instrucciones de dirección deben ser específicas y ejecutables — evite
        formulaciones vagas como «mejorar» o «hacer más rápido».
      - No marque una solución como completada prematuramente — verifique los casos
        límite y los modos de fallo.
