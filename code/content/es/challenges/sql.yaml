id: sql
title: "Optimización de consultas para analítica de comercio electrónico"
course: "Sistemas de bases de datos"
subject: "Procesamiento de consultas &rsaquo; Optimización de consultas"
maxCycles: 4
rawProblem: "Escriba una consulta SQL que genere un informe mensual de rendimiento de ventas para una plataforma de comercio electrónico. El informe debe mostrar los productos más vendidos agrupados por categoría, incluyendo ingresos totales, unidades vendidas y calificación promedio de clientes. La base de datos tiene &ldquo;millones&rdquo; de registros de transacciones. La consulta debe ejecutarse &ldquo;lo suficientemente rápido&rdquo; para un panel ejecutivo que se actualiza automáticamente. Debe &ldquo;manejar la temporada alta&rdquo; cuando el volumen de pedidos alcanza su máximo."
rawProblemShort: "Consulta SQL para informe mensual de ventas &hellip; mejores productos por categoría, ingresos, calificaciones. Millones de registros, rendimiento del panel."

mc:
  aiSolution:
    html: |
      <div class="code-block">SELECT
          c.category_name,
          p.product_name,
          SUM(oi.quantity) AS units_sold,
          SUM(oi.quantity * oi.unit_price) AS total_revenue,
          AVG(r.rating) AS avg_rating
      FROM order_items oi
      JOIN orders o ON oi.order_id = o.order_id
      JOIN products p ON oi.product_id = p.product_id
      JOIN categories c ON p.category_id = c.category_id
      LEFT JOIN reviews r ON p.product_id = r.product_id
      WHERE o.order_date &gt;= DATE_TRUNC('month', CURRENT_DATE)
      GROUP BY c.category_name, p.product_name
      ORDER BY c.category_name, total_revenue DESC;</div>
    summary: "SELECT básico con JOINs, GROUP BY, ORDER BY. Sin filtro top-N, sin análisis de índices, JOIN de reseñas sin filtrar."

  framing:
    hint: "El problema tiene requisitos vagos. Seleccione TODOS los refinamientos necesarios para definir la tarea con precisión antes de que la IA escriba la consulta."
    options:
      - letter: "A"
        text: "Cuantificar &ldquo;millones&rdquo; como ~8M pedidos, ~200K productos, ~40 categorías"
        correct: true
      - letter: "B"
        text: "Definir &ldquo;lo suficientemente rápido&rdquo; como respuesta de consulta inferior a 3 segundos"
        correct: true
      - letter: "C"
        text: "&ldquo;Más vendidos&rdquo; significa los 10 primeros por categoría ordenados por ingresos"
        correct: true
      - letter: "D"
        text: "Suponer que todas las consultas se ejecutan contra una vista materializada preconstruida"
        correct: false
      - letter: "E"
        text: "Mensual = mes calendario; incluir comparación mes a mes"
        correct: true
      - letter: "F"
        text: "Las calificaciones están garantizadas para cada producto (sin NULLs)"
        correct: false
    studentSelections: [0, 2, 4]
    feedback:
      grade: "B"
      html: |
        <div class="criticism"><strong>Correctamente seleccionados:</strong> (A) cuantificación del volumen de datos, (C) top-10 por categoría, (E) mes calendario con comparación.</div>
        <div class="criticism" style="margin-top:6px"><strong>Omitido:</strong> (B) definición de &ldquo;lo suficientemente rápido&rdquo; &mdash; sin un SLA concreto, no hay forma de evaluar el rendimiento de la consulta.</div>
        <div class="criticism" style="margin-top:6px"><strong>Correctamente evitados:</strong> (D) vista materializada preconstruida sobrespecifica la arquitectura; (F) las calificaciones NO están garantizadas para todos los productos.</div>
        <div class="better-alt" style="margin-top:6px"><strong>Ideal:</strong> (A), (B), (C), (E).</div>

  cycles:
    - # Ciclo 1
      judging:
        options:
          - letter: "A"
            text: "Filtro top-N faltante &mdash; retorna TODOS los productos por categoría, no los 10 primeros"
            correct: true
          - letter: "B"
            text: "El JOIN de reseñas multiplica las filas &mdash; AVG(rating) se calcula sobre filas duplicadas"
            correct: true
          - letter: "C"
            text: "GROUP BY debería incluir product_id para corrección"
            correct: false
          - letter: "D"
            text: "Sin estrategia de índices ni análisis de plan de ejecución"
            correct: true
          - letter: "E"
            text: "Se debería usar NoSQL para este tipo de consulta analítica"
            correct: false
        studentSelections: [0, 3]
        doneSelected: false
        feedback:
          grade: "B"
          html: |
            <div class="criticism"><strong>Correctamente identificados:</strong> (A) filtro top-N faltante, (D) sin estrategia de índices.</div>
            <div class="criticism" style="margin-top:6px"><strong>Omitido:</strong> (B) el JOIN de reseñas crea filas duplicadas que distorsionan AVG(rating). Este es un problema de corrección sutil pero crítico.</div>
            <div class="criticism" style="margin-top:6px"><strong>Correctamente evitados:</strong> (C) GROUP BY es correcto con product_name si es único; (E) SQL es apropiado aquí.</div>
            <div class="better-alt" style="margin-top:6px"><strong>Ideal:</strong> (A), (B), (D).</div>
      steering:
        options:
          - letter: "A"
            text: "&ldquo;Añada ROW_NUMBER() OVER (PARTITION BY categoría ORDER BY ingresos DESC) para limitar a los 10 primeros por categoría.&rdquo;"
            correct: true
          - letter: "B"
            text: "&ldquo;Incluya recomendaciones de índices y análisis del plan de ejecución esperado.&rdquo;"
            correct: true
          - letter: "C"
            text: "&ldquo;Añada más JOINs para incluir información de proveedores y almacenes.&rdquo;"
            correct: false
          - letter: "D"
            text: "&ldquo;Reescriba como procedimiento almacenado para mejor rendimiento.&rdquo;"
            correct: false
        studentSelections: [0, 1]
        feedback:
          grade: "A"
          html: |
            <div class="criticism"><strong>Correctamente seleccionados:</strong> (A) función ventana para top-N, (B) índices/plan de ejecución. Ambos dirigidos y específicos.</div>
            <div class="criticism" style="margin-top:6px"><strong>Correctamente evitados:</strong> (C) expansión de alcance irrelevante, (D) optimización prematura.</div>
            <div class="better-alt" style="margin-top:6px"><strong>Ideal:</strong> (A), (B) &mdash; conjunto óptimo.</div>
      summaryJudging: "Filtro top-N faltante, sin índices/plan de ejecución"
      summarySteering: "Añadir ROW_NUMBER para top-10; incluir análisis de índices"

    - # Ciclo 2 — el estudiante marca como completado demasiado pronto
      aiUpdate:
        html: |
          <div class="code-block">WITH ranked_products AS (
              SELECT
                  c.category_name,
                  p.product_name,
                  SUM(oi.quantity) AS units_sold,
                  SUM(oi.quantity * oi.unit_price) AS total_revenue,
                  AVG(r.rating) AS avg_rating,
                  ROW_NUMBER() OVER (
                      PARTITION BY c.category_id
                      ORDER BY SUM(oi.quantity * oi.unit_price) DESC
                  ) AS rk
              FROM order_items oi
              JOIN orders o ON oi.order_id = o.order_id
              JOIN products p ON oi.product_id = p.product_id
              JOIN categories c ON p.category_id = c.category_id
              LEFT JOIN reviews r ON p.product_id = r.product_id
              WHERE o.order_date &gt;= DATE_TRUNC('month', CURRENT_DATE)
              GROUP BY c.category_id, c.category_name,
                       p.product_id, p.product_name
          )
          SELECT * FROM ranked_products
          WHERE rk &lt;= 10
          ORDER BY category_name, rk;

          -- Índices recomendados:
          -- CREATE INDEX idx_orders_date ON orders(order_date);
          -- CREATE INDEX idx_oi_order ON order_items(order_id, product_id);</div>
        summary: "CTE con ROW_NUMBER para top-10 por categoría. Recomendaciones de índices añadidas. JOIN de reseñas aún sin filtrar."
      judging:
        options:
          - letter: "A"
            text: "El JOIN de reseñas aún crea filas duplicadas &mdash; AVG(rating) está distorsionado por el volumen de pedidos"
            correct: true
          - letter: "B"
            text: "La comparación mes a mes aún falta en los requisitos"
            correct: true
          - letter: "C"
            text: "La CTE hace la consulta más lenta que la original"
            correct: false
        studentSelections: []
        doneSelected: true
        feedback:
          grade: "C"
          html: |
            <div class="criticism"><strong>Finalización prematura.</strong> Dos problemas reales persisten: (A) el JOIN de reseñas distorsiona las calificaciones &mdash; una fila para un producto con 100 pedidos recibe 100 veces el peso en AVG; (B) la comparación mes a mes era un requisito establecido.</div>
            <div class="better-alt" style="margin-top:6px"><strong>Mejor:</strong> Seleccionar tanto (A) como (B), luego dirigir a la IA para corregirlos antes de marcar como completado.</div>
      steering: null
      summaryJudging: "El estudiante marcó la solución como completada (prematuro)"
      summarySteering: null

  completion:
    grades:
      framing: "B"
      judging: "C"
      steering: "A"
    summary: "La dirección fue excelente &mdash; las correcciones fueron específicas y bien elegidas. El encuadre omitió la definición del SLA de rendimiento. El juicio fue el área más débil: omitió el problema de cardinalidad de reseñas en el ciclo 1 y finalizó prematuramente en el ciclo 2 con dos problemas reales pendientes. Practique identificar todos los problemas antes de marcar una solución como completada."

oe:
  aiSolution:
    html: |
      <div class="code-block">WITH monthly_sales AS (
          SELECT
              c.category_name,
              p.product_id,
              p.product_name,
              SUM(oi.quantity) AS units_sold,
              SUM(oi.quantity * oi.unit_price) AS total_revenue,
              ROW_NUMBER() OVER (
                  PARTITION BY c.category_id
                  ORDER BY SUM(oi.quantity * oi.unit_price) DESC
              ) AS rk
          FROM order_items oi
          JOIN orders o ON oi.order_id = o.order_id
          JOIN products p ON oi.product_id = p.product_id
          JOIN categories c ON p.category_id = c.category_id
          WHERE o.order_date &gt;= DATE_TRUNC('month', CURRENT_DATE)
          GROUP BY c.category_id, c.category_name,
                   p.product_id, p.product_name
      )
      SELECT ms.*,
          (SELECT AVG(r.rating) FROM reviews r
           WHERE r.product_id = ms.product_id) AS avg_rating
      FROM monthly_sales ms
      WHERE rk &lt;= 10
      ORDER BY category_name, rk;</div>
    summary: "CTE con ROW_NUMBER para top-10. Subconsulta correlacionada para calificaciones. Sin análisis de índices, sin comparación mes a mes."

  framing:
    hint: "Añada secciones de refinamiento para clarificar los requisitos vagos. Cada sección debe abordar una ambigüedad del problema bruto."
    sections:
      - name: "Suposiciones: volumen y estructura de datos"
        text: "Estimación de ~8M pedidos, ~200K productos, ~40 categorías en un esquema relacional normalizado. Los productos tienen como máximo una asignación de categoría."
      - name: "Restricciones: SLA de rendimiento"
        text: "El panel se actualiza automáticamente cada 5 minutos. La consulta debe retornar en menos de 3 segundos. Considerar una estrategia de indexación para la cláusula WHERE en order_date."
      - name: "Aclaración: alcance del informe"
        text: "&ldquo;Más vendidos&rdquo; = top 10 por categoría por ingresos totales. Mensual = mes calendario. Incluir comparación con el mes anterior para análisis de tendencias."
    feedback:
      grade: "A"
      html: |
        <div class="criticism"><strong>Encuadre exhaustivo.</strong> Cuantificó el volumen de datos, definió el SLA de rendimiento, clarificó la semántica del top-N y especificó la comparación mes a mes.</div>
        <div class="criticism" style="margin-top:6px"><strong>Brecha menor:</strong> Podría abordar cómo manejar productos sin reseñas (calificaciones NULL).</div>

  cycles:
    - # Ciclo 1
      judging:
        sections:
          - name: "Problema: subconsulta correlacionada para calificaciones"
            text: "La subconsulta para avg_rating se ejecuta una vez por fila de resultado. Con 400 filas (10 por categoría × 40 categorías), eso significa 400 consultas separadas. Debería ser un JOIN o CTE preagregado."
          - name: "Problema: comparación mes a mes faltante"
            text: "Los requisitos especifican comparación mes a mes pero la consulta solo muestra datos del mes actual. Es necesario incluir el mes anterior en el mismo conjunto de resultados."
        doneSelected: false
        feedback:
          grade: "A"
          html: |
            <div class="criticism"><strong>Excelente análisis.</strong> Ambos problemas están correctamente identificados con razonamiento específico y cuantificado. La preocupación por la subconsulta correlacionada está bien explicada con estimaciones de conteo de filas.</div>
      steering:
        sections:
          - name: "Instrucción: reemplazar la subconsulta correlacionada"
            text: "Cree una CTE de calificaciones que calcule AVG(rating) por product_id una sola vez, luego haga LEFT JOIN con la consulta principal. Esto elimina la subconsulta por fila."
          - name: "Instrucción: añadir comparación con el mes anterior"
            text: "Añada una segunda CTE para los datos del mes anterior. El SELECT final debe incluir tanto los ingresos del mes actual como del anterior con una columna de cambio porcentual."
        feedback:
          grade: "A"
          html: |
            <div class="criticism"><strong>Bien dirigido.</strong> Ambas instrucciones son específicas, proporcionan orientación clara de implementación y abordan directamente los problemas identificados.</div>
      summaryJudging: "Problema de rendimiento de subconsulta correlacionada, comparación mes a mes faltante"
      summarySteering: "Reemplazar subconsulta correlacionada con CTE; añadir comparación con mes anterior"

    - # Ciclo 2 — el estudiante marca como completado
      aiUpdate:
        html: |
          <div class="code-block">WITH product_ratings AS (
              SELECT product_id, AVG(rating) AS avg_rating,
                     COUNT(*) AS review_count
              FROM reviews GROUP BY product_id
          ),
          current_month AS (
              SELECT c.category_name, p.product_id, p.product_name,
                     SUM(oi.quantity) AS units_sold,
                     SUM(oi.quantity * oi.unit_price) AS revenue,
                     ROW_NUMBER() OVER (PARTITION BY c.category_id
                         ORDER BY SUM(oi.quantity*oi.unit_price) DESC) AS rk
              FROM order_items oi
              JOIN orders o ON oi.order_id = o.order_id
              JOIN products p ON oi.product_id = p.product_id
              JOIN categories c ON p.category_id = c.category_id
              WHERE o.order_date &gt;= DATE_TRUNC('month', CURRENT_DATE)
              GROUP BY c.category_id, c.category_name, p.product_id, p.product_name
          ),
          prev_month AS (
              SELECT p.product_id,
                     SUM(oi.quantity * oi.unit_price) AS prev_revenue
              FROM order_items oi
              JOIN orders o ON oi.order_id = o.order_id
              JOIN products p ON oi.product_id = p.product_id
              WHERE o.order_date &gt;= DATE_TRUNC('month', CURRENT_DATE) - INTERVAL '1 month'
                AND o.order_date &lt; DATE_TRUNC('month', CURRENT_DATE)
              GROUP BY p.product_id
          )
          SELECT cm.category_name, cm.product_name, cm.units_sold,
                 cm.revenue, pr.avg_rating, pr.review_count,
                 pm.prev_revenue,
                 ROUND((cm.revenue - pm.prev_revenue) / pm.prev_revenue * 100, 1) AS pct_change
          FROM current_month cm
          LEFT JOIN product_ratings pr ON cm.product_id = pr.product_id
          LEFT JOIN prev_month pm ON cm.product_id = pm.product_id
          WHERE cm.rk &lt;= 10
          ORDER BY cm.category_name, cm.rk;

          -- Índices: idx_orders_date, idx_oi_order_product</div>
        summary: "Tres CTEs: calificaciones (preagregadas), mes actual, mes anterior. Columna de cambio porcentual. Sugerencias de índices."
      judging:
        sections: []
        doneSelected: true
        feedback:
          grade: "B"
          html: |
            <div class="criticism"><strong>Finalización razonable.</strong> Los problemas principales están resueltos. Preocupación menor restante: pct_change causará un error de división por cero cuando prev_revenue sea NULL o 0. Una protección NULLIF o COALESCE sería prudente.</div>
      steering: null
      summaryJudging: "El estudiante marcó la solución como completada"
      summarySteering: null

  completion:
    grades:
      framing: "A"
      judging: "B"
      steering: "A"
    summary: "Fuerte rendimiento general. El encuadre fue exhaustivo con una definición clara del SLA. El juicio identificó correctamente los dos problemas principales en el ciclo 1. La dirección proporcionó instrucciones específicas e implementables. Deducción menor en juicio: podría haber detectado el caso límite de división por cero en la salida final antes de marcar como completado."
