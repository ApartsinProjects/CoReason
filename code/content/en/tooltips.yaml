#
# ── Profile Page Tooltips ──
profileRole:
  title: "Your Role"
  text: "WHY: Your role determines which features and pages are available to you. WHAT: Students complete challenges and build co-reasoning skills. Instructors create challenges, manage courses, and review student performance. HOW: Your role is assigned during registration and cannot be changed. Contact your administrator if you need a role change."
profileStats:
  title: "Your Statistics"
  text: "WHY: Tracking your activity helps you understand how actively you are engaging with the platform. WHAT: Challenges Created shows how many challenges you have authored. Challenges Executed shows how many challenge runs you have completed. HOW: To increase your statistics, create new challenges or complete more challenge runs from your subscribed courses."
profileCourses:
  title: "Course Subscriptions"
  text: "WHY: Your course subscriptions determine which challenges are available to you and which analytics data is tracked. WHAT: A list of all courses you are currently subscribed to. Each course provides access to its public challenges. HOW: Subscribe to new courses from the Course Catalog page. You can unsubscribe at any time."
profileOverview:
  title: "My Profile"
  text: "WHY: Your profile centralizes your identity, role, and activity on the platform. WHAT: View your account details, course subscriptions, and challenge statistics. Only your display name can be edited. HOW: Click the pencil icon next to your name to edit it, then click Save Changes."
#
# ── Analytics Grade Column Tooltips ──
analyticsFramingGrade:
  title: "Framing Grade"
  text: "WHY: Framing is the foundation of effective AI collaboration — a well-defined task leads to better AI output. WHAT: Your grade reflects how well you refined the raw problem by adding constraints, assumptions, and clarifications before the AI attempted a solution. HOW: Higher grades come from identifying genuine gaps, reducing ambiguity, and providing precise task specifications."
analyticsJudgingGrade:
  title: "Judging Grade"
  text: "WHY: Critical evaluation of AI output is essential — AI solutions often contain subtle errors that require domain expertise to detect. WHAT: Your grade reflects how accurately you identified mistakes, logical gaps, and incorrect assumptions in the AI-generated solution. HOW: Higher grades come from spotting specific issues, distinguishing real errors from acceptable simplifications, and providing clear descriptions."
analyticsSteeringGrade:
  title: "Steering Grade"
  text: "WHY: Guiding AI toward better outputs through precise corrections is the core skill of human-AI collaboration. WHAT: Your grade reflects how effectively your corrections led the AI to improve its solution — addressing real issues with actionable guidance. HOW: Higher grades come from precise, constructive corrections that explain what should change and why, rather than vague complaints."
