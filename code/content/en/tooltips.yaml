  text: "WHY: Tracking completed vs total runs shows student engagement and progress. WHAT: The number of completed challenge runs out of total runs attempted by this student. HOW: A low completion ratio may indicate a student is struggling or disengaged."
instrAnalyticsActions:
  title: "Actions"
  text: "Available actions for this student. Click Review to see the detailed report of a completed challenge run."
#
# ── Grade Badge Tooltips ──
gradeA:
  title: "Grade A — Excellent"
  text: "WHY: Grades help you track your co-reasoning mastery. WHAT: Grade A means you demonstrated excellent understanding — you identified the key issues, provided strong refinements, and showed deep critical thinking. HOW: Keep applying these skills consistently across different challenges."
gradeB:
  title: "Grade B — Good"
  text: "WHY: Grades help you track your co-reasoning mastery. WHAT: Grade B means you showed good understanding with some room for improvement — you caught the main points but may have missed nuances or included unnecessary elements. HOW: Review the feedback carefully and focus on the specific gaps mentioned."
gradeC:
  title: "Grade C — Needs Improvement"
  text: "WHY: Grades help you track your co-reasoning mastery. WHAT: Grade C means significant improvement is needed — important issues were missed or the response didn't adequately address the task requirements. HOW: Re-read the problem carefully, study the feedback, and try similar challenges to build your skills."
