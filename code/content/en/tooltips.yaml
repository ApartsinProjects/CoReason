# English tooltip help texts
#
# ── Shared Tooltips (used on both student and instructor pages) ──
challengeType:
  title: "Challenge Type"
  text: "WHY: Different learning goals require different feedback approaches — practice builds skills through iteration, while assessment measures independent ability. WHAT: Practice mode shows AI-generated feedback after each phase, helping you learn from mistakes in real time. Assessment mode withholds feedback until completion, testing your unassisted co-reasoning skills. HOW: Choose Practice for learning and exploration. Choose Assessment for graded evaluations or when measuring true skill level."
visibility:
  title: "Visibility"
  text: "WHY: Controlling who can see a challenge lets instructors manage course content and lets students create personal practice material. WHAT: Public challenges are visible to all enrolled students in the course. Private challenges are visible only to their creator. HOW: Public challenges appear in the course challenge list for all subscribers. Private challenges appear only in your personal challenge list."
maxCycles:
  title: "Max Cycles"
  text: "WHY: More cycles give students more opportunities to practice iterative correction, but too many can reduce engagement and focus. WHAT: The maximum number of Judge+Steer cycles allowed per challenge run. After the last cycle, the run completes and all grades are calculated. HOW: 3-5 cycles is typical. Use fewer for quicker assessments, more for deep practice exercises."
subjectPath:
  title: "Subject Path"
  text: "WHY: Mapping challenges to specific topics helps organize content and enables targeted analytics on skill areas. WHAT: The topic hierarchy this challenge belongs to, within the course's subject tree. Problems and rubrics are generated based on these subject areas. HOW: Select specific leaf nodes for focused challenges, or broader parent nodes for wider-ranging problems."
responseType:
  title: "Response Type"
  text: "WHY: The response format shapes the learning experience — multiple choice scaffolds decision-making while open-ended develops independent reasoning skills. WHAT: Multiple-choice presents pre-generated options to select from. Open-ended allows free-form written reasoning and custom refinements. HOW: Use multiple choice for introductory challenges. Use open-ended for advanced challenges requiring independent critical thinking."
framingPhase:
  title: "Framing Phase"
  text: "WHY: Real-world problems are never pre-formatted for AI. Framing teaches you to transform vague requirements into precise, actionable tasks. WHAT: You receive a raw, intentionally incomplete problem and must refine it by adding assumptions, constraints, and clarifications before the AI generates a solution. This is Phase 1 of the co-reasoning process (see the process diagram for the full flow). HOW: Read the problem carefully. Identify what is missing, ambiguous, or assumed. Add refinements that make the task well-defined."
judgingPhase:
  title: "Judging Phase"
  text: "WHY: AI outputs often contain subtle errors that require careful domain expertise to detect. Judging builds your analytical evaluation skills. WHAT: You review the AI-generated solution and identify specific errors, gaps, or incorrect assumptions. This is Phase 2A of the co-reasoning process (see the process diagram for the full flow). Your judgments are recorded for grading but are NOT sent to the AI. HOW: Read the solution critically. Look for logical errors, missing elements, incorrect facts, and unstated assumptions."
steeringPhase:
  title: "Steering Phase"
  text: "WHY: Knowing how to give precise, actionable feedback to AI is the core competency of effective human-AI collaboration. WHAT: You write specific corrections or instructions to fix the issues you identified. This is Phase 2B of the co-reasoning process (see the process diagram for the full flow). The AI processes your steering and regenerates an improved solution. HOW: Be specific and concrete. Tell the AI exactly what to fix. Clear corrections produce better revisions — vague feedback produces vague improvements."
coReasoningScore:
  title: "Co-Reasoning Score"
  text: "WHY: A combined score helps you understand your overall effectiveness as an AI collaborator across all three co-reasoning skills. WHAT: Your overall performance grade combining framing accuracy, judgment quality, and steering effectiveness. Each skill is graded independently (A/B/C). HOW: Focus on improving your weakest skill area first. Review the feedback from each phase to understand where you can improve."
rubric:
  title: "Rubric"
  text: "WHY: Consistent evaluation criteria ensure fair, objective grading across all students and challenge attempts. WHAT: AI-generated grading criteria used to evaluate your co-reasoning performance in each phase (framing, judging, steering). The rubric is tailored to the challenge's subject area. HOW: Rubrics are invisible during the challenge. After completion, your grades reflect how well you met the rubric criteria."
subjectTree:
  title: "Subject Tree"
  text: "WHY: Organizing topics hierarchically enables structured course content and targeted skill assessment across subject areas. WHAT: A tree-structured organization of topics within a course. Challenges are mapped to specific nodes, and problems are generated from the selected subjects. HOW: Instructors build the tree through the course settings. Students see challenges organized by their subject areas."
coReasoningProcess:
  title: "The CoReasoning Process"
  text: "WHY: Understanding the full co-reasoning workflow helps you see how each phase builds on the previous one and why each skill matters. WHAT: The process has three phases: (1) Framing — refine a vague problem into a well-defined task, (2A) Judging — identify issues in the AI solution, (2B) Steering — write corrections to improve the AI output. Judging and Steering repeat in cycles. HOW: Click the process diagram link or look for the flow chart icon to see the full visual diagram of the co-reasoning process."
#
# ── Student-Facing Tooltips ──
courseSubscription:
  title: "Course Subscription"
  text: "WHY: Subscribing connects you to a course's challenge library and enables your instructor to track your progress. WHAT: When you subscribe, the course's public challenges appear in your challenge list and your results are included in course analytics. HOW: Click Subscribe on any available course card. You can unsubscribe at any time from the course catalog."
analyticsOverview:
  title: "Your Analytics"
  text: "WHY: Tracking your performance over time reveals patterns, strengths, and areas that need attention. WHAT: A visual summary of your grades across all completed challenge runs, including distributions by skill and trends over time. HOW: Use the filters to focus on specific courses or challenge types. Click any challenge in the table to see its detailed report."
