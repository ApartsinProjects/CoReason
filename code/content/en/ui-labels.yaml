# ── What is Co-Reasoning Page ──
whatIsCoReasoning: "What is Co-Reasoning?"
whatIsCoReasoningSubtitle: "Learn to think critically with AI — not just use it"
theProblem: "The Problem"
theProblemText: "Most people use AI passively: paste a question, copy the answer. But AI outputs often contain subtle errors, missing assumptions, and logical gaps. If you can't spot these issues, you're not using AI — you're being used by it. Co-Reasoning teaches you to work <em>with</em> AI as a critical partner, not a crutch."
theThreeSkills: "The Three Skills"
theThreeSkillsDesc: "Co-Reasoning develops three independent critical thinking skills:"
framingSkillTitle: "Framing"
framingSkillDesc: "Turn vague problems into well-defined tasks. Real problems are messy — you must identify what's missing, add assumptions, and clarify requirements before AI can help."
judgingSkillTitle: "Judging"
judgingSkillDesc: "Find what's wrong with AI's answer. AI solutions look good but contain subtle errors. Your job is to identify incorrect assumptions, missing edge cases, and logical flaws."
steeringSkillTitle: "Steering"
steeringSkillDesc: "Guide AI toward a better answer. Once you've found issues, give the AI specific, actionable corrections — not vague complaints."
howChallengeWorks: "How a Challenge Works"
howChallengeWorksDesc: "Each challenge walks you through the three skills in sequence:"
step1Text: "<strong>Read</strong> an intentionally ill-defined problem statement"
step2Text: "<strong>Frame</strong> it by selecting or writing refinements to clarify the problem"
step3Text: "<strong>See</strong> an AI-generated solution that is deliberately imperfect"
step4Text: "<strong>Judge</strong> the issues — identify flaws, incorrect assumptions, and missing cases"
step5Text: "<strong>Steer</strong> with specific, actionable corrections to improve the solution"
step6Text: "<strong>Review</strong> your three independent grades and detailed feedback"
graded: "Graded (A/B/C)"
whyThreeGrades: "Why Three Grades?"
whyThreeGradesDesc: "Each skill is graded independently because they are distinct competencies. You might frame a problem brilliantly but miss obvious flaws in the AI's answer, or judge well but give vague steering feedback. Three separate grades give you a clear picture of where to improve."
gradeExcellent: "Excellent"
gradeExcellentDesc: "Thorough, precise, and insightful"
gradeGood: "Good"
gradeGoodDesc: "Solid understanding with minor gaps"
gradeNeedsWork: "Needs Work"
gradeNeedsWorkDesc: "Significant issues to address"
practiceVsAssessment: "Practice vs Assessment"
practiceVsAssessmentDesc: "Challenges come in two modes:"
readyToStart: "Ready to develop your critical AI skills?"
startFirstChallenge: "Start Your First Challenge"

# ── Interactive Guide Page ──
guideStepProblem: "Problem"
guideStepGaps: "Gaps"
guideStepFrame: "Frame"
guideStepSolution: "Solution"
guideStepJudge: "Judge"
guideStepSteer: "Steer"
guideStepGrades: "Grades"
guideStepGo: "Go!"
guideStep1Title: "Here's a raw problem"
guideStep1Subtitle: "This is what an instructor gives you. Read it carefully — your job is to think critically about it before the AI starts working."
guideRawProblemLabel: "Raw Problem Statement"
guideRawProblemText: "Design a real-time sorting module for an IoT sensor network. The system receives readings from a few hundred temperature sensors. It must sort recent readings by timestamp, handle data spikes during peak hours, and support a polling API that returns the latest sorted window. Optimize for low memory overhead."
guideStep1AnnotationLabel: "What's happening:"
guideStep1AnnotationText: "In a real challenge, this is the first thing you see. The problem sounds reasonable, but is it complete enough for an AI to solve well? That's what you'll figure out next."
guideStep2Title: "Notice what's missing?"
guideStep2Subtitle: "Real-world problems are often ambiguous. A key co-reasoning skill is spotting the gaps before the AI starts solving."
guideProblemAgainLabel: "The problem again"
guideGap1: "<strong>Sort key is unclear:</strong> \"Sort by timestamp\" — but what about readings with identical timestamps? There is no tiebreaker strategy."
guideGap2: "<strong>\"Few hundred\" is vague:</strong> Is it 200? 500? 900? The data structure and algorithm choice depends heavily on actual scale."
guideGap3: "<strong>\"Data spikes\" is undefined:</strong> Does this mean 2x the normal rate? 100x? Should the system drop readings, buffer them, or handle all of them?"
guideGap4: "<strong>No window size specified:</strong> \"Latest sorted window\" — how large? Last 10 seconds? Last 1000 readings? This changes the memory model entirely."
guideStep2AnnotationLabel: "This is Framing:"
guideStep2AnnotationText: "Before the AI writes a single line of code, you refine the problem by identifying what's missing, ambiguous, or under-specified. Better framing leads to better AI output."
guideStep3Title: "Frame it"
guideStep3Subtitle: "Select the statements that correctly identify gaps or add useful constraints. In a real challenge, you pick from multiple-choice options."
guideFrame1: "The sort key needs a tiebreaker — when timestamps match, use sensor ID as secondary sort."
guideFrame1Exp: "Correct: Identifies a genuine ambiguity and proposes a concrete resolution."
guideFrame2: "Define \"few hundred\" as exactly 500 sensors, each sending one reading per second."
guideFrame2Exp: "Correct: Pins down a vague quantity with a specific, testable number."
guideFrame3: "Use Python because it's the most popular language for IoT."
guideFrame3Exp: "Incorrect: This is an implementation choice, not a problem clarification. Framing is about the problem, not the solution."
guideFrame4: "Define \"data spike\" as up to 5x normal throughput and specify that no readings should be dropped."
guideFrame4Exp: "Correct: Clarifies an ambiguous term with concrete parameters and a clear requirement."
guideFrame5: "The problem is clear enough — no additional constraints are needed."
guideFrame5Exp: "Incorrect: The problem has several ambiguities that would lead to an incomplete solution."
guideStep3AnnotationLabel: "Scoring:"
guideStep3AnnotationText: "You earn a higher Framing grade by correctly identifying real gaps and avoiding options that jump ahead to solutions or dismiss the need for clarification."
guideStep4Title: "AI generates a solution"
guideStep4Subtitle: "Based on your framing, the AI produces a solution. But AI solutions are often plausible yet flawed — your job is to evaluate it critically."
guideAiSolutionLabel: "AI-Generated Solution"
guideApproachLabel: "Approach:"
guideApproachText: "Use a fixed-size circular buffer of 1000 entries, sorted via insertion sort on each new reading."
guideComplexityLabel: "Complexity:"
guideComplexityText: "O(n) per insertion due to list shift. Memory is bounded at O(window_size)."
guideStep4AnnotationLabel: "Look carefully:"
guideStep4AnnotationText: "This solution compiles and sounds reasonable, but it has real problems. Can you spot them? That's the next step."
guideStep5Title: "Judge the solution"
guideStep5Subtitle: "Identify what's wrong with the AI's solution. Select the statements that correctly point out real issues."
guideJudge1: "The list comprehension <code>[r.timestamp for r in self.buffer]</code> rebuilds the entire key list on every insertion — this is O(n) overhead on top of the O(n) insert."
guideJudge1Exp: "Correct: This is a genuine performance bug. The key extraction should use a separate sorted structure or SortedList."
guideJudge2: "The circular buffer concept is fundamentally wrong for this use case."
guideJudge2Exp: "Incorrect: A bounded buffer is a reasonable approach for a sliding window — the implementation details are the problem, not the concept."
guideJudge3: "There is no tiebreaker when timestamps are identical — sensor ID should be used as a secondary sort key."
guideJudge3Exp: "Correct: This was identified during framing but the AI ignored it in the implementation."
guideJudge4: "During data spikes (5x throughput), the O(n) insertion will cause latency buildup with 500 sensors sending simultaneously."
guideJudge4Exp: "Correct: At 2500 readings/sec during spikes, O(n) per insert on a 1000-element list creates a real bottleneck."
guideJudge5: "Python is too slow for real-time systems; this should be rewritten in C++."
guideJudge5Exp: "Incorrect: While language choice matters, judging is about evaluating the solution's logic and correctness, not making implementation decisions."
guideStep5AnnotationLabel: "Scoring:"
guideStep5AnnotationText: "You earn a higher Judging grade by finding real logical and correctness issues. Avoid vague complaints or opinions about technology choices."
guideStep6Title: "Steer the AI"
guideStep6Subtitle: "Now guide the AI to fix its mistakes. Select the corrections that are specific and actionable."
guideSteer1: "Replace the list + bisect approach with a SortedList from the sortedcontainers library, which gives O(log n) insertion and avoids rebuilding the key list."
guideSteer1Exp: "Correct: Specific fix, names the exact library, and explains why it solves the performance issue."
guideSteer2: "Make the sorting faster."
guideSteer2Exp: "Incorrect: Too vague — the AI needs to know what to change and how. \"Faster\" doesn't guide anything."
guideSteer3: "Modify the sort key to be a tuple (timestamp, sensor_id) so that readings with identical timestamps are ordered deterministically."
guideSteer3Exp: "Correct: Precise instruction — specifies the exact data structure change and the reason for it."
guideSteer4: "Add a spike detection mechanism: when ingest rate exceeds 2500/sec, switch to batch insertion (collect for 200ms, then bulk-sort) to amortize overhead."
guideSteer4Exp: "Correct: Addresses the spike scenario with specific thresholds and a concrete strategy."
guideSteer5: "The solution has too many bugs, please start over from scratch."
guideSteer5Exp: "Incorrect: Throwing away work isn't steering — good corrections build on what exists and fix specific issues."
guideStep6AnnotationLabel: "Scoring:"
guideStep6AnnotationText: "You earn a higher Steering grade by giving precise, constructive corrections. Tell the AI exactly what to change and why — not just \"fix it.\""
guideStep7Title: "See your grades"
guideStep7Subtitle: "After completing all phases, you receive grades for each co-reasoning dimension with personalized feedback."
guideGradeFramingFeedback: "Excellent problem refinement. You identified all major ambiguities and added precise constraints that improved the AI's task specification."
guideGradeJudgingFeedback: "Good critical evaluation. You caught the performance bug and the missing tiebreaker, but could have been more precise about the spike impact analysis."
guideGradeSteeringFeedback: "Strong corrections with specific alternatives. The batch insertion strategy was creative. Consider also addressing edge cases like out-of-order arrivals."
guideStep7AnnotationLabel: "How grading works:"
guideStep7AnnotationText: "Each dimension is graded A/B/C based on the quality of your choices. In practice mode you see feedback after each phase; in assessment mode, feedback is deferred until the end."
guideStep8Title: "Ready to try a real challenge?"
guideStep8Subtitle: "You've seen how framing, judging, and steering work together. Now apply these skills to a real AI-generated challenge with live grading."
guideStartRealChallenge: "Start a Real Challenge"
guideStep8AnnotationLabel: "What's next:"
guideStep8AnnotationText: "Browse the challenge list, pick a challenge from one of your courses, and run it in practice mode to get immediate feedback on each phase. As you improve, try assessment mode for a timed, unguided experience."
