# ── Challenge Run Tooltips (WHY → WHAT → HOW) ──
tooltip_rawProblem: "WHY: Real-world problems are rarely presented in a clean, solvable form. Learning to recognize what is missing or ambiguous is the first step in effective AI collaboration. WHAT: This is a raw, intentionally incomplete problem generated from your course material. It contains gaps, unstated assumptions, and ambiguities that you must address before the AI can produce a useful solution. HOW: Read the problem carefully. Ask yourself: What information is missing? What terms are vague? What assumptions are being made? Your goal is to identify what needs to be clarified or added in the next step."
tooltip_refinement: "WHY: Initial problem statements are often incomplete or ambiguous. Refinements reduce uncertainty, align expectations, and help the AI produce more accurate, relevant, and testable outputs. WHAT: Refinements are additions that make the task more precise. They may define the problem itself, such as inputs, outputs, constraints, assumptions, context, and evaluation criteria. They may also add explicit requests to the AI, such as asking it to list important edge cases, compare alternatives, or explain trade-offs. HOW: Look for what is missing, unclear, or underspecified. Some refinements are provided manually as task specifications, while others are written as direct instructions to the AI about how to approach the task or structure the answer. Add details that reduce ambiguity, guide the solution process, or improve the usefulness of the output."
tooltip_selectRefinements: "WHY: Initial problem statements are often incomplete or ambiguous. Selecting the right refinements reduces uncertainty and helps the AI produce accurate, relevant outputs. WHAT: Each option represents a single refinement — it may define the problem itself (inputs, constraints, assumptions) or add an explicit request to the AI (list edge cases, compare alternatives). Select all refinements you believe should be applied. HOW: Evaluate each option: Does it address a genuine gap in the problem? Does it add useful guidance for the AI? Avoid selecting refinements that over-specify, contradict the problem, or add irrelevant constraints."
tooltip_judging: "WHY: AI-generated solutions often appear correct at first glance but contain subtle errors, oversimplifications, or missing elements. Judging builds your ability to critically evaluate AI output — a skill essential for any professional working with AI. WHAT: Judging means reviewing the AI's solution to identify mistakes, logical gaps, missing edge cases, or incorrect assumptions. You are assessing whether the output fully and correctly addresses the refined problem, and flagging specific issues that need correction. HOW: Compare the solution against the problem requirements and your domain knowledge. Check for calculation errors, flawed reasoning, incomplete coverage, or conclusions that don't follow from the premises. Be specific — describe each issue clearly so it can be acted upon in the next step."
tooltip_steering: "WHY: Identifying errors is only half the skill. Steering teaches you to guide AI toward better outputs by providing precise, actionable corrections — the core competency of effective human-AI collaboration. WHAT: Steering means writing specific corrections or instructions that address the issues you identified during judging. The AI will use your guidance to regenerate an improved solution. Your corrections define what should change and how. HOW: Be precise and constructive. Instead of saying 'this is wrong,' explain what the correct approach should be and why. Provide concrete directions: correct a formula, add a missing constraint, restructure an argument, or request a different method. The clearer your guidance, the better the AI's revised output."

