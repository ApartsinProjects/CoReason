id: student-guide
title: "Student Guide"
sections:
  - title: "Getting Started"
    content: "Welcome to AI CoReasoning Lab. Here you'll practice critical evaluation of AI-generated solutions through structured challenges."
  - title: "Challenge Flow"
    content: "Each challenge has two phases: Phase 1 (Framing) where you refine the problem statement, and Phase 2 (Judge+Steer Cycles) where you evaluate and improve the AI's solution iteratively."
  - title: "Scoring"
    content: "You receive separate grades for Framing, Judging, and Steering. Grades range from A (excellent) to D (needs improvement)."
  - title: "Practice vs Assessment"
    content: "Practice mode provides feedback after each phase and allows retries. Assessment mode reveals feedback only at completion."
