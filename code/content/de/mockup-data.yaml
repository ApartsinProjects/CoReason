# ─── Aufgabenbericht (07b-Detail fuer Aufgabe 1) ───
challengeReport:
  challengeName: "Analyse von Sortieralgorithmen"
  course: "Softwaretechnik"
  date: "8. Maerz 2026"
  type: "assessment"
  responseMode: "mc"
  cyclesUsed: 2
  maxCycles: 5
  framing:
    grade: "A"
    submission: "Das Problem verlangt die Analyse von Sortieralgorithmen, spezifiziert aber nicht: Eingabegroessenbereich, ob Stabilitaet wichtig ist, Speichereinschraenkungen. Ich nehme an: Arrays von 1K-1M Ganzzahlen, Stabilitaet nicht erforderlich, O(1) zusaetzlicher Speicher bevorzugt."
    feedback: "Starke Identifikation fehlender Einschraenkungen. Die Annahme ueber O(1) zusaetzlichen Speicher ist im Kontext gut begruendet. Haette auch hinterfragen koennen, ob die Eingabe teilweise sortiert ist."
    summary: "Starke Identifikation fehlender Einschraenkungen und klare, gut begruendete Annahmen ueber den Problemumfang."
  judging:
    grade: "B"
    summary: "Schluesselprobleme wie Randfaelle und Partitionierungsstrategie erkannt, aber die Luecke im Komplexitaetsbeweis in der KI-Ausgabe uebersehen."
  steering:
    grade: "A"
    summary: "Spezifische, umsetzbare Korrekturen, die zu deutlichen Verbesserungen sowohl in der Analysetiefe als auch in der Codequalitaet gefuehrt haben."
  cycles:
    - num: 1
      judgingText: "Ausgewaehlte Probleme: 'Fehlender Randfall fuer leeres Array', 'Komplexitaetsanalyse fuer den schlechtesten Fall unvollstaendig'"
      judgingGrade: "B"
      steeringText: "Ausgewaehlte Korrekturen: 'Schutzklausel fuer leeres Array hinzufuegen', 'Worst-Case-Analyse fuer Quicksort einbeziehen'"
      steeringGrade: "A"
      aiOutput: "Die aktualisierte Analyse enthaelt nun eine Schutzklausel fuer leere Arrays am Einstiegspunkt jeder Sortierfunktion. Die Worst-Case-Zeitkomplexitaet fuer Quicksort wurde auf O(n²) revidiert, mit einem Hinweis auf Pivot-Auswahlstrategien zur Abmilderung dieses Szenarios..."
    - num: 2
      isFinal: true
      judgingText: "Identifiziert: 'Partitionierungsstrategie nicht optimal', 'Keine Erwaehnung der Cache-Leistung'"
      judgingGrade: "B"
      steeringText: "Angewiesen: 'Zu Median-von-drei-Partitionierung wechseln', 'Cache-Lokalitaetsanalyse hinzufuegen'"
      steeringGrade: "A"
      aiOutput: "Die endgueltige Ueberarbeitung uebernimmt die Median-von-drei-Pivotauswahl fuer Quicksort, was die Wahrscheinlichkeit des schlechtesten Falls reduziert. Ein neuer Abschnitt zur Cache-Lokalitaet vergleicht das sequenzielle Zugriffsmuster von Mergesort mit der In-place- aber weniger cache-freundlichen Partitionierung von Quicksort..."

