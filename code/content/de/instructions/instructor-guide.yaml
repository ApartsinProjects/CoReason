id: instructor-guide
title: "Leitfaden für Dozierende"
sections:
  - title: "Überblick"
    content: |
      Das AI CoReasoning Lab ist ein pädagogisches Werkzeug, das darauf ausgelegt ist,
      die Fähigkeiten zum kritischen Denken der Studierenden im Kontext der
      KI-Zusammenarbeit zu entwickeln. Als Dozent können Sie Aufgaben erstellen,
      den Fortschritt der Studierenden verfolgen und die Leistung der Klasse analysieren.

  - title: "Aufgabenerstellung"
    content: |
      Jede Aufgabe besteht aus:
      - Einem Rohproblem mit absichtlichen Mehrdeutigkeiten
      - Rahmungsoptionen/-abschnitten (MC oder OA)
      - Einer initialen KI-Lösung mit bewussten Mängeln
      - Mehreren Beurteilungs- und Steuerungszyklen mit Rückmeldungen
      - Abschlusskriterien und einer Endnote

  - title: "Analytik"
    content: |
      Das Analytik-Dashboard zeigt:
      - Die Notenverteilung nach Kompetenz (Rahmung, Beurteilung, Steuerung)
      - Häufige Fehler und Missverständnismuster
      - Fortschritt über die Zeit
      - Vergleiche zwischen Kohorten

  - title: "Empfohlene Vorgehensweisen"
    content: |
      - Beginnen Sie mit dem Übungsmodus, damit sich die Studierenden mit dem
        Prozess vertraut machen können.
      - Verwenden Sie den Bewertungsmodus für benotete Prüfungen.
      - Überprüfen Sie die Analytik-Ergebnisse, um gemeinsame Lernlücken
        in der Klasse zu identifizieren.
      - Ermutigen Sie die Studierenden, ihre Rahmungsauswahl zu begründen.
