id: student-guide
title: "Leitfaden für Studierende"
sections:
  - title: "Überblick"
    content: |
      Das AI CoReasoning Lab hilft Ihnen, Fähigkeiten zum kritischen Denken zu entwickeln,
      indem Sie mit KI-Systemen zusammenarbeiten. Sie lernen, Probleme zu rahmen,
      KI-generierte Lösungen zu bewerten und Verbesserungen iterativ zu steuern.

  - title: "Phase 1 — Rahmung"
    content: |
      Ihnen wird ein absichtlich vages Rohproblem präsentiert. Ihre Aufgabe ist es,
      fehlende Annahmen, Einschränkungen und notwendige Klarstellungen zu identifizieren,
      bevor die KI eine Lösung generiert.

      Im Multiple-Choice-Modus (MC) wählen Sie alle zutreffenden Verfeinerungen aus.
      Im offenen Antwortmodus (OA) verfassen Sie Ihre eigenen Verfeinerungsabschnitte.

  - title: "Phase 2 — Beurteilungs- und Steuerungszyklen"
    content: |
      Nachdem die KI eine Lösung generiert hat, wechseln Sie zwischen zwei Teilschritten:

      A — Beurteilung: Identifizieren Sie Mängel, Fehler und fehlende Elemente
      in der aktuellen KI-Lösung.

      B — Steuerung: Formulieren Sie spezifische, umsetzbare Anweisungen, um die KI
      bei der Verbesserung ihrer Lösung zu leiten.

      Wiederholen Sie die Zyklen, bis die Lösung zufriedenstellend ist, und markieren
      Sie sie dann als abgeschlossen.

  - title: "Modi"
    content: |
      Übungsmodus: Sie erhalten nach jeder Phase eine Rückmeldung. Wiederholungen
      sind erlaubt, damit Sie aus Ihren Fehlern lernen können.

      Bewertungsmodus: Die Rückmeldung wird erst am Ende angezeigt. Dies simuliert
      reale Prüfungsbedingungen.

  - title: "Tipps für den Erfolg"
    content: |
      - Lesen Sie das Rohproblem sorgfältig, bevor Sie Verfeinerungen auswählen.
      - Achten Sie auf vage Begriffe wie „einige", „schnell" oder „bewältigen".
      - Fragen Sie sich bei der Beurteilung: „Was könnte noch falsch sein?", nachdem
        Sie das erste Problem gefunden haben.
      - Steuerungsanweisungen sollten spezifisch und umsetzbar sein — vermeiden Sie
        vage Formulierungen wie „verbessern" oder „schneller machen".
      - Markieren Sie eine Lösung nicht voreilig als abgeschlossen — überprüfen Sie
        Grenzfälle und Fehlermodi.
