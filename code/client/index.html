<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoReasoning Lab</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="assets/logo.png">
  <style>
    body {
      background: linear-gradient(135deg, var(--primary) 0%, var(--teal) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .loading-container {
      text-align: center;
      color: #fff;
    }
    .loading-container img {
      height: 64px;
      width: 64px;
      border-radius: 12px;
      margin-bottom: 16px;
    }
    .loading-container h1 {
      font-size: 28px;
      margin-bottom: 24px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading-container">
    <img src="assets/logo.png" alt="CoReasoning Lab">
    <h1>CoReasoning Lab</h1>
    <div class="spinner"></div>
  </div>

  <script>
    (async function() {
      try {
        const res = await fetch('/api/v1/auth/me', { credentials: 'include' });
        if (!res.ok) {
          window.location.replace('/00-login.html');
          return;
        }
        const data = await res.json();
        const role = data.user && data.user.role;
        if (role === 'instructor') {
          window.location.replace('/03-challenge-list-instructor.html');
        } else {
          window.location.replace('/03-challenge-list.html');
        }
      } catch (e) {
        window.location.replace('/00-login.html');
      }
    })();
  </script>
</body>
</html>
