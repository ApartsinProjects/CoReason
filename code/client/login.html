<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI CoReasoning Lab — Sign In</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="assets/logo.png">
  <script src="content-compiled/all.js"></script>
  <script src="content-loader.js"></script>
  <script src="js/tooltips.js"></script>
  <script src="js/api-client.js"></script>
  <style>
    body { background: linear-gradient(135deg, var(--primary) 0%, var(--teal) 100%); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-container { width: 100%; max-width: 460px; }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo img { height: 64px; width: 64px; border-radius: 12px; margin-bottom: 12px; }
    .login-logo h1 { color: #fff; font-size: 28px; }
    .login-logo p { color: rgba(255,255,255,.7); font-size: 14px; }
    .login-card { background: #fff; border-radius: 12px; padding: 32px; box-shadow: var(--shadow-lg); }
    .login-card h2 { font-size: 20px; margin-bottom: 24px; text-align: center; color: var(--primary); }
    .sso-buttons { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .btn-sso { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px; border-radius: var(--radius); border: 1.5px solid var(--border); background: #fff; font-size: 14px; font-weight: 500; cursor: pointer; transition: all .15s; width: 100%; text-decoration: none; color: var(--text); }
    .btn-sso:hover { border-color: var(--primary); background: #f8f9ff; }
    .btn-sso svg { width: 20px; height: 20px; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--text-secondary); font-size: 13px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .footer-link { text-align: center; margin-top: 20px; font-size: 14px; color: rgba(255,255,255,.7); }
    .footer-link a { color: #fff; text-decoration: underline; }
    .error-message { background: #fce4ec; color: #c62828; padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-bottom: 16px; display: none; }
    .test-login-section { background: #fff; border-radius: 12px; padding: 24px; box-shadow: var(--shadow-lg); margin-top: 20px; }
    .test-login-section h3 { font-size: 15px; color: var(--primary); margin-bottom: 12px; text-align: center; }
    .test-login-select { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: var(--radius); font-size: 14px; background: #fff; cursor: pointer; margin-bottom: 12px; color: var(--text); }
    .test-login-select:focus { border-color: var(--primary); outline: none; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-logo">
      <img src="assets/logo.png" alt="AI CoReasoning Lab">
      <h1>AI CoReasoning Lab</h1>
      <p data-t="aiPoweredAssessment">Assessment and Practice for Human–AI Co-Reasoning</p>
    </div>

    <div class="login-card">
      <h2 data-t="welcomeBack">Welcome Back</h2>

      <div id="errorMsg" class="error-message"></div>

      <!-- SSO Buttons -->
      <div class="sso-buttons">
        <a href="/api/v1/auth/google" class="btn-sso">
          <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          <span data-t="continueWithGoogle">Continue with Google</span>
        </a>
      </div>

      <div class="divider" data-t="orSignInWithEmail">or sign in with email</div>

      <!-- Email/Password Form -->
      <form id="loginForm">
        <div class="form-group">
          <label data-t="email">Email</label>
          <input type="email" id="loginEmail" class="form-control" placeholder="you@university.edu" required>
        </div>
        <div class="form-group">
          <label data-t="password">Password</label>
          <input type="password" id="loginPassword" class="form-control" data-t-placeholder="enterPassword" placeholder="Enter your password" required>
        </div>

        <button type="submit" id="loginBtn" class="btn btn-primary btn-lg" style="width:100%; justify-content:center; margin-top:8px;" data-t="signIn">Sign In</button>
      </form>
    </div>

    <!-- Quick Test Login -->
    <div class="test-login-section" id="testLoginSection">
      <h3>🧪 Quick Login — Test Users</h3>
      <select class="test-login-select" id="testUserSelect">
        <option value="">Select a test user...</option>
      </select>
      <button type="button" id="testLoginBtn" class="btn btn-primary btn-lg" style="width:100%; justify-content:center;" disabled>Sign In as Test User</button>
    </div>

    <div class="footer-link">
      <span data-t="dontHaveAccount">Don't have an account?</span> <a href="sign-up.html" data-t="signUp">Sign up</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const loginBtn = document.getElementById('loginBtn');

    // --- Load test users ---
    (async function loadTestUsers() {
      try {
        const users = await API.get('/auth/test-users');
        const select = document.getElementById('testUserSelect');
        const btn = document.getElementById('testLoginBtn');
        if (!users || users.length === 0) {
          select.innerHTML = '<option value="">No test users available</option>';
          return;
        }
        // Group by role
        const instructors = users.filter(u => u.role === 'instructor');
        const students = users.filter(u => u.role === 'student');
        let html = '<option value="">Select a test user...</option>';
        if (instructors.length) {
          html += '<optgroup label="Instructors">';
          instructors.forEach(u => { html += `<option value="${u.email}" data-role="${u.role}">${u.name} — ${u.institution || 'N/A'}</option>`; });
          html += '</optgroup>';
        }
        if (students.length) {
          html += '<optgroup label="Students">';
          students.forEach(u => { html += `<option value="${u.email}" data-role="${u.role}">${u.name} — ${u.institution || 'N/A'}</option>`; });
          html += '</optgroup>';
        }
        select.innerHTML = html;
        select.addEventListener('change', () => { btn.disabled = !select.value; });
        btn.addEventListener('click', async () => {
          if (!select.value) return;
          const role = select.selectedOptions[0].dataset.role;
          btn.disabled = true;
          btn.textContent = 'Signing in...';
          errorMsg.style.display = 'none';
          try {
            await API.post('/auth/test-login', { email: select.value });
            window.location.href = role === 'instructor' ? '/challenge-list-instructor.html' : '/challenge-list.html';
          } catch (err) {
            errorMsg.textContent = err.message || 'Test login failed.';
            errorMsg.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Sign In as Test User';
          }
        });
      } catch (err) {
        document.getElementById('testUserSelect').innerHTML = '<option value="">Could not load test users</option>';
      }
    })();

    // --- Email/password login ---
    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      errorMsg.style.display = 'none';

      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) {
        errorMsg.textContent = 'Please enter both email and password.';
        errorMsg.style.display = 'block';
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in...';

      try {
        const data = await API.post('/auth/login', { email, password });
        const role = data.user && data.user.role;
        if (role === 'instructor') {
          window.location.href = '/challenge-list-instructor.html';
        } else {
          window.location.href = '/challenge-list.html';
        }
      } catch (err) {
        errorMsg.textContent = err.message || 'Login failed. Please check your credentials.';
        errorMsg.style.display = 'block';
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
