<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI CoReasoning Lab — Challenge Run</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="assets/logo.png">
  <script src="content-compiled/all.js"></script>
  <script src="content-loader.js"></script>
  <script src="js/tooltips.js"></script>
  <script src="js/api-client.js"></script>
  <style>
    .run-layout { display: grid; grid-template-columns: 1fr 360px; gap: 24px; min-width: 0; }
    .run-layout > div { min-width: 0; overflow: hidden; }
    .problem-panel { background: #f8f9ff; border-radius: var(--radius); padding: 20px; margin-bottom: 16px; border-left: 4px solid var(--primary); }
    .problem-panel h4 { color: var(--primary); font-size: 14px; margin-bottom: 8px; }
    .instructions-bar { background: #e0f2f1; border-radius: var(--radius); padding: 12px 16px; margin-bottom: 16px; font-size: 13px; color: var(--teal); display: flex; align-items: flex-start; gap: 8px; }
    .instructions-bar strong { white-space: nowrap; }
    .substep-label { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-bottom: 12px; }
    .substep-judge { background: #fff3e0; color: var(--warning); }
    .substep-steer { background: #e3f2fd; color: #1565c0; }
    .cycle-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--border); cursor: pointer; }
    .cycle-header h3 { font-size: 16px; }
    .cycle-num { background: var(--primary); color: #fff; width: 28px; height: 28px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
    .submit-area { display: flex; align-items: center; gap: 12px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
    .cycle-indicator { font-size: 13px; color: var(--text-secondary); background: #f5f5f5; padding: 6px 12px; border-radius: var(--radius); }
    .ai-output { background: #fff; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; overflow: hidden; }
    .ai-output-label { font-size: 12px; font-weight: 600; color: var(--primary); margin-bottom: 8px; text-transform: uppercase; }
    #ai-solution-content { max-height: 400px; overflow-y: auto; overflow-x: auto; white-space: pre-wrap; word-break: break-word; font-size: 14px; line-height: 1.6; }
    #ai-solution-content pre, #ai-solution-content code { white-space: pre; overflow-x: auto; }
    .divider-line { border: none; border-top: 1px dashed var(--border); margin: 16px 0; }

    /* Mode banner */
    .mode-banner { padding: 10px 20px; border-radius: var(--radius); font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .mode-banner.practice { background: #e8f5e9; color: #2e7d32; border: 2px solid #a5d6a7; }
    .mode-banner.assessment { background: #fff3e0; color: #ef6c00; border: 2px solid #ffcc80; }

    /* MC checkboxes */
    .mc-option { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; cursor: pointer; transition: all .15s; }
    .mc-option:hover { border-color: var(--primary); background: #f8f9ff; }
    .mc-option.selected { border-color: var(--primary); background: #e8eaf6; }
    .mc-option.disabled { opacity: 0.6; pointer-events: none; }
    .mc-check { width: 18px; height: 18px; border: 2px solid var(--border); border-radius: 3px; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #fff; transition: all .15s; }
    .mc-option.selected .mc-check { border-color: var(--primary); background: var(--primary); }
    .mc-label { font-size: 14px; }

    /* OE sections */
    .section-list { margin-bottom: 12px; }
    .section-item { border: 1.5px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
    .section-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #f5f5f5; }
    .section-header input { border: none; background: transparent; font-weight: 600; font-size: 14px; flex: 1; outline: none; }
    .section-header .remove-btn { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 16px; }
    .section-body textarea { width: 100%; border: none; padding: 10px 12px; font-size: 14px; resize: vertical; min-height: 60px; outline: none; font-family: inherit; }
    .add-section-btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border: 1.5px dashed var(--border); border-radius: var(--radius); background: transparent; font-size: 13px; color: var(--primary); cursor: pointer; width: 100%; justify-content: center; }
    .add-section-btn:hover { border-color: var(--primary); background: #f8f9ff; }

    /* "Solution is complete" button */
    .btn-done-judging { display: flex; align-items: center; gap: 8px; padding: 10px 20px; border: 2px solid var(--success); border-radius: var(--radius); background: #fff; color: var(--success); font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; margin-top: 8px; width: 100%; justify-content: center; }
    .btn-done-judging:hover { background: #e8f5e9; }
    .btn-done-judging.selected { background: var(--success); color: #fff; }

    /* Collapsible feedback */
    .feedback-panel { border-left: 4px solid var(--teal); padding: 0; background: #e0f2f1; border-radius: 0 var(--radius) var(--radius) 0; margin-top: 16px; overflow: hidden; }
    .feedback-toggle { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--teal); }
    .feedback-toggle:hover { background: rgba(0,0,0,.03); }
    .feedback-toggle .arrow { transition: transform .2s; font-size: 12px; }
    .feedback-toggle .arrow.collapsed { transform: rotate(-90deg); }
    .feedback-body { padding: 0 16px 16px; }
    .feedback-body.collapsed { display: none; }
    .feedback-body .criticism { font-size: 14px; margin-bottom: 8px; }
    .feedback-body .better-alt { font-size: 14px; color: var(--teal); font-style: italic; }

    /* Collapsed cycle */
    .cycle-collapsed .cycle-body { display: none; }
    .cycle-collapsed .cycle-header { border-bottom: none; margin-bottom: 0; opacity: 0.7; }
    .cycle-header .collapse-arrow { margin-left: auto; font-size: 12px; transition: transform .2s; }
    .cycle-collapsed .collapse-arrow { transform: rotate(-90deg); }

    /* Code block & comparison table */
    .code-block { background: #263238; color: #eeffff; padding: 16px; border-radius: var(--radius); font-family: 'Consolas', 'Fira Code', monospace; font-size: 13px; line-height: 1.6; overflow-x: auto; margin: 8px 0; white-space: pre; }
    .comparison-table { width: 100%; font-size: 13px; margin: 8px 0; }
    .comparison-table th { background: #f5f5f5; font-size: 12px; }
    .comparison-table td, .comparison-table th { padding: 8px 10px; border: 1px solid var(--border); }

    /* Summary panel */
    .summary-panel { position: sticky; top: 80px; }
    .summary-section { margin-bottom: 12px; }
    .summary-section h5 { font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: var(--text-secondary); margin-bottom: 6px; }
    .summary-raw { font-size: 12px; color: var(--text-secondary); line-height: 1.5; max-height: 100px; overflow-y: auto; padding: 8px; background: #f8f9ff; border-radius: 4px; border-left: 3px solid var(--primary); }
    .summary-solution { font-size: 12px; color: var(--text); line-height: 1.5; max-height: 120px; overflow-y: auto; padding: 8px; background: #f5f5f5; border-radius: 4px; font-family: 'Consolas', monospace; }
    .cycle-log { font-size: 12px; }
    .cycle-log-entry { padding: 6px 0; border-bottom: 1px solid var(--border); }
    .cycle-log-entry:last-child { border-bottom: none; }
    .cycle-log-label { font-weight: 600; color: var(--primary); font-size: 11px; text-transform: uppercase; }

    /* LLM status */
    .llm-status { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #1a237e 0%, #00695c 100%); color: #fff; padding: 12px 28px; border-radius: 30px; font-size: 14px; font-weight: 500; display: none; align-items: center; gap: 10px; box-shadow: 0 4px 20px rgba(0,0,0,.25); z-index: 300; }
    .llm-status.visible { display: inline-flex; }
    .llm-spinner { width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sim-reveal { animation: simFadeIn .5s ease-out; }
    @keyframes simFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* Error toast */
    .error-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #c62828; color: #fff; padding: 12px 28px; border-radius: 30px; font-size: 14px; font-weight: 500; display: none; align-items: center; gap: 10px; box-shadow: 0 4px 20px rgba(0,0,0,.25); z-index: 301; cursor: pointer; }
    .error-toast.visible { display: inline-flex; }

    /* Assessment deferred feedback at completion */
    .deferred-feedback-section { margin-top: 16px; }
    .deferred-feedback-section h4 { font-size: 14px; color: var(--teal); margin-bottom: 8px; }
    .deferred-feedback-item { margin-bottom: 12px; }
    .deferred-feedback-item .dfb-label { font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 4px; }

    /* Instructor preview banner */
    .preview-banner { padding: 12px 20px; border-radius: var(--radius); font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 10px; margin-bottom: 16px; background: #fff3e0; color: #e65100; border: 2px solid #ffcc80; }
    .preview-banner .preview-icon { font-size: 20px; }

    /* Responsive: challenge-run */
    @media (max-width: 768px) {
      .run-layout { grid-template-columns: 1fr !important; }
      .summary-panel { position: static !important; order: -1; }
    }
    @media (max-width: 480px) {
      .mode-banner { padding: 8px 12px; font-size: 13px; }
      .problem-panel { padding: 14px; }
      .code-block { padding: 12px; font-size: 12px; }
      .instructions-bar { font-size: 12px; padding: 8px 12px; }
    }
  </style>
</head>
<body>
  <header class="topnav">
    <a href="index.html" class="logo"><img src="assets/logo.png" alt="Logo"> AI CoReasoning Lab</a>
    <nav>
      <a href="challenge-list.html" class="active" data-t="challenges">Challenges</a>
      <a href="course-catalog.html" data-t="courses">Courses</a>
      <a href="student-analytics.html" data-t="myResults">My Results</a>
    </nav>
    <div class="user-area">
      <select class="lang-select"><option value="en">EN</option><option value="he">HE</option><option value="fr">FR</option><option value="de">DE</option><option value="es">ES</option></select>
      <span style="background:#e8eaf6;color:#1a237e;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px" data-t="student">Student</span>
      <span id="userName">&mdash;</span>
      <a href="profile.html" aria-label="User profile"><div class="avatar" id="userAvatar">?</div></a>
      <a href="#" class="btn-logout" onclick="API.auth.logout().then(()=>window.location.href='/login.html').catch(()=>window.location.href='/login.html');return false;" style="margin-left:8px;background:var(--primary);border:none;border-radius:var(--radius);padding:5px 14px;font-size:12px;color:#fff;cursor:pointer;text-decoration:none;font-weight:600;">Logout</a>
    </div>
  </header>

  <main class="page">
    <div id="scenario-content" aria-live="polite">
      <div class="card" style="text-align:center;padding:40px">
        <div class="llm-spinner" style="width:32px;height:32px;border-width:3px;margin:0 auto 16px;border-color:rgba(26,35,126,.2);border-top-color:var(--primary)"></div>
        <p class="text-muted" data-t="loading">Loading...</p>
      </div>
    </div>
  </main>

  <!-- LLM Status -->
  <div class="llm-status" id="llm-status" aria-live="polite">
    <div class="llm-spinner"></div>
    <span id="llm-status-text" data-t="generating">Generating...</span>
  </div>

  <!-- Error Toast -->
  <div class="error-toast" id="error-toast" role="alert" onclick="this.classList.remove('visible')">
    <span id="error-toast-text" data-t="error">Error</span>
  </div>

  <script>
'use strict';

// ================================================================
// INSTRUCTOR PREVIEW DETECTION
// ================================================================
const _urlParams = new URLSearchParams(window.location.search);
const isInstructorPreview = _urlParams.get('preview') === 'instructor';

// Swap nav links and role badge for instructor preview
if (isInstructorPreview) {
  document.addEventListener('DOMContentLoaded', function() {
    const nav = document.querySelector('header.topnav nav');
    if (nav) {
      nav.innerHTML =
        '<a href="challenge-list-instructor.html" class="active" data-t="challenges">Challenges</a>' +
        '<a href="course-catalog-instructor.html" data-t="courses">Courses</a>' +
        '<a href="instructor-analytics.html" data-t="analytics">Analytics</a>';
    }
    // Swap role badge from Student to Instructor
    const roleBadge = document.querySelector('header.topnav .user-area [data-t="student"]');
    if (roleBadge) {
      roleBadge.setAttribute('data-t', 'instructor');
      roleBadge.textContent = 'Instructor';
      roleBadge.style.background = '#e0f2f1';
      roleBadge.style.color = '#00695c';
    }
  });
}

// ================================================================
// AUTH CHECK
// ================================================================
let currentUser = null;
(async function authCheck() {
  try {
    const me = await API.auth.me();
    currentUser = me.user || me;
    if (currentUser.name) document.getElementById('userName').textContent = currentUser.name;
    if (currentUser.name) {
      const parts = currentUser.name.split(' ');
      document.getElementById('userAvatar').textContent =
        parts.map(p => p[0]).join('').toUpperCase().slice(0, 2);
    }
  } catch (e) {
    window.location.href = '/login.html';
    return;
  }
  init();
})();

// ================================================================
// STATE
// ================================================================
let runState = {
  runId: null,
  challengeId: null,
  rawProblem: '',
  aiSolution: '',
  framingOptions: null,
  judgingOptions: null,
  steeringOptions: null,
  responseType: 'mc',     // 'mc' or 'open-ended' (phase1)
  phase2ResponseType: 'mc', // 'mc' or 'open-ended' (phase2)
  challengeType: 'practice',
  maxCycles: 5,
  currentCycle: 0,
  phase: 'start',         // start | framing | judging | steering | complete
  challengeTitle: '',
  challengeCourse: '',
  challengeSubject: '',
  // Collected feedback for assessment deferred display
  collectedFeedback: { framing: null, cycles: [] },
};

// ================================================================
// HELPERS
// ================================================================
function el(id) { return document.getElementById(id); }

const challengeListUrl = isInstructorPreview ? 'challenge-list-instructor.html' : 'challenge-list.html';

function previewBannerHtml() {
  if (!isInstructorPreview) return '';
  return '<div class="preview-banner"><span class="preview-icon">&#128065;</span> <span data-t="instructorPreview">' + (t('instructorPreview') || 'Instructor Preview') + '</span> &mdash; <span data-t="previewNotRecorded">' + (t('previewNotRecorded') || 'This run will not be recorded') + '</span></div>';
}

function reveal(id) {
  const e = el(id);
  if (e) {
    e.style.display = '';
    e.classList.add('sim-reveal');
    e.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function hide(id) {
  const e = el(id);
  if (e) e.style.display = 'none';
}

function showLLM(text) {
  el('llm-status-text').textContent = text;
  el('llm-status').classList.add('visible');
}

function hideLLM() {
  el('llm-status').classList.remove('visible');
}

function showError(msg) {
  el('error-toast-text').textContent = msg;
  el('error-toast').classList.add('visible');
  setTimeout(() => el('error-toast').classList.remove('visible'), 6000);
}

function escHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function formatSolution(text) {
  if (!text) return '';
  // If it looks like it contains HTML, return as-is
  if (/<[a-z][\s\S]*>/i.test(text)) return text;
  // Otherwise wrap in a code block or paragraphs
  if (text.includes('\n')) {
    return '<div class="code-block">' + escHtml(text) + '</div>';
  }
  return '<p>' + escHtml(text) + '</p>';
}

function formatFeedback(fb) {
  if (!fb) return '';
  if (typeof fb === 'string') return '<p>' + escHtml(fb) + '</p>';
  if (fb.message) return '<p>' + escHtml(fb.message) + '</p>';
  if (fb.html) return fb.html;
  return '<p>' + escHtml(JSON.stringify(fb)) + '</p>';
}

function setStepper(phase, state) {
  const s = el('stepper-p' + phase);
  if (s) s.className = 'step-item ' + state;
  if (state === 'done') {
    const n = el('stepper-p' + phase + '-num');
    if (n) n.innerHTML = '&#10003;';
  }
}

function toggleMC(opt) {
  if (opt.classList.contains('disabled')) return;
  opt.classList.toggle('selected');
  // Deselect "done" if selecting an issue
  const container = opt.closest('.cycle-body') || opt.closest('.card');
  if (container) {
    const d = container.querySelector('.btn-done-judging.selected');
    if (d && opt.classList.contains('selected')) d.classList.remove('selected');
  }
}

function toggleDoneBtn(btn) {
  btn.classList.toggle('selected');
  if (btn.classList.contains('selected')) {
    const container = btn.closest('.cycle-body') || btn.closest('.card');
    if (container) container.querySelectorAll('.mc-option.selected').forEach(o => o.classList.remove('selected'));
  }
}

function toggleFeedback(toggle) {
  const body = toggle.nextElementSibling;
  const arrow = toggle.querySelector('.arrow');
  if (body) body.classList.toggle('collapsed');
  if (arrow) arrow.classList.toggle('collapsed');
}

function toggleCycle(id) {
  const elem = el(id);
  if (elem) elem.classList.toggle('cycle-collapsed');
}

function getSelectedLetters(containerId) {
  const container = el(containerId);
  if (!container) return [];
  return Array.from(container.querySelectorAll('.mc-option.selected')).map(o => {
    const strong = o.querySelector('strong');
    if (strong) return strong.textContent.replace(/[()]/g, '').trim();
    return o.dataset.letter || '';
  }).filter(Boolean);
}

function getOESections(containerId) {
  const container = el(containerId);
  if (!container) return [];
  const sections = [];
  container.querySelectorAll('.section-item').forEach(item => {
    const nameInput = item.querySelector('.section-header input');
    const textarea = item.querySelector('.section-body textarea');
    if (nameInput && textarea) {
      sections.push({ name: nameInput.value, text: textarea.value });
    }
  });
  return sections;
}

function addSection(listId) {
  const list = el(listId);
  if (!list) return;
  const item = document.createElement('div');
  item.className = 'section-item';
  item.innerHTML = '<div class="section-header"><input type="text" placeholder="Section title"><button class="remove-btn" onclick="this.closest(\'.section-item\').remove()">&times;</button></div><div class="section-body"><textarea placeholder="Describe your refinement..."></textarea></div>';
  list.appendChild(item);
}

function updateSummary(opts) {
  if (opts.rawProblem) {
    const sec = el('summary-raw');
    if (sec) sec.textContent = opts.rawProblem;
  }
  if (opts.solution) {
    const sec = el('summary-sol-section');
    if (sec) sec.style.display = '';
    const sol = el('summary-solution');
    if (sol) sol.textContent = typeof opts.solution === 'string' ? opts.solution.slice(0, 300) : '';
  }
  if (opts.entry) {
    const logSec = el('summary-log-section');
    if (logSec) logSec.style.display = '';
    const log = el('summary-log');
    if (log) {
      const d = document.createElement('div');
      d.className = 'cycle-log-entry sim-reveal';
      d.innerHTML = '<div class="cycle-log-label">' + escHtml(opts.entry.label) + '</div><div>' + escHtml(opts.entry.text) + '</div>';
      log.appendChild(d);
    }
  }
}

function renderFeedbackPanel(title, grade, bodyHtml, startCollapsed) {
  const cls = startCollapsed ? ' collapsed' : '';
  const gradeHtml = grade ? ' <span class="grade grade-' + grade + '" style="width:22px;height:22px;font-size:11px;margin-left:8px">' + escHtml(grade) + '</span>' : '';
  return '<div class="feedback-panel" style="margin-bottom:8px">' +
    '<div class="feedback-toggle" onclick="toggleFeedback(this)">' +
    '<span>' + escHtml(title) + gradeHtml + '</span>' +
    '<span class="arrow' + cls + '">&#9660;</span>' +
    '</div>' +
    '<div class="feedback-body' + cls + '">' + bodyHtml + '</div>' +
    '</div>';
}

function disableInputsIn(containerId) {
  const container = el(containerId);
  if (!container) return;
  container.querySelectorAll('.mc-option').forEach(o => o.classList.add('disabled'));
  container.querySelectorAll('textarea, input').forEach(o => o.setAttribute('readonly', 'readonly'));
  container.querySelectorAll('button:not(.feedback-toggle)').forEach(o => { o.disabled = true; o.style.opacity = '0.5'; });
}

// ================================================================
// INITIALIZATION
// ================================================================
async function init() {
  const params = new URLSearchParams(window.location.search);
  const challengeId = params.get('challengeId');
  const resumeRunId = params.get('runId');

  if (resumeRunId) {
    await resumeRun(resumeRunId);
  } else if (challengeId) {
    renderStartScreen(challengeId);
  } else {
    el('scenario-content').innerHTML =
      '<div class="card" style="text-align:center;padding:40px"><h3>No challenge specified</h3><p class="text-muted">Please select a challenge from the <a href="' + challengeListUrl + '">challenge list</a>.</p></div>';
  }
}

// ================================================================
// RESUME AN EXISTING RUN
// ================================================================
async function resumeRun(runId) {
  showLLM(t('loading') || 'Loading run...');
  try {
    const state = await API.runs.get(runId);
    hideLLM();

    if (!state || !state.challenge || !state.run) {
      showError(t('errorLoadingRun') || 'Failed to load run data. Please try again.');
      return;
    }

    runState.runId = runId;
    runState.challengeId = state.challenge.id;
    runState.challengeTitle = state.challenge.title || '';
    runState.challengeType = state.challenge.challengeType || 'practice';
    runState.maxCycles = state.challenge.maxCycles || 5;
    runState.rawProblem = state.rawProblem || '';
    runState.aiSolution = state.run.ai_solution || '';
    runState.currentCycle = state.run.current_cycle || 0;

    const rc = state.challenge.responseConfig || {};
    const _rtVal = rc.phase1 || 'mc';
    runState.responseType = (_rtVal === 'open-ended' || _rtVal === 'oe') ? 'open-ended' : 'mc';
    runState.phase2ResponseType = (rc.phase2 === 'open-ended' || rc.phase2 === 'oe') ? 'open-ended' : 'mc';

    if (state.run.status === 'completed') {
      // Show completed state
      const grades = state.run.grades || {};
      renderCompletedScreen(grades, state);
    } else {
      // For simplicity, show where the user left off
      // If framing not submitted, restart framing
      if (!state.run.framing_response) {
        renderStartScreen(runState.challengeId);
      } else {
        // Resume at current cycle
        renderPhase2(state);
      }
    }
  } catch (err) {
    hideLLM();
    showError(err.message || 'Failed to load run');
    el('scenario-content').innerHTML =
      '<div class="card" style="text-align:center;padding:40px"><h3>Failed to load run</h3><p class="text-muted">' + escHtml(err.message) + '</p><a href="' + challengeListUrl + '" class="btn btn-outline">' + t('backToChallenges') + '</a></div>';

}

// ================================================================

// ================================================================
async function startRun() {
  const challengeId = runState.challengeId;
  if (!challengeId) { showError('No challenge ID'); return; }

  showLLM(t('generatingProblem') || 'Generating raw problem from subject tree...');
  const startBtn = document.querySelector('#start-card .btn');
  if (startBtn) { startBtn.disabled = true; startBtn.textContent = t('loading') || 'Loading...'; }

  try {
    const data = await API.runs.start(challengeId);
    hideLLM();

    runState.runId = data.runId;
    runState.rawProblem = data.rawProblem;
    runState.framingOptions = data.framingOptions;
    const _rtVal2 = data.responseType || 'mc';
    runState.responseType = (_rtVal2 === 'open-ended' || _rtVal2 === 'oe') ? 'open-ended' : 'mc';
    runState.maxCycles = data.maxCycles || 5;
    runState.challengeType = data.challengeType || 'practice';

    renderFramingPhase();
  } catch (err) {
    hideLLM();
    showError(err.message || 'Failed to start challenge run');
    if (startBtn) { startBtn.disabled = false; startBtn.textContent = '▶ ' + (t('startChallenge') || 'Start'); }
  }
}

// ================================================================
// SUBMIT FRAMING
// ================================================================
async function submitFraming() {
  const isOE = runState.responseType === 'open-ended';
  let response;

  if (isOE) {
    const sections = getOESections('framing-sections');
    if (sections.length === 0 || sections.every(s => !s.text.trim())) {
      showError(t('pleaseProvideResponse') || 'Please provide at least one section with content.');
      return;
    }
    response = { type: 'open-ended', sections: sections };
  } else {
    const selected = getSelectedLetters('framing-input');
    if (selected.length === 0) {
      showError(t('pleaseSelectOption') || 'Please select at least one option.');
      return;
    }
    response = { type: 'mc', selectedLetters: selected };
  }

  const btn = el('submit-framing-btn');
  if (btn) { btn.disabled = true; btn.textContent = t('loading') || 'Submitting...'; }
  disableInputsIn('framing-input');

  showLLM(t('evaluatingFraming') || 'Evaluating framing & generating AI solution...');

  try {
    const data = await API.runs.submitFraming(runState.runId, response);
    hideLLM();

    runState.aiSolution = data.aiSolution;
    runState.currentCycle = data.currentCycle || 1;
    runState.judgingOptions = data.judgingOptions;

    // Store feedback for potential deferred display
    runState.collectedFeedback.framing = {
      feedback: data.framingFeedback,
      grade: data.framingGrade,
    };

    // Show framing feedback (practice mode only -- server returns null for assessment)
    if (data.framingFeedback) {
      const fbHtml = renderFeedbackPanel(
        t('framingFeedback'),
        data.framingGrade,
        formatFeedback(data.framingFeedback)
      );
      el('framing-feedback').innerHTML = fbHtml;
      reveal('framing-feedback');
    }

    setStepper(1, 'done');

    // Transition to Phase 2 after a short delay
    setTimeout(function() { renderPhase2Initial(); }, 800);

  } catch (err) {
    hideLLM();
    showError(err.message || 'Failed to submit framing');
    if (btn) { btn.disabled = false; btn.textContent = t('submitFraming'); }
  }
}

// ================================================================
// SUBMIT JUDGING
// ================================================================
async function submitJudging(cycleNum) {
  const isOE = runState.responseType === 'open-ended';
  const doneBtn = el('done-btn-' + cycleNum);
  const isDone = doneBtn && doneBtn.classList.contains('selected');

  let response;
  if (isDone) {
    response = { type: 'complete', markedComplete: true };
  } else if (isOE) {
    const sections = getOESections('judging-sections-' + cycleNum);
    if (sections.length === 0 || sections.every(s => !s.text.trim())) {
      showError(t('pleaseProvideResponse') || 'Please describe at least one issue, or mark the solution as complete.');
      return;
    }
    response = { type: 'open-ended', sections: sections };
  } else {
    const selected = getSelectedLetters('judging-area-' + cycleNum);
    if (selected.length === 0) {
      showError(t('pleaseSelectOption') || 'Please select at least one issue, or mark the solution as complete.');
      return;
    }
    response = { type: 'mc', selectedLetters: selected };
  }

  const btn = el('submit-judging-btn-' + cycleNum);
  if (btn) { btn.disabled = true; btn.textContent = t('loading') || 'Submitting...'; }
  disableInputsIn('judging-area-' + cycleNum);

  showLLM(isDone ? (t('finalizing') || 'Finalizing -- computing final grades...') : (t('recordingJudgement') || 'Recording judgement...'));

  try {
    const data = await API.runs.submitJudging(runState.runId, cycleNum, response);
    hideLLM();

    updateSummary({
      entry: {
        label: t('cycle') + ' ' + cycleNum + ' -- ' + (isDone ? t('completed') || 'Completed' : t('issuesFound') || 'Issues Found'),
        text: isDone ? (t('markedComplete') || 'Student marked solution as complete') : (t('issuesSubmitted') || 'Issues submitted for steering'),
      }
    });

    if (isDone) {
      // User marked solution as complete — still allow optional steering before finalizing
      runState.steeringOptions = data.steeringOptions;
      runState.markedComplete = true;
      renderSteeringStep(cycleNum, true);
    } else {
      // Show steering
      runState.steeringOptions = data.steeringOptions;
      runState.markedComplete = false;
      renderSteeringStep(cycleNum);
    }
  } catch (err) {
    hideLLM();
    showError(err.message || 'Failed to submit judging');
    if (btn) { btn.disabled = false; btn.textContent = t('submit'); }
  }
}

// ================================================================
// SUBMIT STEERING
// ================================================================
async function submitSteering(cycleNum) {
  const isOE = runState.responseType === 'open-ended';
  let response;

  if (isOE) {
    const sections = getOESections('steering-sections-' + cycleNum);
    if (sections.length === 0 || sections.every(s => !s.text.trim())) {
      showError(t('pleaseProvideResponse') || 'Please provide at least one correction.');
      return;
    }
    response = { type: 'open-ended', sections: sections };
  } else {
    const selected = getSelectedLetters('steering-input-' + cycleNum);
    if (selected.length === 0) {
      showError(t('pleaseSelectOption') || 'Please select at least one correction.');
      return;
    }
    response = { type: 'mc', selectedLetters: selected };
  }

  const btn = el('submit-steering-btn-' + cycleNum);
  if (btn) { btn.disabled = true; btn.textContent = t('loading') || 'Submitting...'; }
  disableInputsIn('steering-input-' + cycleNum);

  showLLM(t('processSteering') || 'Processing steering & evaluating cycle...');

  try {
    const data = await API.runs.submitSteering(runState.runId, cycleNum, response);
    hideLLM();

    // Update AI solution
    if (data.updatedSolution) {
      runState.aiSolution = data.updatedSolution;
      const solEl = el('ai-solution-content');
      if (solEl) solEl.innerHTML = formatSolution(data.updatedSolution);
      updateSummary({ solution: data.updatedSolution });
    }

    runState.currentCycle = data.currentCycle;
    runState.maxCycles = data.maxCycles;

    // Store cycle feedback
    const cycleFb = {
      judgingFeedback: data.judgingFeedback,
      judgingGrade: data.judgingGrade,
      steeringFeedback: data.steeringFeedback,
      steeringGrade: data.steeringGrade,
    };
    runState.collectedFeedback.cycles.push(cycleFb);

    // Show feedback (practice mode: server sends it; assessment: null)
    if (data.judgingFeedback || data.steeringFeedback) {
      let fbHtml = '';
      if (data.judgingFeedback) {
        fbHtml += renderFeedbackPanel(
          t('judgingFeedback') + ' (' + t('cycle') + ' ' + cycleNum + ')',
          data.judgingGrade,
          formatFeedback(data.judgingFeedback),
          false
        );
      }
      if (data.steeringFeedback) {
        fbHtml += renderFeedbackPanel(
          t('steeringFeedback') + ' (' + t('cycle') + ' ' + cycleNum + ')',
          data.steeringGrade,
          formatFeedback(data.steeringFeedback),
          true
        );
      }
      const fbEl = el('cycle-feedback-' + cycleNum);
      if (fbEl) {
        fbEl.innerHTML = fbHtml;
        reveal('cycle-feedback-' + cycleNum);
      }
    }

    updateSummary({
      entry: {
        label: t('cycle') + ' ' + cycleNum + ' -- ' + (t('correctionsSent') || 'Corrections Sent'),
        text: (t('steeringSubmitted') || 'Steering corrections submitted'),
      }
    });

    // Check if max cycles reached
    if (data.currentCycle > data.maxCycles) {
      await completeRun();
    } else {
      // Get next judging options from the steering response
      runState.judgingOptions = data.nextJudgingOptions;

      // Collapse current cycle and start next
      const currentCycleEl = el('cycle-' + cycleNum);
      if (currentCycleEl) currentCycleEl.classList.add('cycle-collapsed');

      renderJudgingCycle(data.currentCycle);
    }
  } catch (err) {
    hideLLM();
    showError(err.message || 'Failed to submit steering');
    if (btn) { btn.disabled = false; btn.textContent = t('submit'); }
  }
}

// ================================================================
// COMPLETE RUN
// ================================================================
async function completeRun() {
  showLLM(t('computingGrades') || 'Computing final grades...');

  try {
    const data = await API.runs.complete(runState.runId);
    hideLLM();

    setStepper(2, 'done');
    renderCompletion(data.grades);
  } catch (err) {
    hideLLM();
    showError(err.message || 'Failed to complete run');
  }
}

// ================================================================
// RENDER COMPLETION
// ================================================================
function renderCompletion(grades) {
  runState.phase = 'complete';
  const isPractice = runState.challengeType === 'practice';
  const g = grades || { framing: 'C', judging: 'C', steering: 'C' };

  let h = '';
  h += '<div class="card" style="border-left:4px solid var(--success);margin-top:24px">';
  h += '<h3 style="color:var(--success);margin-bottom:16px">&#10003; ' + t('challengeComplete') + '</h3>';
  h += '<table style="font-size:14px;margin-bottom:16px"><thead><tr><th>' + t('skill') + '</th><th>' + t('grade') + '</th></tr></thead><tbody>';
  h += '<tr><td>' + t('framing') + '</td><td><span class="grade grade-' + g.framing + '">' + escHtml(g.framing) + '</span></td></tr>';
  h += '<tr><td>' + t('judging') + '</td><td><span class="grade grade-' + g.judging + '">' + escHtml(g.judging) + '</span></td></tr>';
  h += '<tr><td>' + t('steering') + '</td><td><span class="grade grade-' + g.steering + '">' + escHtml(g.steering) + '</span></td></tr>';
  h += '</tbody></table>';

  // Assessment mode: show deferred feedback from all phases
  if (!isPractice) {
    h += '<div class="deferred-feedback-section"><h4>' + t('detailedFeedback') + '</h4>';

    // Framing feedback
    if (runState.collectedFeedback.framing && runState.collectedFeedback.framing.feedback) {
      h += '<div class="deferred-feedback-item"><div class="dfb-label">' + t('framing') + '</div>';
      h += renderFeedbackPanel(
        t('framing'),
        runState.collectedFeedback.framing.grade,
        formatFeedback(runState.collectedFeedback.framing.feedback)
      );
      h += '</div>';
    }

    // Cycle feedback - for assessment these were null during the run,
    // so we fetch the full report to get deferred feedback
    h += '<div id="deferred-cycle-feedback"></div>';
    h += '</div>';

    // Load deferred feedback from report endpoint
    loadDeferredFeedback();
  }

  // Action buttons
  h += '<div style="margin-top:16px;text-align:center">';
  h += '<a href="challenge-report.html?runId=' + runState.runId + '" class="btn btn-primary">' + (t('viewReport') || 'View Report') + '</a>';
  h += '<a href="' + (isInstructorPreview ? 'instructor-analytics.html' : 'student-analytics.html') + '" class="btn btn-outline" style="margin-left:8px">' + (isInstructorPreview ? t('analytics') : t('viewMyResults')) + '</a>';
  h += '<a href="' + challengeListUrl + '" class="btn btn-outline" style="margin-left:8px">' + t('backToChallenges') + '</a>';
  h += '</div>';

  h += '</div>'; // end card

  const completionEl = el('completion');
  if (completionEl) {
    completionEl.innerHTML = h;
    reveal('completion');
  } else {
    // If we completed from framing start card (edge case)
    el('scenario-content').innerHTML += '<div id="completion">' + h + '</div>';
  }
}

function renderCompletedScreen(grades, state) {
  // Render a minimal completed view for resumed completed runs
  let h = '';
  h += '<div class="page-header flex-between">';
  h += '<div><h1>' + escHtml(state.challenge.title || t('challengeRun')) + '</h1></div>';
  h += '<a href="' + challengeListUrl + '" class="btn btn-outline">&#10005; ' + t('exit') + '</a>';
  h += '</div>';

  h += previewBannerHtml();

  h += '<div class="stepper">';
  h += '<div class="step-item done" id="stepper-p1"><div class="step-num" id="stepper-p1-num">&#10003;</div><div>' + t('phase1') + '</div></div>';
  h += '<div class="step-item done" id="stepper-p2"><div class="step-num" id="stepper-p2-num">&#10003;</div><div>' + t('phase2') + '</div></div>';
  h += '</div>';

  h += '<div id="completion"></div>';

  el('scenario-content').innerHTML = h;
  renderCompletion(grades);
}

async function loadDeferredFeedback() {
  try {
    const report = await API.runs.report(runState.runId);
    const container = el('deferred-cycle-feedback');
    if (!container) return;

    let h = '';
    if (report.cycles && report.cycles.length > 0) {
      report.cycles.forEach(function(cycle, i) {
        if (cycle.judging_feedback) {
          h += '<div class="deferred-feedback-item"><div class="dfb-label">' + t('cycle') + ' ' + cycle.cycle_num + ' -- ' + t('judging') + '</div>';
          h += renderFeedbackPanel(t('judging'), cycle.judging_grade, formatFeedback(cycle.judging_feedback));
          h += '</div>';
        }
        if (cycle.steering_feedback) {
          h += '<div class="deferred-feedback-item"><div class="dfb-label">' + t('cycle') + ' ' + cycle.cycle_num + ' -- ' + t('steering') + '</div>';
          h += renderFeedbackPanel(t('steering'), cycle.steering_grade, formatFeedback(cycle.steering_feedback));
          h += '</div>';
        }
      });
    }
    container.innerHTML = h;
  } catch (err) {
    console.error('Failed to load deferred feedback:', err);
  }
}

// ================================================================
// LANGUAGE SWITCHING
// ================================================================
document.addEventListener('langchange', function() {
  // On language change, if we're at the start screen, re-render
  // If mid-run, we just rely on data-t auto-translation
  if (runState.phase === 'start') {
    renderStartScreen(runState.challengeId);
  }
});
  </script>
