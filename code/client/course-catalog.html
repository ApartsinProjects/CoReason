<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI CoReasoning Lab — Course Catalog</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="assets/logo.png">
  <style>
    .course-card { position: relative; transition: box-shadow .15s; }
    .course-card:hover { box-shadow: var(--shadow-lg); }
    .course-card .course-dept { font-size: 12px; color: var(--teal); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: calc(100% - 100px); }
    .course-card h3 { font-size: 16px; margin-bottom: 8px; }
    .course-card .course-meta { font-size: 13px; color: var(--text-secondary); }
    .course-card .course-meta span { display: inline-flex; align-items: center; gap: 4px; margin-inline-end: 12px; }
    .course-card .course-actions { margin-top: 12px; display: flex; gap: 8px; }
    .subscribed-badge { position: absolute; top: 12px; inset-inline-end: 12px; background: var(--success); color: #fff; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 4px; }
    .subject-tree-preview { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
    .subject-tree-preview .tag { display: inline-block; background: #e8eaf6; color: var(--primary); font-size: 12px; padding: 2px 8px; border-radius: 4px; margin: 2px 4px 2px 0; }
    .empty-state { text-align: center; padding: 48px; color: var(--text-secondary); }
  </style>
  <script src="content-compiled/all.js"></script>
  <script src="content-loader.js"></script>
  <script src="js/tooltips.js"></script>
  <script src="js/api-client.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/user-header.js"></script>
</head>
<body>
  <a href="#main-content" class="skip-to-content">Skip to content</a>
  <header class="topnav">
    <a href="index.html" class="logo"><img src="assets/logo.png" alt="Logo"> AI CoReasoning Lab</a>
    <nav>
      <a href="challenge-list.html" data-t="challenges">Challenges</a>
      <a href="course-catalog.html" class="active" data-t="courses">Courses</a>
      <a href="student-analytics.html" data-t="myResults">My Results</a>
    </nav>
    <div class="user-area">
      <a href="interactive-guide.html" class="guide-link" title="Interactive Guide" data-t="guide">Guide</a>
      <select class="lang-select" aria-label="Select language"><option value="en">EN</option><option value="he">HE</option><option value="fr">FR</option><option value="de">DE</option><option value="es">ES</option></select>
      <span style="background:#e8eaf6;color:#1a237e;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px" data-t="student">Student</span>
      <span id="userInstitution" style="font-size:12px;color:#1a237e;background:#e8eaf6;padding:2px 10px;border-radius:12px;font-weight:600;"></span>
      <span id="userName">—</span>
      <a href="profile.html" aria-label="User profile"><div class="avatar" id="userAvatar">?</div></a>
      <a href="#" class="btn-logout" onclick="API.auth.logout().then(()=>window.location.href='/login.html').catch(()=>window.location.href='/login.html');return false;" style="margin-left:8px;background:var(--primary);border:none;border-radius:var(--radius);padding:5px 14px;font-size:12px;color:#fff;cursor:pointer;text-decoration:none;font-weight:600;" data-t="logout">Logout</a>
    </div>
  </header>

  <main class="page" id="main-content">
    <div class="page-header">
      <h1 data-t="courseCatalog" data-tooltip="courseSubscription">Course Catalog</h1>
      <p data-t="courseCatalogDesc">Browse and subscribe to courses</p>
    </div>

    <!-- Institution context -->
    <div class="alert alert-info" style="display:flex; align-items:center; gap:8px; margin-bottom:16px;">
      <span>&#8505;&#65039;</span>
      <span data-t="showingCoursesFrom">Showing courses from your institution:</span> <strong id="institutionLabel"></strong>
    </div>

    <!-- Filter -->
    <div class="filter-bar">
      <input type="search" id="filterSearch" class="form-control" data-t-placeholder="searchCourses" placeholder="Search courses...">
      <select id="filterDept" class="form-control">
        <option value="" data-t="allDepartments">All Departments</option>
      </select>
      <select id="filterSubscription" class="form-control">
        <option value="" data-t="allSubscription">All</option>
        <option value="yes" data-t="subscribed">Subscribed</option>
        <option value="no" data-t="notSubscribed">Not Subscribed</option>
      </select>
      <span id="course-count" style="font-size:13px;color:var(--text-secondary);white-space:nowrap;align-self:center;"></span>
    </div>

    <div class="grid grid-3" id="courseGrid">
      <div class="empty-state">Loading courses...</div>
    </div>
  </main>

  <script>
  (function() {
    'use strict';

    var allCourses = [];
    var grid = document.getElementById('courseGrid');
    var currentUser = null;

    // ── Wait for user-header.js to populate _currentUser ──
    (function waitForUser() {
      var check = setInterval(function() {
        if (window._currentUser) {
          clearInterval(check);
          currentUser = window._currentUser;
          var instName = currentUser.institution_name || currentUser.institutionName || '';
          document.getElementById('institutionLabel').textContent = instName;
          loadCourses();
        }
      }, 100);
      // Fallback timeout
      setTimeout(function() { clearInterval(check); if (!currentUser) { loadCourses(); } }, 2000);
    })();

    // ── Load courses from API ──
    function loadCourses() {
      API.courses.list().then(function(data) {
        allCourses = data.courses || data || [];

        // Populate department filter
        var depts = new Set();
        allCourses.forEach(function(c) { if (c.department) depts.add(c.department); });
        var deptSel = document.getElementById('filterDept');
        depts.forEach(function(d) {
          var opt = document.createElement('option');
          opt.value = d;
          opt.textContent = d;
          deptSel.appendChild(opt);
        });

        renderCourses(allCourses);
      }).catch(function(err) {
        grid.innerHTML = '<div class="empty-state" style="color:var(--danger);">Failed to load courses: ' + escHtml(err.message) + '</div>';
      });
    }

    // ── Render course cards ──
    function renderCourses(list) {
      if (list.length === 0) {
        grid.innerHTML = '<div class="empty-state"><p data-t="noCoursesFound">' + (t('noCoursesFound') || 'No courses found.') + '</p></div>';
        updateCount(0);
        return;
      }

      grid.innerHTML = '';
      list.forEach(function(c) {
        var id = c._id || c.id;
        var isSub = c.is_subscribed || c.isSubscribed || false;
        var card = document.createElement('div');
        card.className = 'card course-card';
        card.setAttribute('data-course-id', id);
        card.setAttribute('data-subscribed', isSub ? 'yes' : 'no');

        var html = '';
        if (isSub) {
          html += '<span class="subscribed-badge" data-t="subscribed">&#10003; Subscribed</span>';
        }
        html += '<div class="course-dept" dir="auto">' + escHtml(c.department || '') + '</div>';
        html += '<h3 dir="auto">' + escHtml(c.name || 'Untitled') + '</h3>';
        html += '<div class="course-meta">';
        html += '<span>&#128100; ' + (c.instructor_count || c.instructorCount || 0) + ' <span data-t="instructors">instructors</span></span>';
        html += '<span>&#128203; ' + (c.challenge_count || c.challengeCount || 0) + ' <span data-t="challenges">challenges</span></span>';
        html += '<span>&#127979; ' + (c.student_count || c.studentCount || 0) + ' <span data-t="students">students</span></span>';
        html += '</div>';

        // Subject tags
        var subjects = c.subjects || c.subject_tags || [];
        if (subjects.length > 0) {
          html += '<div class="subject-tree-preview">';
          subjects.forEach(function(s) {
            var name = typeof s === 'string' ? s : (s.name || s.label || '');
            if (name) html += '<span class="tag">' + escHtml(name) + '</span>';
          });
          html += '</div>';
        }

        // Actions
        html += '<div class="course-actions">';
        if (isSub) {
          html += '<button class="btn btn-outline btn-sm" style="color:var(--danger);" onclick="toggleSubscribe(\'' + id + '\', false)" data-t="unsubscribe">Unsubscribe</button>';
          html += ' <a href="challenge-list.html?courseId=' + id + '" class="btn btn-outline btn-sm" data-t="viewChallenges">View Challenges</a>';
        } else {
          html += '<button class="btn btn-teal btn-sm" onclick="toggleSubscribe(\'' + id + '\', true)" data-t="subscribe">Subscribe</button>';
        }
        html += '</div>';

        card.innerHTML = html;
        grid.appendChild(card);
      });

      updateCount(list.length);
      if (window.translatePage) translatePage();
    }

    // ── Subscribe / Unsubscribe ──
    window.toggleSubscribe = function(courseId, subscribe) {
      var promise = subscribe ? API.courses.subscribe(courseId) : API.courses.unsubscribe(courseId);
      promise.then(function() {
        // Update local data
        allCourses.forEach(function(c) {
          if ((c._id || c.id) === courseId) {
            c.is_subscribed = subscribe;
            c.isSubscribed = subscribe;
          }
        });
        applyFilters();
      }).catch(function(err) {
        showToast((subscribe ? (t('subscribeFailed') || 'Subscribe failed') : (t('unsubscribeFailed') || 'Unsubscribe failed')) + ': ' + err.message, 'error');
      });
    };

    // ── Filtering ──
    var filterSearch = document.getElementById('filterSearch');
    var filterDept = document.getElementById('filterDept');
    var filterSub = document.getElementById('filterSubscription');

    function applyFilters() {
      var query = filterSearch.value.toLowerCase().trim();
      var dept = filterDept.value;
      var sub = filterSub.value;

      var filtered = allCourses.filter(function(c) {
        if (query && (c.name || '').toLowerCase().indexOf(query) === -1 &&
            (c.department || '').toLowerCase().indexOf(query) === -1) return false;
        if (dept && c.department !== dept) return false;
        if (sub === 'yes' && !(c.is_subscribed || c.isSubscribed)) return false;
        if (sub === 'no' && (c.is_subscribed || c.isSubscribed)) return false;
        return true;
      });
      renderCourses(filtered);
    }

    filterSearch.addEventListener('input', applyFilters);
    filterDept.addEventListener('change', applyFilters);
    filterSub.addEventListener('change', applyFilters);

    function updateCount(visible) {
      document.getElementById('course-count').textContent = visible + ' / ' + allCourses.length;
    }

    function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  })();
  </script>
</body>
</html>
