<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI CoReasoning Lab — Sign Up</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="assets/logo.png">
  <script src="content-compiled/all.js"></script>
  <script src="content-loader.js"></script>
  <script src="js/tooltips.js"></script>
  <script src="js/api-client.js"></script>
  <style>
    body { background: linear-gradient(135deg, var(--primary) 0%, var(--teal) 100%); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .signup-container { width: 100%; max-width: 460px; }
    .signup-logo { text-align: center; margin-bottom: 32px; }
    .signup-logo img { height: 64px; width: 64px; border-radius: 12px; margin-bottom: 12px; }
    .signup-logo h1 { color: #fff; font-size: 28px; }
    .signup-logo p { color: rgba(255,255,255,.7); font-size: 14px; }
    .signup-card { background: #fff; border-radius: 12px; padding: 32px; box-shadow: var(--shadow-lg); }
    .signup-card h2 { font-size: 20px; margin-bottom: 24px; text-align: center; color: var(--primary); }
    .sso-buttons { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .btn-sso { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px; border-radius: var(--radius); border: 1.5px solid var(--border); background: #fff; font-size: 14px; font-weight: 500; cursor: pointer; transition: all .15s; width: 100%; text-decoration: none; color: var(--text); }
    .btn-sso:hover { border-color: var(--primary); background: #f8f9ff; }
    .btn-sso svg { width: 20px; height: 20px; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--text-secondary); font-size: 13px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .role-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .role-option { padding: 16px; border: 2px solid var(--border); border-radius: var(--radius); text-align: center; cursor: pointer; transition: all .15s; }
    .role-option:hover { border-color: var(--primary-light); }
    .role-option.selected { border-color: var(--primary); background: #e8eaf6; }
    .role-option .role-icon { font-size: 28px; margin-bottom: 6px; }
    .role-option .role-name { font-weight: 600; font-size: 14px; }
    .role-option .role-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .footer-link { text-align: center; margin-top: 20px; font-size: 14px; color: rgba(255,255,255,.7); }
    .footer-link a { color: #fff; text-decoration: underline; }
    .error-message { background: #fce4ec; color: #c62828; padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-bottom: 16px; display: none; }
  </style>
</head>
<body>
  <div class="signup-container">
    <div class="signup-logo">
      <img src="assets/logo.png" alt="AI CoReasoning Lab">
      <h1>AI CoReasoning Lab</h1>
      <p data-t="aiPoweredAssessment">Assessment and Practice for Human–AI Co-Reasoning</p>
    </div>

    <div class="signup-card">
      <h2 data-t="createYourAccount">Create Your Account</h2>

      <div id="errorMsg" class="error-message"></div>

      <!-- SSO Buttons -->
      <div class="sso-buttons">
        <a href="/api/v1/auth/google" class="btn-sso">
          <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          <span data-t="continueWithGoogle">Continue with Google</span>
        </a>
      </div>

      <div class="divider" data-t="orSignUpWithEmail">or sign up with email</div>

      <!-- Registration Form -->
      <form id="signupForm">
        <div class="form-group">
          <label data-t="fullName">Full Name</label>
          <input type="text" id="signupName" class="form-control" data-t-placeholder="enterFullName" placeholder="Enter your full name" required>
        </div>
        <div class="form-group">
          <label data-t="email">Email</label>
          <input type="email" id="signupEmail" class="form-control" placeholder="you@university.edu" required>
        </div>
        <div class="form-group">
          <label data-t="password">Password</label>
          <input type="password" id="signupPassword" class="form-control" data-t-placeholder="createPassword" placeholder="Create a password" required minlength="8">
        </div>

        <!-- Institution Selection -->
        <div class="form-group">
          <label data-t="institution">Institution</label>
          <select id="signupInstitution" class="form-control" required>
            <option value="" data-t="selectInstitution">Select your institution...</option>
          </select>
        </div>

        <!-- Role Selection -->
        <div class="form-group">
          <label data-t="role">I am a...</label>
          <div class="role-selector">
            <div class="role-option selected" data-role="student" onclick="selectRole(this)">
              <div class="role-icon">&#127891;</div>
              <div class="role-name" data-t="student">Student</div>
              <div class="role-desc">Take challenges &amp; practice</div>
            </div>
            <div class="role-option" data-role="instructor" onclick="selectRole(this)">
              <div class="role-icon">&#128218;</div>
              <div class="role-name" data-t="instructor">Instructor</div>
              <div class="role-desc">Create &amp; publish challenges</div>
            </div>
          </div>
          <div class="text-sm text-muted" style="text-align:center;" data-t="cannotBeChanged">Role cannot be changed after registration</div>
        </div>

        <button type="submit" id="signupBtn" class="btn btn-primary btn-lg" style="width:100%; justify-content:center; margin-top:8px;" data-t="signUp">Create Account</button>
      </form>
    </div>

    <div class="footer-link">
      <span data-t="alreadyHaveAccount">Already have an account?</span> <a href="login.html" data-t="signIn">Sign in</a>
    </div>
  </div>

  <script>
    let selectedRole = 'student';

    function selectRole(el) {
      document.querySelectorAll('.role-option').forEach(function(opt) {
        opt.classList.remove('selected');
      });
      el.classList.add('selected');
      selectedRole = el.getAttribute('data-role');
    }

    // Load institutions from API
    async function loadInstitutions() {
      const select = document.getElementById('signupInstitution');
      try {
        const data = await API.get('/institutions');
        const institutions = Array.isArray(data) ? data : (data.institutions || []);
        if (institutions.length > 0) {
          institutions.forEach(function(inst) {
            const option = document.createElement('option');
            option.value = inst._id || inst.id || inst.name;
            option.textContent = inst.name;
            select.appendChild(option);
          });
        }
      } catch (err) {
        console.warn('Could not load institutions:', err.message);
      }
    }
    loadInstitutions();

    // Handle form submission
    const form = document.getElementById('signupForm');
    const errorMsg = document.getElementById('errorMsg');
    const signupBtn = document.getElementById('signupBtn');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      errorMsg.style.display = 'none';

      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const institutionId = document.getElementById('signupInstitution').value;

      if (!name || !email || !password) {
        errorMsg.textContent = 'Please fill in all required fields.';
        errorMsg.style.display = 'block';
        return;
      }

      if (!institutionId) {
        errorMsg.textContent = 'Please select your institution.';
        errorMsg.style.display = 'block';
        return;
      }

      signupBtn.disabled = true;
      signupBtn.textContent = 'Creating account...';

      try {
        const data = await API.post('/auth/register', {
          email,
          password,
          name,
          role: selectedRole,
          institutionId
        });

        const role = (data.user && data.user.role) || selectedRole;
        if (role === 'instructor') {
          window.location.href = '/challenge-list-instructor.html';
        } else {
          window.location.href = '/challenge-list.html';
        }
      } catch (err) {
        errorMsg.textContent = err.message || 'Registration failed. Please try again.';
        errorMsg.style.display = 'block';
        signupBtn.disabled = false;
        signupBtn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
