          children:
            - name: "Utilitarianism"
            - name: "Deontology"
            - name: "Virtue Ethics"
        - name: "Applied Ethics"
          children:
            - name: "AI Ethics"
            - name: "Bioethics"
    - name: "Linear Algebra"
      institution: "Tel Aviv University"
      department: "Mathematics"
      instructors: ["dr.levy@tau.ac.il"]
      description: "Vector spaces, matrices, and linear transformations"
      subject_tree:
