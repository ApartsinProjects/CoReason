        - name: "Clinical Applications"
          children:
            - name: "Arrhythmia Detection"
            - name: "Sleep Stage Classification"
    # ─── ETH Zurich courses ───
    - name: "Machine Learning"
      institution: "ETH Zurich"
      department: "Computer Science"
      instructors: ["prof.mueller@ethz.ch"]
      description: "Foundations of supervised and unsupervised learning, model evaluation, and neural networks"
      subject_tree:
