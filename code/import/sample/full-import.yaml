  courses:
    # ─── English courses ───
    - name: "Introduction to Algorithms"
      institution: "Tel Aviv University"
      department: "Computer Science"
      instructors: ["dr.levy@tau.ac.il"]
      description: "Fundamental algorithmic techniques and data structures"
      subject_tree:
        - name: "Sorting & Searching"
          children:
            - name: "Comparison-based Sorting"
            - name: "Hash-based Searching"
            - name: "Binary Search Variants"
        - name: "Graph Algorithms"
          children:
            - name: "Shortest Paths"
            - name: "Minimum Spanning Trees"
            - name: "Network Flow"
        - name: "Dynamic Programming"
          children:
            - name: "Memoization"
            - name: "Tabulation"
    - name: "Classical Mechanics"
      institution: "MIT"
      department: "Physics"
      instructors: ["prof.chen@mit.edu"]
      description: "Newtonian mechanics, Lagrangian and Hamiltonian formulations"
      subject_tree:
        - name: "Kinematics"
          children:
            - name: "Linear Motion"
            - name: "Projectile Motion"
            - name: "Circular Motion"
        - name: "Dynamics"
          children:
            - name: "Newton's Laws"
            - name: "Friction & Drag"
            - name: "Oscillations"
    - name: "Ethics"
      institution: "University of Oxford"
      department: "Philosophy"
      instructors: []
      description: "Moral philosophy and ethical reasoning"
      subject_tree:
