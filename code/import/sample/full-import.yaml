          children:
            - name: "ER Diagrams"
            - name: "Normalization"
            - name: "Relational Algebra"
        - name: "SQL"
          children:
            - name: "Queries & Joins"
            - name: "Aggregation & Subqueries"
            - name: "Indexing & Optimization"
        - name: "Transaction Management"
          children:
            - name: "ACID Properties"
            - name: "Concurrency Control"
