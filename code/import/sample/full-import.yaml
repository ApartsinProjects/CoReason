  courses:
    # ─── English courses ───
    - name: "Introduction to Algorithms"
      institution: "Tel Aviv University"
      department: "Computer Science"
      instructors: ["dr.levy@tau.ac.il"]
      description: "Fundamental algorithmic techniques and data structures"
      subject_tree:
        - name: "Sorting & Searching"
          children:
            - name: "Comparison-based Sorting"
            - name: "Hash-based Searching"
            - name: "Binary Search Variants"
        - name: "Graph Algorithms"
          children:
            - name: "Shortest Paths"
            - name: "Minimum Spanning Trees"
            - name: "Network Flow"
        - name: "Dynamic Programming"
          children:
            - name: "Memoization"
            - name: "Tabulation"
    - name: "Classical Mechanics"
      institution: "MIT"
      department: "Physics"
      instructors: ["prof.chen@mit.edu"]
      description: "Newtonian mechanics, Lagrangian and Hamiltonian formulations"
      subject_tree:
        - name: "Kinematics"
          children:
            - name: "Linear Motion"
            - name: "Projectile Motion"
            - name: "Circular Motion"
        - name: "Dynamics"
          children:
            - name: "Newton's Laws"
            - name: "Friction & Drag"
            - name: "Oscillations"
    - name: "Ethics"
      institution: "University of Oxford"
      department: "Philosophy"
      instructors: ["dr.williams@oxford.ac.uk"]
      description: "Moral philosophy and ethical reasoning"
      subject_tree:
        - name: "Normative Ethics"
          children:
            - name: "Utilitarianism"
            - name: "Deontology"
            - name: "Virtue Ethics"
        - name: "Applied Ethics"
          children:
            - name: "AI Ethics"
            - name: "Bioethics"
    - name: "Linear Algebra"
      institution: "Tel Aviv University"
      department: "Mathematics"
      instructors: ["dr.levy@tau.ac.il"]
      description: "Vector spaces, matrices, and linear transformations"
      subject_tree:
        - name: "Vector Spaces"
          children:
            - name: "Bases & Dimension"
            - name: "Subspaces"
            - name: "Linear Independence"
        - name: "Matrix Operations"
          children:
            - name: "Matrix Multiplication"
            - name: "Inverse & Determinants"
            - name: "Row Reduction"
        - name: "Eigenvalues & Eigenvectors"
          children:
            - name: "Characteristic Polynomial"
            - name: "Diagonalization"
            - name: "Spectral Theorem"
    - name: "Microeconomics"
      institution: "MIT"
      department: "Economics"
      instructors: ["prof.chen@mit.edu"]
      description: "Consumer theory, producer theory, and market structures"
      subject_tree:
        - name: "Supply & Demand"
          children:
            - name: "Price Elasticity"
            - name: "Market Equilibrium"
            - name: "Government Intervention"
        - name: "Consumer Choice"
          children:
            - name: "Utility Maximization"
            - name: "Budget Constraints"
            - name: "Indifference Curves"
        - name: "Market Structures"
          children:
            - name: "Perfect Competition"
            - name: "Monopoly & Oligopoly"
            - name: "Game Theory Basics"
    # ─── English: Computer Science (1st/2nd year) ───
    - name: "Introduction to Computer Science"
      institution: "Tel Aviv University"
      department: "Computer Science"
      instructors: ["dr.levy@tau.ac.il"]
      description: "Foundations of programming, computational thinking, and problem solving"
      subject_tree:
        - name: "Programming Fundamentals"
          children:
            - name: "Variables & Data Types"
            - name: "Control Flow"
            - name: "Functions & Recursion"
        - name: "Object-Oriented Programming"
          children:
            - name: "Classes & Objects"
            - name: "Inheritance & Polymorphism"
            - name: "Design Patterns"
        - name: "Computational Thinking"
          children:
            - name: "Abstraction"
            - name: "Decomposition"
            - name: "Algorithm Design"
    - name: "Data Structures"
      institution: "Tel Aviv University"
      department: "Computer Science"
      instructors: ["dr.levy@tau.ac.il"]
      description: "Fundamental data structures and their applications in algorithms"
      subject_tree:
        - name: "Linear Structures"
          children:
            - name: "Arrays & Linked Lists"
            - name: "Stacks & Queues"
        - name: "Trees & Graphs"
          children:
            - name: "Binary Trees & BST"
            - name: "Heaps & Priority Queues"
            - name: "Graph Representations"
        - name: "Hash Tables"
          children:
            - name: "Hash Functions"
            - name: "Collision Resolution"
    - name: "Discrete Mathematics"
      institution: "Tel Aviv University"
      department: "Computer Science"
      instructors: ["dr.levy@tau.ac.il"]
      description: "Mathematical foundations for computer science: logic, sets, combinatorics, and graph theory"
      subject_tree:
        - name: "Logic & Proofs"
          children:
            - name: "Propositional Logic"
            - name: "Predicate Logic"
            - name: "Proof Techniques"
        - name: "Combinatorics"
          children:
            - name: "Counting Principles"
            - name: "Permutations & Combinations"
            - name: "Pigeonhole Principle"
        - name: "Graph Theory"
          children:
            - name: "Graph Properties"
            - name: "Trees & Planarity"
            - name: "Coloring & Matching"
    - name: "Operating Systems"
      institution: "Tel Aviv University"
      department: "Computer Science"
      instructors: ["dr.levy@tau.ac.il"]
      description: "Process management, memory management, file systems, and concurrency"
      subject_tree:
        - name: "Process Management"
          children:
            - name: "Scheduling Algorithms"
            - name: "Interprocess Communication"
            - name: "Threads & Concurrency"
        - name: "Memory Management"
          children:
            - name: "Virtual Memory"
            - name: "Paging & Segmentation"
        - name: "File Systems"
          children:
            - name: "File Organization"
            - name: "Disk Scheduling"
    - name: "Database Systems"
      institution: "Tel Aviv University"
      department: "Computer Science"
      instructors: ["dr.levy@tau.ac.il"]
      description: "Relational databases, SQL, normalization, and transaction management"
      subject_tree:
        - name: "Relational Model"
          children:
            - name: "ER Diagrams"
            - name: "Normalization"
            - name: "Relational Algebra"
        - name: "SQL"
          children:
            - name: "Queries & Joins"
            - name: "Aggregation & Subqueries"
            - name: "Indexing & Optimization"
        - name: "Transaction Management"
          children:
            - name: "ACID Properties"
            - name: "Concurrency Control"
    # ─── English: Instructional Technologies ───
    - name: "Introduction to Instructional Design"
      institution: "Tel Aviv University"
      department: "Instructional Technologies"
      instructors: ["dr.shapira@tau.ac.il"]
      description: "Principles and models for designing effective learning experiences"
      subject_tree:
        - name: "Learning Theories"
          children:
            - name: "Behaviorism"
            - name: "Constructivism"
            - name: "Connectivism"
        - name: "Instructional Models"
          children:
            - name: "ADDIE Model"
            - name: "Backward Design"
            - name: "Universal Design for Learning"
        - name: "Assessment Design"
          children:
            - name: "Formative Assessment"
            - name: "Summative Assessment"
            - name: "Rubric Construction"
    - name: "Digital Learning Environments"
      institution: "Tel Aviv University"
      department: "Instructional Technologies"
      instructors: ["dr.shapira@tau.ac.il"]
      description: "Learning management systems, multimedia, and online pedagogy"
      subject_tree:
        - name: "LMS & Platforms"
          children:
            - name: "Moodle & Canvas"
            - name: "Adaptive Learning Systems"
        - name: "Multimedia Learning"
          children:
            - name: "Cognitive Load Theory"
            - name: "Mayer's Principles"
            - name: "Video-based Learning"
        - name: "Online Assessment"
          children:
            - name: "E-Portfolios"
            - name: "Automated Feedback"
    - name: "AI in Education"
      institution: "Tel Aviv University"
      department: "Instructional Technologies"
      instructors: ["dr.shapira@tau.ac.il"]
      description: "Artificial intelligence applications in teaching, learning, and educational assessment"
      subject_tree:
        - name: "Intelligent Tutoring Systems"
          children:
            - name: "Student Modeling"
            - name: "Knowledge Tracing"
        - name: "Natural Language Processing in Education"
          children:
            - name: "Automated Essay Scoring"
            - name: "Chatbots for Learning"
        - name: "Learning Analytics"
          children:
            - name: "Predictive Modeling"
            - name: "Dashboards & Visualization"
    # ─── English: Digital Medicine Technologies ───
    - name: "Introduction to Digital Health"
      institution: "Tel Aviv University"
      department: "Digital Medicine Technologies"
      instructors: ["prof.greenspan@tau.ac.il"]
      description: "Foundations of digital health, telemedicine, electronic health records, and health informatics"
      subject_tree:
        - name: "Health Information Systems"
          children:
            - name: "Electronic Health Records"
            - name: "HL7 & FHIR Standards"
            - name: "Health Data Privacy"
        - name: "Telemedicine"
          children:
            - name: "Remote Patient Monitoring"
            - name: "Teleconsultation"
        - name: "Mobile Health"
          children:
            - name: "Wearable Sensors"
            - name: "Health Apps"
    - name: "Medical Imaging"
      institution: "Tel Aviv University"
      department: "Digital Medicine Technologies"
      instructors: ["prof.greenspan@tau.ac.il"]
      description: "Principles of medical image acquisition, processing, and analysis using AI"
      subject_tree:
        - name: "Image Acquisition"
          children:
            - name: "X-ray & CT"
            - name: "MRI Fundamentals"
            - name: "Ultrasound"
        - name: "Image Processing"
          children:
            - name: "Segmentation"
            - name: "Registration"
            - name: "Enhancement"
        - name: "AI in Imaging"
          children:
            - name: "CNNs for Detection"
            - name: "Classification of Pathology"
    - name: "Biomedical Signal Processing"
      institution: "Tel Aviv University"
      department: "Digital Medicine Technologies"
      instructors: ["prof.greenspan@tau.ac.il"]
